<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM Fleet - ECDIS Visual Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #0b1120; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; background: #0b1120; }

        /* 移除 Leaflet 預設 Icon 的白底與邊框 */
        .custom-ship-icon {
            background: transparent;
            border: none;
        }

        /* --- 🔴 紅色聲納告警波紋動畫 --- */
        .radar-pulse-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            pointer-events: none; /* 讓滑鼠可以穿透點擊到船隻 */
        }

        .radar-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(239, 68, 68, 0.8); /* Tailwind Red-500 */
            animation: pulse-ring 2.5s linear infinite;
            opacity: 0;
        }

        /* 第二圈延遲發射，製造連續波紋感 */
        .radar-pulse.delay {
            animation-delay: 1.25s;
        }

        @keyframes pulse-ring {
            0% { width: 20px; height: 20px; opacity: 1; border-width: 4px; box-shadow: 0 0 10px rgba(239, 68, 68, 0.8); }
            100% { width: 120px; height: 120px; opacity: 0; border-width: 1px; box-shadow: 0 0 0px rgba(239, 68, 68, 0); }
        }

        /* 自訂 Popup 樣式 (仿照圖片中的暗色資訊框) */
        .leaflet-popup-content-wrapper { background: rgba(15, 23, 42, 0.95); color: white; border: 1px solid #0ea5e9; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .leaflet-popup-tip { background: rgba(15, 23, 42, 0.95); border-top: 1px solid #0ea5e9; }
    </style>
</head>
<body>

    <div class="absolute top-6 left-6 z-[1000] pointer-events-none">
        <h1 class="text-3xl font-bold text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] flex items-center gap-3">
            <span class="w-2 h-8 bg-teal-500 block rounded"></span>
            ECDIS 高擬真船舶監控視角
        </h1>
        <p class="text-slate-300 ml-5 mt-1 font-mono text-sm shadow-black drop-shadow-md">XTD Deviation Alert Tracking</p>
    </div>

    <div id="map"></div>

    <script>
        // 1. 初始化地圖 (使用 Dark Matter 暗黑底圖，最適合戰情室)
        const map = L.map('map', { zoomControl: false }).setView([6.2, 85.5], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap © CartoDB'
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // ==========================================
        // 資料定義：航線 (Plan) 與 實際軌跡 (Track)
        // ==========================================

        // 計畫航線 (綠藍色直條)
        const planCoords = [
            [5.0, 95.0], [5.6, 90.0], [6.0, 85.0], [6.3, 80.0]
        ];

        // 實際航跡 (紅色，模擬偏航)
        const trackCoords = [
            [5.0, 95.0], [5.6, 90.0], 
            [5.7, 88.0], // 開始偏離
            [5.4, 85.0]  // 目前位置 (船的所在座標)
        ];

        const currentPos = trackCoords[trackCoords.length - 1]; // 船當前位置

        // ==========================================
        // 繪製圖層 1：安全走廊 (XTD Buffer)
        // 使用 Turf.js 計算真實的 5 海浬走廊
        // ==========================================
        const lineString = turf.lineString(planCoords.map(p => [p[1], p[0]]));
        const buffered = turf.buffer(lineString, 5, {units: 'nauticalmiles'});
        
        L.geoJSON(buffered, {
            style: { 
                color: '#38bdf8',       // 邊框顏色 (Sky Blue)
                weight: 1.5,            // 邊框粗細
                dashArray: '5, 8',      // 邊框虛線樣式 (長度5, 間距8)
                fillColor: '#0284c7',   // 內部填充色
                fillOpacity: 0.25       // 半透明效果
            }
        }).addTo(map);

        // ==========================================
        // 繪製圖層 2：計畫航線 (The Plan)
        // ==========================================
        L.polyline(planCoords, { 
            color: '#2dd4bf', // Teal 顏色
            weight: 4, 
            opacity: 0.9,
            lineCap: 'round',
            lineJoin: 'round'
        }).addTo(map);

        // ==========================================
        // 繪製圖層 3：實際偏航軌跡 (Actual Track)
        // ==========================================
        L.polyline(trackCoords, { 
            color: '#ef4444', // Red 顏色
            weight: 3, 
            opacity: 1,
            lineCap: 'round',
            lineJoin: 'round',
            dashArray: '10, 5' // 軌跡用虛線表示
        }).addTo(map);

        // ==========================================
        // 繪製圖層 4：電子圍籬/特殊區域 (ECA Zone)
        // ==========================================
        const ecaZone = [[6.5, 86.5], [7.2, 86.5], [7.0, 84.0], [6.2, 84.0]];
        L.polygon(ecaZone, {
            color: '#ef4444',
            weight: 2,
            fillColor: '#ef4444',
            fillOpacity: 0.2,
            dashArray: '5, 5'
        }).addTo(map).bindTooltip("ECA Zone (電子圍籬)", {permanent: true, direction: "center", className: "bg-transparent border-none text-red-400 font-bold text-lg drop-shadow-md"});

        // ==========================================
        // 🌟 核心：高擬真船舶 Icon 與方向計算
        // ==========================================

        // 1. 計算船頭朝向 (Bearing)
        const p1 = trackCoords[trackCoords.length - 2];
        const p2 = trackCoords[trackCoords.length - 1];
        const heading = turf.bearing(turf.point([p1[1], p1[0]]), turf.point([p2[1], p2[0]]));

        // 2. 建構自訂 HTML Icon
        // 包含：聲納動畫 + 俯視貨櫃船 SVG
        const shipHtml = `
            <div style="position: relative; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; transform: rotate(${heading}deg);">
                
                <div class="radar-pulse-container">
                    <div class="radar-pulse"></div>
                    <div class="radar-pulse delay"></div>
                </div>

                <svg viewBox="0 0 40 100" style="width: 24px; height: 60px; z-index: 10; position: relative; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.6));">
                    <path d="M 20 2 C 32 12 36 30 36 95 L 4 95 C 4 30 8 12 20 2 Z" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
                    <path d="M 20 8 C 28 16 31 32 31 92 L 9 92 C 9 32 12 16 20 8 Z" fill="#0369a1"/>
                    <rect x="10" y="75" width="20" height="12" rx="2" fill="#ffffff"/>
                    <rect x="14" y="77" width="12" height="4" fill="#0ea5e9"/>
                </svg>
            </div>
        `;

        const realisticShipIcon = L.divIcon({
            className: 'custom-ship-icon',
            html: shipHtml,
            iconSize: [60, 60],     // 定義整個 div 的大小
            iconAnchor: [30, 30],   // ⚓ ★ 絕對關鍵 ★：設定錨點為 [30, 30] (寬高的一半)，確保船的中心點完美壓在紅線末端！
            popupAnchor: [0, -30]   // 讓 Popup 從船的上方彈出
        });

        // 3. 將船隻放置於地圖
        const shipMarker = L.marker(currentPos, { 
            icon: realisticShipIcon,
            zIndexOffset: 1000 // 確保船隻蓋在路線上方
        }).addTo(map);

        // 4. 加入仿真的資訊 Popup
        shipMarker.bindPopup(`
            <div class="p-1 font-mono">
                <div class="font-bold text-red-400 text-base mb-2 border-b border-slate-600 pb-1">
                    <i class="fa-solid fa-triangle-exclamation"></i> XTD Deviation Alert
                </div>
                <div class="text-sm text-slate-300 space-y-1">
                    <div class="flex justify-between gap-6"><span>Vessel:</span> <span class="text-white font-bold">YM WELLNESS</span></div>
                    <div class="flex justify-between gap-6"><span>Heading:</span> <span class="text-white">${Math.round(heading > 0 ? heading : 360 + heading)}°</span></div>
                    <div class="flex justify-between gap-6"><span>Speed:</span> <span class="text-white">18.4 kts</span></div>
                    <div class="flex justify-between gap-6"><span>Deviation:</span> <span class="text-red-400 font-bold text-base">5.2 NM</span></div>
                </div>
            </div>
        `).openPopup();

    </script>
</body>
</html>
