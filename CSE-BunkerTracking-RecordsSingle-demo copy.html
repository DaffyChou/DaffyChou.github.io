<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高精度航道與本船鎖定戰情室 - 摯陞數位科技</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-dark: #000; --panel-bg: #0f172a; --card-bg: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent-blue: #38bdf8; --ship-green: #22c55e; --alert-red: #ef4444; --route-yellow: #eab308;
            --border-color: #334155;
            --px-per-meter: 1; 
        }

        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #map-container { flex-grow: 1; position: relative; }
        #map { width: 100%; height: 100%; background-color: #020617; }
        
        #sidebar {
            width: 400px; background-color: var(--panel-bg); border-left: 1px solid var(--border-color);
            padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px;
            z-index: 1000; box-shadow: -4px 0 15px rgba(0,0,0,0.6); overflow-y: auto;
        }

        .header h2 { margin: 0 0 5px 0; font-size: 1.3rem; color: var(--accent-blue); }
        .header .status { font-size: 0.85em; color: var(--ship-green); font-weight: bold; }
        
        .info-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; }
        .info-card h3 { margin: 0 0 15px 0; font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 0.8em; color: var(--text-muted); margin-bottom: 2px; }
        .data-value { font-size: 1em; font-weight: bold; color: var(--text-main); }

        .custom-marker { overflow: visible !important; }
        .marker-container { position: absolute; top: 0; left: 0; }

        /* --- 船舶基礎樣式 --- */
        .ship-body {
            position: absolute; transform: translate(-50%, -50%) rotate(var(--cog));
            width: max(8px, calc(var(--ship-width) * var(--px-per-meter) * 1px));
            height: max(16px, calc(var(--ship-length) * var(--px-per-meter) * 1px));
            background-color: var(--ship-green); border-radius: 50% 50% 2px 2px;
            box-shadow: 0 0 8px rgba(0,0,0,0.8); cursor: pointer; transition: box-shadow 0.3s ease;
        }

        /* --- 🌟 本船專屬視覺強化區 --- */
        @keyframes radar-pulse {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.8); }
            70% { box-shadow: 0 0 0 calc(20px * var(--px-per-meter) + 10px) rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }

        /* 本船自帶白邊與脈衝動畫 */
        .own-ship .ship-body { 
            background-color: var(--accent-blue); 
            border: 2px solid #fff;
            z-index: 100; 
            animation: radar-pulse 2s infinite;
        }
        
        /* 本船標籤高對比顯示 */
        .own-ship .target-label {
            background-color: var(--accent-blue) !important;
            color: #000 !important;
            font-weight: bold;
            font-size: 12px !important;
            border: 1px solid #fff !important;
            z-index: 201;
        }
        /* ------------------------------ */

        .selected-target .ship-body { box-shadow: 0 0 0 max(4px, calc(4px * var(--px-per-meter))) rgba(56, 189, 248, 0.5), 0 0 15px var(--accent-blue); }

        .vector-line {
            position: absolute; width: 2px; background-color: rgba(255,255,255,0.6);
            bottom: 50%; left: 50%; transform: translateX(-50%); transform-origin: bottom center;
            height: max(20px, calc(var(--vector-length) * var(--px-per-meter) * 1px));
            z-index: -1; pointer-events: none;
        }

        .target-label {
            position: absolute; top: 15px; left: 15px; font-size: 11px; color: #fff; background: rgba(0,0,0,0.7);
            padding: 3px 6px; border-radius: 4px; white-space: nowrap; border: 1px solid var(--border-color); pointer-events: none; z-index: 200;
        }

        .map-controls {
            position: absolute; top: 20px; left: 60px; z-index: 1000;
            background: rgba(15, 23, 42, 0.9); border: 1px solid var(--accent-blue);
            padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .map-controls button {
            background-color: var(--accent-blue); color: #000; border: none;
            padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        .map-controls button:hover { background-color: #7dd3fc; }
    </style>
</head>
<body>

    <div id="map-container">
        <div class="map-controls">
            <button onclick="zoomTo5NM()">看全景 (5海里範圍)</button>
            <button onclick="zoomToOwnShip()" style="margin-left: 8px; background: #334155; color: #fff;">鎖定本船</button>
        </div>
        <div id="map"></div>
    </div>

    <div id="sidebar">
        <div class="header">
            <h2>摯陞航道安全監控戰情室</h2>
            <div class="status">● SDataPro 邊緣節點在線 (精確水域模式)</div>
        </div>

        <div class="info-card" style="border-left: 4px solid var(--accent-blue);">
            <h3>本船狀態 <span style="font-size: 0.7em; background: var(--accent-blue); color: #000; padding: 2px 6px; border-radius: 4px;">OWN SHIP</span></h3>
            <div class="data-grid">
                <div class="data-item"><span class="data-label">MMSI</span><span class="data-value" id="own-mmsi">--</span></div>
                <div class="data-item"><span class="data-label">座標 (Lat / Lng)</span><span class="data-value" id="own-coords" style="font-size: 0.85em;">--</span></div>
                <div class="data-item"><span class="data-label">航速 (SOG)</span><span class="data-value" id="own-sog">--</span></div>
                <div class="data-item"><span class="data-label">航向 (COG)</span><span class="data-value" id="own-cog">--</span></div>
            </div>
        </div>

        <div class="info-card">
            <h3>目標資訊 <span id="target-type-badge" style="font-size: 0.7em; background: var(--text-muted); color: #fff; padding: 2px 6px; border-radius: 4px;">請點擊地圖</span></h3>
            <div style="margin-bottom: 15px;">
                <div class="data-label">船名 (Name)</div>
                <div class="data-value" id="tar-name" style="font-size: 1.2em; color: var(--accent-blue);">--</div>
            </div>
            <div class="data-grid">
                <div class="data-item"><span class="data-label">IMO 編號</span><span class="data-value" id="tar-imo">--</span></div>
                <div class="data-item"><span class="data-label">尺寸 (L x W)</span><span class="data-value" id="tar-dim">--</span></div>
                <div class="data-item"><span class="data-label">航速 (SOG)</span><span class="data-value" id="tar-sog">--</span></div>
                <div class="data-item"><span class="data-label">航向 (COG)</span><span class="data-value" id="tar-cog">--</span></div>
                <div class="data-item" style="grid-column: 1 / -1; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border-color);">
                    <span class="data-label">與本船距離 (Distance)</span>
                    <span class="data-value" id="tar-dist" style="color: var(--alert-red); font-size: 1.2em;">-- NM</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // 🛠️ 嚴格校準的高雄港水域座標
        // =========================================================================

        const MAP_CENTER = [22.5485, 120.3140]; // 正對二港口防波堤中心
        const MAP_ZOOM_LEVEL = 15; 

        // 本船放置於防波堤內側深水區
        const ownShipData = { 
            id: 'own', isOwn: true, mmsi: '416000123', imo: 'N/A', name: 'SDataPro (本船)', 
            length: 45, width: 12, sog: 5.5, cog: 45, lat: 22.5510, lng: 120.3175 
        };

        const MONITORING_RADIUS = 5 * 1852; 

        const targets = [
            ownShipData,
            // 貨櫃船：嚴格校準，正從外海準備穿過防波堤口
            { 
                id: 'v1', isOwn: false, mmsi: '416111222', imo: '9432111', name: 'EVER GIVEN', 
                length: 399, width: 59, sog: 8.2, cog: 51, lat: 22.5420, lng: 120.3060,
                // 航道軌跡修正：完全避開陸地，精準穿過防波堤(22.5485, 120.3140)進入內港
                plannedRoute: [
                    [22.5380, 120.3010], // 外海起始點
                    [22.5485, 120.3140], // 防波堤正中間
                    [22.5520, 120.3180], // 進入主航道
                    [22.5600, 120.3200]  // 準備轉向碼頭
                ]
            },
            // 引水船：準備出港
            { 
                id: 'v2', isOwn: false, mmsi: '416333444', imo: 'N/A', name: 'PILOT BOAT 01', 
                length: 20, width: 6, sog: 18.5, cog: 231, lat: 22.5550, lng: 120.3200,
                plannedRoute: null
            }
        ];

        // =========================================================================
        // 🗺️ 圖層與繪製邏輯
        // =========================================================================

        const map = L.map('map').setView(MAP_CENTER, MAP_ZOOM_LEVEL);

        L.tileLayer('https://mt{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { subdomains: '0123', maxZoom: 19 }).addTo(map);
        L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);

        function updateSpatialScale() {
            const zoom = map.getZoom();
            const lat = map.getCenter().lat;
            const metersPerPx = 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
            document.documentElement.style.setProperty('--px-per-meter', 1 / metersPerPx);
        }
        map.on('zoom moveend', updateSpatialScale);
        updateSpatialScale();

        // 繪製 5 海里監控邊界
        const coverageCircle = L.circle([ownShipData.lat, ownShipData.lng], {
            radius: MONITORING_RADIUS, 
            color: '#38bdf8', weight: 2, dashArray: '8, 8', fillColor: '#38bdf8', fillOpacity: 0.08
        }).bindTooltip("SDataPro 5海里覆蓋", { permanent: false, direction: "top" }).addTo(map);

        function zoomTo5NM() {
            map.fitBounds(coverageCircle.getBounds(), { padding: [20, 20] });
        }

        // 🟢 新增：一鍵鎖定本船視角
        function zoomToOwnShip() {
            map.setView([ownShipData.lat, ownShipData.lng], 16);
            selectTarget(ownShipData);
        }

        document.getElementById('own-mmsi').innerText = ownShipData.mmsi;
        document.getElementById('own-coords').innerText = `${ownShipData.lat.toFixed(4)}, ${ownShipData.lng.toFixed(4)}`;
        document.getElementById('own-sog').innerText = `${ownShipData.sog} 節`;
        document.getElementById('own-cog').innerText = `${ownShipData.cog}°`;

        targets.forEach(t => {
            if (t.plannedRoute) {
                L.polyline(t.plannedRoute, { color: 'var(--route-yellow)', weight: 3, dashArray: '10, 10', opacity: 0.8 }).addTo(map);
            }

            const vectorLengthMeters = t.sog * 0.514444 * 180; 
            
            const htmlContent = `
                <div class="marker-container ${t.isOwn ? 'own-ship' : ''}" id="icon-${t.id}"
                     style="--ship-width: ${t.width}; --ship-length: ${t.length}; --cog: ${t.cog}deg; --vector-length: ${vectorLengthMeters};">
                    <div class="ship-body">
                        ${t.sog > 0 ? `<div class="vector-line"></div>` : ''}
                    </div>
                    <div class="target-label">${t.name}</div>
                </div>`;

            const customIcon = L.divIcon({ className: 'custom-marker', html: htmlContent, iconSize: [0, 0], iconAnchor: [0, 0] });
            const marker = L.marker([t.lat, t.lng], { icon: customIcon }).addTo(map);
            marker.on('click', () => selectTarget(t));
        });

        function selectTarget(data) {
            document.querySelectorAll('.marker-container').forEach(el => el.classList.remove('selected-target'));
            const selectedIcon = document.getElementById(`icon-${data.id}`);
            if(selectedIcon) selectedIcon.classList.add('selected-target');

            document.getElementById('target-type-badge').innerText = data.isOwn ? "本船" : "目標船舶";
            document.getElementById('target-type-badge').style.backgroundColor = data.isOwn ? "var(--accent-blue)" : "var(--ship-green)";
            
            document.getElementById('tar-name').innerText = data.name;
            document.getElementById('tar-imo').innerText = data.imo || "N/A";
            document.getElementById('tar-dim').innerText = `${data.length}m x ${data.width}m`;
            document.getElementById('tar-sog').innerText = `${data.sog} 節`;
            document.getElementById('tar-cog').innerText = `${data.cog}°`;

            if (data.isOwn) {
                document.getElementById('tar-dist').innerText = "0.00 NM";
            } else {
                const distMeters = map.distance([ownShipData.lat, ownShipData.lng], [data.lat, data.lng]);
                document.getElementById('tar-dist').innerText = `${(distMeters / 1852).toFixed(2)} NM`;
            }
        }

        // 預設鎖定本船
        zoomToOwnShip();
    </script>
</body>
</html>
