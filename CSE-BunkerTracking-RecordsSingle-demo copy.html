<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDataPro 微觀海域戰情室</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --alert-red: #ef4444;
            --safe-green: #22c55e;
            --warning-yellow: #eab308;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* 左側資訊面板 */
        .sidebar {
            width: 350px;
            background-color: var(--panel-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        h1 {
            font-size: 1.5rem;
            color: var(--accent-blue);
            margin: 0;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
        }
        .status-card {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-blue);
        }
        .status-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }
        .status-value {
            font-size: 1.8rem;
            font-weight: bold;
        }
        /* 船舶清單 */
        .ship-list {
            flex-grow: 1;
            overflow-y: auto;
        }
        .ship-item {
            background-color: #0f172a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ship-item.alert {
            border: 1px solid var(--alert-red);
            background-color: rgba(239, 68, 68, 0.1);
        }
        .ship-info div { margin-bottom: 3px; }
        .mmsi { font-weight: bold; color: var(--accent-blue); }
        .danger-badge {
            background-color: var(--alert-red);
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        /* 右側地圖區域 */
        .map-container {
            flex-grow: 1;
            position: relative;
        }
        #map {
            width: 100%;
            height: 100%;
            background-color: #030712;
        }
        /* 覆蓋層資訊 */
        .overlay-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(30, 41, 59, 0.9);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>SDataPro 戰情監控中心</h1>
        
        <div class="status-card">
            <div class="status-title">5海里內偵測船舶總數</div>
            <div class="status-value" id="total-ships">3 艘</div>
        </div>

        <div class="status-card" style="border-left-color: var(--alert-red);">
            <div class="status-title">高風險目標 (CPA < 0.5 NM)</div>
            <div class="status-value" style="color: var(--alert-red);">1 艘</div>
        </div>

        <h3 style="margin-bottom: 0;">即時船舶動態 (AIS)</h3>
        <div class="ship-list">
            <div class="ship-item alert">
                <div class="ship-info">
                    <div class="mmsi">MMSI: 416000123</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted);">航速: 12.5 kn | 航向: 045°</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted);">CPA: 0.3 NM | TCPA: 12 min</div>
                </div>
                <div class="danger-badge">碰撞預警</div>
            </div>
            <div class="ship-item">
                <div class="ship-info">
                    <div class="mmsi">MMSI: 353000456</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted);">航速: 8.2 kn | 航向: 180°</div>
                    <div style="font-size: 0.85rem; color: var(--safe-green);">安全距離</div>
                </div>
            </div>
            <div class="ship-item">
                <div class="ship-info">
                    <div class="mmsi">MMSI: 416000789 (錨泊)</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted);">航速: 0.1 kn | 航向: 000°</div>
                    <div style="font-size: 0.85rem; color: var(--safe-green);">安全距離</div>
                </div>
            </div>
        </div>
    </div>

    <div class="map-container">
        <div class="overlay-info">
            <div style="color: var(--accent-blue); font-weight: bold; margin-bottom: 5px;">本船狀態 (Host Vessel)</div>
            <div>座標: 22°36'N, 120°16'E</div>
            <div>航速: 10.0 kn</div>
            <div>航向: 320°</div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地圖 (設定在高雄港外海附近作為範例)
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([22.6, 120.27], 12);

        // 使用深色風格的地圖底圖 (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // 本船座標
        const hostLocation = [22.6, 120.27];

        // 畫出本船 (藍色圓點)
        L.circleMarker(hostLocation, {
            radius: 8,
            fillColor: "#38bdf8",
            color: "#fff",
            weight: 2,
            opacity: 1,
            fillOpacity: 1
        }).addTo(map).bindPopup("<b>本船 (Host)</b><br>裝載 SDataPro");

        // 畫出 5 海里偵測範圍 (5 海里約等於 9260 公尺)
        L.circle(hostLocation, {
            color: '#38bdf8',
            weight: 1,
            fillColor: '#38bdf8',
            fillOpacity: 0.05,
            radius: 9260 
        }).addTo(map);

        // 模擬他船數據
        const targetShips = [
            { loc: [22.63, 120.22], color: '#ef4444', desc: "MMSI: 416000123<br>狀態: 碰撞預警!" }, // 危險船
            { loc: [22.56, 120.30], color: '#22c55e', desc: "MMSI: 353000456<br>狀態: 航行中" },  // 安全船
            { loc: [22.65, 120.28], color: '#eab308', desc: "MMSI: 416000789<br>狀態: 錨泊中" }   // 錨泊船
        ];

        // 將他船標記加入地圖
        targetShips.forEach(ship => {
            L.circleMarker(ship.loc, {
                radius: 6,
                fillColor: ship.color,
                color: "#fff",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup(ship.desc);
        });
    </script>
</body>
</html>
