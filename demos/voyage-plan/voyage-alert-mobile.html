<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>航行監控與警示 - 手機版</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="mockup-data.js"></script>
<script src="risk-zones.js"></script>

<style>
/* ── Reset & base ─────────────────────────────────────────────── */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, "Segoe UI", "Noto Sans TC", sans-serif;
  background: #000; color: #d8dee9;
  font-size: 14px; line-height: 1.45;
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
}
button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
input, textarea, select { outline: none; }
a { color: #9ec5ff; text-decoration: none; }

/* ── 字級規範：14 / 16 / 18 / 20 ──────────────────────────────── */
.t-sm { font-size: 12px; }
.t-md { font-size: 14px; }
.t-lg { font-size: 16px; }
.t-xl { font-size: 18px; }
.t-2xl { font-size: 20px; }

/* ── Color tokens ─────────────────────────────────────────────── */
.muted { color: #7c8a9e; }
.mono { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-variant-numeric: tabular-nums; }

/* ── Header ───────────────────────────────────────────────────── */
.m-header {
  flex: 0 0 auto;
  background: #0d0d0d;
  border-bottom: 1px solid #2a2a2a;
  padding: 10px 14px;
  padding-top: max(10px, env(safe-area-inset-top));
  display: flex; align-items: center; gap: 10px;
  position: relative; z-index: 10;
}
.m-header .logo {
  width: 32px; height: 32px; border-radius: 7px;
  background: linear-gradient(135deg, #4a9eff 0%, #7ec5ff 100%);
  color: #0d0d0d; font-weight: 800; font-size: 14px;
  display: inline-flex; align-items: center; justify-content: center;
  flex: 0 0 32px;
}
.m-header .title { flex: 1; min-width: 0; }
.m-header .title b { display: block; font-size: 16px; color: #e4eaf2; font-weight: 600; line-height: 1.2; }
.m-header .title small { display: block; font-size: 12px; color: #7c8a9e; }
.m-header .h-action {
  background: rgba(255,255,255,0.05); border: 1px solid #2a2a2a;
  color: #c4cdda; border-radius: 6px;
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.m-header .h-action svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* ── Main scrolling area ──────────────────────────────────────── */
.m-main {
  flex: 1 1 auto; min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  background: #000;
}
.m-main.no-scroll { overflow: hidden; }

/* ── Bottom tab bar ───────────────────────────────────────────── */
.m-tabbar {
  flex: 0 0 auto;
  background: #0d0d0d;
  border-top: 1px solid #2a2a2a;
  padding-bottom: env(safe-area-inset-bottom);
  display: flex;
  z-index: 10;
}
.m-tab {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  padding: 8px 4px 6px;
  color: #7c8a9e; cursor: pointer;
  border: none; background: transparent;
  position: relative;
  font-size: 12px;
}
.m-tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
.m-tab.active { color: #9ec5ff; }
.m-tab.active::before {
  content: ""; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  width: 32px; height: 2px; background: #4a9eff;
  border-radius: 0 0 2px 2px;
}
.m-tab .tab-badge {
  position: absolute; top: 4px; left: 50%;
  transform: translateX(8px);
  min-width: 16px; height: 16px; padding: 0 4px;
  background: #ff4d4f; color: #fff;
  border-radius: 8px;
  font-size: 12px; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
}

/* ── 通用 card ────────────────────────────────────────────────── */
.card {
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 12px;
  margin: 0 12px 10px;
}
.card-tight { padding: 10px 12px; }
.section-title {
  font-size: 12px; color: #7c8a9e;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin: 14px 16px 8px;
  display: flex; align-items: center; gap: 6px;
}
.section-title .en { color: #5e6b80; font-weight: 400; }
.section-title .count {
  margin-left: auto;
  background: #1a1a1a; color: #c4cdda;
  padding: 2px 8px; border-radius: 8px;
  font-size: 12px; letter-spacing: 0;
  text-transform: none;
}

/* ── Page title ───────────────────────────────────────────────── */
.page-title {
  padding: 14px 16px 4px;
  display: flex; align-items: baseline; gap: 8px;
}
.page-title h2 { margin: 0; font-size: 18px; font-weight: 600; color: #e4eaf2; }
.page-title .sub { color: #7c8a9e; font-size: 12px; }

/* ── Summary pills row（fleet/events 共用） ───────────────────── */
.pill-row {
  display: flex; gap: 8px;
  padding: 0 12px 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.pill-row::-webkit-scrollbar { display: none; }
.pill {
  flex: 0 0 auto;
  background: #141414; border: 1px solid #2a2a2a;
  border-radius: 16px;
  padding: 6px 12px;
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: #c4cdda;
  white-space: nowrap;
}
.pill .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; }
.pill .dot.critical { background: #ff4d4f; }
.pill .dot.warning  { background: #f5a623; }
.pill .dot.normal   { background: #6c7a91; }
.pill .dot.na       { background: #444; }
.pill b { color: #e4eaf2; font-weight: 700; }

/* Chip filter row */
.chip-row {
  display: flex; gap: 6px;
  padding: 0 12px 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex: 0 0 auto;
  background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 14px;
  padding: 6px 12px;
  font-size: 12px; color: #c4cdda;
  cursor: pointer; white-space: nowrap;
}
.chip.active {
  background: rgba(44,108,219,0.18);
  border-color: #4a9eff; color: #9ec5ff;
}

/* Search bar */
.search-bar {
  margin: 0 12px 10px;
  position: relative;
}
.search-bar input {
  width: 100%;
  background: #141414; border: 1px solid #2a2a2a; border-radius: 8px;
  padding: 10px 12px 10px 36px;
  color: #e4eaf2; font-size: 14px;
}
.search-bar input:focus { border-color: #4a9eff; }
.search-bar .ico {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: #7c8a9e;
}
.search-bar .ico svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }

/* ── Fleet map (collapsible) ──────────────────────────────────── */
.fleet-map-card {
  margin: 0 12px 12px;
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
.fleet-map-card .map-el {
  height: 220px;
  transition: height 0.28s ease;
}
.fleet-map-card.expanded .map-el { height: 60vh; }
.fleet-map-card .map-handle {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 6px 10px;
  background: #1a1a1a; border-top: 1px solid #2a2a2a;
  color: #7c8a9e; font-size: 12px;
  cursor: pointer; user-select: none;
}
.fleet-map-card .map-handle .grip {
  width: 28px; height: 3px; border-radius: 2px; background: #333;
}
.fleet-map-card .map-handle .chev {
  transition: transform 0.28s ease;
}
.fleet-map-card.expanded .map-handle .chev { transform: rotate(180deg); }

.map-mini-banner {
  position: absolute; top: 8px; left: 8px; right: 8px; z-index: 600;
  background: rgba(120, 20, 22, 0.92);
  border: 1px solid #c0392b; border-radius: 6px;
  padding: 6px 10px;
  color: #ffd9da; font-size: 12px;
  display: flex; align-items: center; gap: 8px;
  pointer-events: none;
}
.map-mini-banner b { color: #fff; }
.map-mini-banner.hidden { display: none; }

/* Risk zone overlay button */
.map-risk-btn {
  position: absolute; right: 8px; bottom: 36px; z-index: 600;
  background: rgba(20, 20, 20, 0.92);
  border: 1px solid #2a2a2a; border-radius: 50%;
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  color: #c4cdda; cursor: pointer;
  font-size: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.map-risk-btn:active { background: #1a1a1a; }

/* Leaflet dark adjustments */
.leaflet-popup-content-wrapper, .leaflet-popup-tip {
  background: #141414; color: #d8dee9; border: 1px solid #2a2a2a;
}
.leaflet-popup-content b { color: #e4eaf2; }
.leaflet-container { background: #000; }
.leaflet-control-attribution { background: rgba(20, 20, 20, 0.85) !important; color: #7c8a9e !important; font-size: 10px !important; }
.leaflet-control-attribution a { color: #9ec5ff !important; }
.leaflet-control-zoom a {
  background: #141414 !important; color: #d8dee9 !important;
  border-color: #2a2a2a !important;
}

/* ── Vessel cards ─────────────────────────────────────────────── */
.vessel-card {
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  margin: 0 12px 8px;
  padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
  cursor: pointer;
  position: relative;
}
.vessel-card:active { background: #1a1a1a; }
.vessel-card.critical { border-left: 3px solid #ff4d4f; }
.vessel-card.warning  { border-left: 3px solid #f5a623; }
.vessel-card.normal   { border-left: 3px solid #2a2a2a; }
.vessel-card .vc-head {
  display: flex; align-items: center; gap: 8px;
}
.vessel-card .vc-name {
  font-size: 16px; font-weight: 600; color: #e4eaf2;
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.vessel-card .vc-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 10px;
  background: rgba(44,108,219,0.18); color: #9ec5ff;
  font-size: 12px; font-weight: 600;
  white-space: nowrap;
}
.vessel-card .vc-pill::before {
  content: ""; display: inline-block;
  width: 6px; height: 6px; border-radius: 50%; background: #4a9eff;
}
.vessel-card .vc-risk {
  font-size: 12px; font-weight: 700;
  padding: 3px 8px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.vessel-card .vc-risk.critical { background: rgba(255,77,79,0.18); color: #ff8a8a; }
.vessel-card .vc-risk.warning  { background: rgba(245,166,35,0.18); color: #f5b753; }
.vessel-card .vc-risk.normal   { background: rgba(108,122,145,0.15); color: #aab4c4; }
.vessel-card .vc-risk.na       { background: rgba(108,122,145,0.10); color: #7c8a9e; }
.vessel-card .vc-dims {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.vessel-card .vc-dim {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 6px;
  background: #1a1a1a;
  border-radius: 4px;
  font-size: 12px; color: #9aa5b8;
}
.vessel-card .vc-dim.critical { background: rgba(255,77,79,0.12); color: #ff8a8a; }
.vessel-card .vc-dim.warning  { background: rgba(245,166,35,0.12); color: #f5b753; }
.vessel-card .vc-dim.normal   { background: #1a1a1a; color: #6c7a91; }
.vessel-card .vc-dim svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.8; }
.vessel-card .vc-meta {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 4px 12px;
  font-size: 12px; color: #9aa5b8;
}
.vessel-card .vc-meta b { color: #c4cdda; font-weight: 500; }
.vessel-card .vc-progress {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: #9aa5b8;
}
.vessel-card .vc-bar {
  flex: 1; height: 4px; background: #1a1a1a;
  border-radius: 2px; overflow: hidden;
}
.vessel-card .vc-bar > div {
  height: 100%; border-radius: 2px;
}
.vc-arrow {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  color: #5e6b80; font-size: 18px;
}

/* ── Empty state ──────────────────────────────────────────────── */
.empty {
  padding: 48px 24px;
  text-align: center;
  color: #7c8a9e;
}
.empty .ico {
  font-size: 36px; margin-bottom: 8px;
}

/* ── Vessel detail (full-screen overlay) ──────────────────────── */
.detail-overlay {
  position: fixed; inset: 0;
  background: #000;
  z-index: 100;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.25s ease;
}
.detail-overlay.open { transform: translateX(0); }
.detail-header {
  flex: 0 0 auto;
  background: #0d0d0d;
  border-bottom: 1px solid #2a2a2a;
  padding: 10px 12px;
  padding-top: max(10px, env(safe-area-inset-top));
  display: flex; align-items: center; gap: 8px;
}
.detail-header .back-btn {
  background: rgba(255,255,255,0.05); border: 1px solid #2a2a2a;
  color: #9ec5ff; border-radius: 6px;
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex: 0 0 36px;
}
.detail-header .back-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.detail-header .d-name { flex: 1; min-width: 0; }
.detail-header .d-name b {
  display: block; color: #e4eaf2; font-size: 16px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.detail-header .d-name small { color: #7c8a9e; font-size: 12px; }
.detail-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* Detail map */
.detail-map-wrap {
  position: relative;
  height: 280px;
  background: #000;
  border-bottom: 1px solid #2a2a2a;
}
.detail-map-wrap .map-el { width: 100%; height: 100%; }
.detail-map-wrap .map-chips {
  position: absolute; top: 8px; left: 8px; z-index: 600;
  display: flex; gap: 6px;
}
.alert-chip {
  background: rgba(20, 20, 20, 0.92);
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  padding: 4px 10px;
  font-size: 12px; color: #e4eaf2; font-weight: 500;
  display: inline-flex; align-items: center; gap: 5px;
}
.alert-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
.alert-chip.critical { border-color: rgba(255,77,79,0.5); }
.alert-chip.critical .dot { background: #ff4d4f; }
.alert-chip.warning  { border-color: rgba(245,166,35,0.5); }
.alert-chip.warning .dot  { background: #f5a623; }

.map-layer-btn {
  position: absolute; right: 8px; top: 8px; z-index: 600;
  background: rgba(20, 20, 20, 0.92);
  border: 1px solid #2a2a2a; border-radius: 6px;
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  color: #c4cdda; cursor: pointer;
}
.map-layer-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }

/* XTD block */
.xtd-block { padding: 4px 0; }
.xtd-row {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 8px;
}
.xtd-label { font-size: 12px; color: #9aa5b8; text-transform: uppercase; letter-spacing: 0.3px; }
.xtd-value { font-size: 20px; font-weight: 600; color: #e4eaf2; font-variant-numeric: tabular-nums; }
.xtd-value .unit { font-size: 12px; color: #7c8a9e; margin-left: 4px; font-weight: 400; }
.xtd-bar {
  position: relative; height: 8px; background: #1f1f1f;
  border-radius: 4px; overflow: hidden; margin: 6px 0;
}
.xtd-bar .fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  border-radius: 4px;
}
.xtd-bar .threshold {
  position: absolute; top: -2px; bottom: -2px; width: 2px;
  background: #f5a623;
}
.xtd-foot {
  display: flex; justify-content: space-between;
  font-size: 12px; color: #7c8a9e;
}

/* Alert row */
.alert-row {
  display: grid; grid-template-columns: 28px 1fr auto;
  align-items: start; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid #1a1a1a;
}
.alert-row:last-child { border-bottom: none; }
.alert-row .alert-icon { display: flex; align-items: center; justify-content: center; padding-top: 1px; }
.alert-row .alert-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.alert-row .alert-name { font-size: 14px; color: #e4eaf2; font-weight: 500; }
.alert-row .alert-en { font-size: 12px; color: #5e6b80; margin-left: 4px; }
.alert-row .alert-meta { font-size: 12px; color: #9aa5b8; margin-top: 2px; line-height: 1.5; }

.alert-tag {
  font-size: 12px; font-weight: 600;
  padding: 2px 8px; border-radius: 8px;
  text-transform: uppercase; letter-spacing: 0.4px;
  display: inline-block;
}
.alert-tag.critical { background: rgba(255,77,79,0.15); color: #ff8a8a; }
.alert-tag.warning  { background: rgba(245,166,35,0.15); color: #f5b753; }
.alert-tag.normal   { background: rgba(108,122,145,0.15); color: #aab4c4; }
.alert-tag.na       { background: rgba(108,122,145,0.10); color: #7c8a9e; }

/* Key-value list */
.kv {
  display: grid; grid-template-columns: 110px 1fr;
  gap: 6px 10px; font-size: 14px;
}
.kv .k { color: #7c8a9e; font-size: 12px; align-self: center; }
.kv .v { color: #e4eaf2; }

/* AIS status badge */
.ais-status {
  display: inline-block;
  padding: 2px 8px; border-radius: 3px;
  font-size: 12px; font-weight: 500;
  background: #222; color: #c4cdda;
}
.ais-status.moored    { background: #222; color: #c4cdda; }
.ais-status.under-way { background: rgba(80,160,80,0.18); color: #88d796; }
.ais-status.anchored  { background: rgba(245,166,35,0.18); color: #f5b753; }
.ais-status.unknown   { background: #1f1f1f; color: #7c8a9e; }

/* Layer toggle bottom-sheet for detail map */
.layer-sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: #141414;
  border-top: 1px solid #2a2a2a;
  border-radius: 12px 12px 0 0;
  padding: 14px 16px;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
  z-index: 1100;
  transform: translateY(100%);
  transition: transform 0.22s ease;
}
.layer-sheet.open { transform: translateY(0); }
.layer-sheet .sheet-handle {
  width: 36px; height: 4px; border-radius: 2px; background: #444;
  margin: 0 auto 10px;
}
.layer-sheet h4 {
  margin: 0 0 8px; font-size: 14px; color: #e4eaf2; font-weight: 600;
}
.layer-sheet label {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  font-size: 14px; color: #d8dee9;
  cursor: pointer;
}
.layer-sheet label input[type="checkbox"] {
  width: 18px; height: 18px; accent-color: #4a9eff;
}
.layer-sheet .sheet-actions {
  display: flex; gap: 8px; margin-top: 12px;
}
.layer-sheet .sheet-actions button {
  flex: 1; padding: 10px; border-radius: 6px;
  background: #2c6cdb; color: #fff; border: none;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
}

/* Bottom-sheet mask */
.sheet-mask {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 1050;
}
.sheet-mask.open { display: block; }

/* ── Event card ───────────────────────────────────────────────── */
.ev-card {
  background: #141414; border: 1px solid #2a2a2a;
  border-radius: 8px; margin: 0 12px 8px;
  padding: 10px 12px;
  cursor: pointer;
}
.ev-card:active { background: #1a1a1a; }
.ev-card.cleared { opacity: 0.55; }
.ev-card .ev-head {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.ev-card .ev-dim {

<script>
/* ─────────────────────────────────────────────────────────────────
 * 共用：資料與運算 — 與桌面版邏輯一致，僅 UI 重寫
 * ───────────────────────────────────────────────────────────────── */
const VESSELS = window.MOCK_DATA.vessels;
const MAILS   = window.MOCK_DATA.mails;

const EARTH_M = 6371008.8, NM_M = 1852, D2R = Math.PI/180, R2D = 180/Math.PI;

function bearing(a, b) {
  const lat1 = a[0]*D2R, lat2 = b[0]*D2R, dlon = (b[1]-a[1])*D2R;
  const y = Math.sin(dlon)*Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dlon);
  return Math.atan2(y, x);
}
function destination(p, brg, distM) {
  const lat1 = p[0]*D2R, lon1 = p[1]*D2R, d = distM/EARTH_M;
  const lat2 = Math.asin(Math.sin(lat1)*Math.cos(d) + Math.cos(lat1)*Math.sin(d)*Math.cos(brg));
  const lon2 = lon1 + Math.atan2(Math.sin(brg)*Math.sin(d)*Math.cos(lat1),
                                  Math.cos(d) - Math.sin(lat1)*Math.sin(lat2));
  return [lat2*R2D, lon2*R2D];
}
function avgBearing(brs) {
  if (brs.length === 1) return brs[0];
  let x = 0, y = 0;
  for (const b of brs) { x += Math.cos(b); y += Math.sin(b); }
  return Math.atan2(y, x);
}
function unwrapLongitudes(latlngs) {
  if (!latlngs || latlngs.length < 2) return (latlngs || []).map(p => p.slice());
  const out = [latlngs[0].slice()];
  for (let i = 1; i < latlngs.length; i++) {
    const prevLon = out[i-1][1];
    let curLon = latlngs[i][1];
    while (curLon - prevLon >  180) curLon -= 360;
    while (curLon - prevLon < -180) curLon += 360;
    out.push([latlngs[i][0], curLon]);
  }
  return out;
}
function shiftLatLngs(latlngs, deltaLon) {
  return latlngs.map(p => [p[0], p[1] + deltaLon]);
}
function addWrappedPolyline(layer, latlngs, opts, tooltip) {
  if (!latlngs || latlngs.length < 2) return;
  [-360, 0, 360].forEach(d => {
    const pts = d === 0 ? latlngs : shiftLatLngs(latlngs, d);
    const line = L.polyline(pts, Object.assign({ noClip: true }, opts));
    if (tooltip) line.bindTooltip(tooltip);
    line.addTo(layer);
  });
}
function addWrappedPolygon(layer, latlngs, opts, tooltip) {
  if (!latlngs || latlngs.length < 3) return;
  [-360, 0, 360].forEach(d => {
    const pts = d === 0 ? latlngs : shiftLatLngs(latlngs, d);
    const poly = L.polygon(pts, Object.assign({ noClip: true }, opts));
    if (tooltip) poly.bindTooltip(tooltip);
    poly.addTo(layer);
  });
}
function addWrappedCircleMarker(layer, lat, lon, opts, tooltip) {
  [-360, 0, 360].forEach(d => {
    const m = L.circleMarker([lat, lon + d], opts);
    if (tooltip) m.bindTooltip(tooltip);
    m.addTo(layer);
  });
}
function splitAtAntimeridian(latlngs) {
  if (!latlngs || latlngs.length === 0) return [];
  if (latlngs.length === 1) return [[latlngs[0].slice()]];
  const segments = [];
  let cur = [latlngs[0].slice()];
  for (let i = 1; i < latlngs.length; i++) {
    const a = latlngs[i-1], b = latlngs[i];
    const dlon = b[1] - a[1];
    if (Math.abs(dlon) > 180) {
      const sign = a[1] > 0 ? 1 : -1;
      const bShifted = b[1] + sign * 360;
      const t = (sign * 180 - a[1]) / (bShifted - a[1] || 1e-9);
      const midLat = a[0] + t * (b[0] - a[0]);
      cur.push([midLat, sign * 180]);
      segments.push(cur);
      cur = [[midLat, -sign * 180], b.slice()];
    } else {
      cur.push(b.slice());
    }
  }
  if (cur.length > 0) segments.push(cur);
  return segments;
}
function buildCorridor(latlngs, widthFnNm) {
  if (latlngs.length < 2) return [];
  const right = [], left = [];
  for (let i = 0; i < latlngs.length; i++) {
    const brs = [];
    if (i > 0) brs.push(bearing(latlngs[i-1], latlngs[i]));
    if (i < latlngs.length - 1) brs.push(bearing(latlngs[i], latlngs[i+1]));
    const brAvg = avgBearing(brs);
    const widthM = (widthFnNm(i) ?? 0) * NM_M;
    if (widthM <= 0) continue;
    right.push(destination(latlngs[i], brAvg + Math.PI/2, widthM));
    left.push(destination(latlngs[i], brAvg - Math.PI/2, widthM));
  }
  return right.concat(left.reverse());
}
function fmt(v, d) {
  if (v === null || v === undefined || v === "") return "-";
  const n = parseFloat(v);
  return isNaN(n) ? "-" : n.toFixed(d ?? 3);
}
function attachMapResize(map, container) {
  if (!container || !window.ResizeObserver || !map) return;
  let rafId = 0;
  const ro = new ResizeObserver(() => {
    if (rafId) return;
    rafId = requestAnimationFrame(() => {
      rafId = 0;
      try { map.invalidateSize({ animate: false, pan: false }); } catch (e) {}
    });
  });
  ro.observe(container);
  map.on("unload remove", () => ro.disconnect());
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g,
    c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}
function dms(coord, type) {
  if (coord === null || coord === undefined) return "-";
  const abs = Math.abs(coord);
  const deg = Math.floor(abs);
  const minF = (abs - deg) * 60;
  const min = Math.floor(minF);
  const sec = Math.round((minF - min) * 60);
  const dir = type === "lat" ? (coord >= 0 ? "N" : "S") : (coord >= 0 ? "E" : "W");
  const pad = type === "lat" ? 2 : 3;
  return `${String(deg).padStart(pad,'0')}°${String(min).padStart(2,'0')}'${String(sec).padStart(2,'0')}" ${dir}`;
}

function pointInPolygon(lat, lon, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const yi = polygon[i][0], xi = polygon[i][1];
    const yj = polygon[j][0], xj = polygon[j][1];
    const denom = (yj - yi) || 1e-9;
    const intersect = ((yi > lat) !== (yj > lat))
      && (lon < (xj - xi) * (lat - yi) / denom + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}
const ZONE_LEVEL_RANK = { critical: 4, high: 3, medium: 2, low: 1, info: 0 };
function vesselZoneAlert(v) {
  if (v.latitude === null || v.latitude === undefined ||
      v.longitude === null || v.longitude === undefined ||
      !window.RISK_ZONES) {
    return { level: "normal", hits: [], top: null };
  }
  const hits = window.RISK_ZONES.filter(z =>
    pointInPolygon(v.latitude, v.longitude, z.coords));
  if (hits.length === 0) return { level: "normal", hits: [], top: null };
  hits.sort((a, b) => (ZONE_LEVEL_RANK[b.level] ?? -1) - (ZONE_LEVEL_RANK[a.level] ?? -1));
  const top = hits[0];
  const level = (top.level === "critical" || top.level === "high") ? "critical" : "warning";
  return { level, hits, top };
}

function computeAlerts(v) {
  const a = {};
  const T = _thresholds;

  const xtd = parseFloat(v.cross_track_distance_nm);
  const sf  = parseFloat(v.safety_frame_nm) || 1.0;
  const track = v.ais_track || [];
  const maxDev = track.reduce((m, p) => Math.max(m, p.deviation_nm || 0), 0);
  const worstDev = Math.max(isNaN(xtd) ? 0 : xtd, maxDev);
  const hasDevData = !isNaN(xtd) || track.length > 0;
  if (!hasDevData)                            a.route = "na";
  else if (worstDev >= sf * T.route.critical) a.route = "critical";
  else if (worstDev >= sf * T.route.warning)  a.route = "warning";
  else                                        a.route = "normal";

  if (v.sog === null || v.sog === undefined) a.speed = "na";
  else {
    const planSogs = (v.planned_track || []).filter(p => p.sog > 0).map(p => p.sog);
    const planAvg = planSogs.length ? planSogs.reduce((x,y)=>x+y,0)/planSogs.length : 0;
    if (planAvg === 0) a.speed = "na";
    else {
      const delta = Math.abs(v.sog - planAvg) / planAvg;
      if (v.sog < 0.5 && planAvg > 5)         a.speed = "warning";
      else if (delta > T.speed.critical)      a.speed = "critical";
      else if (delta > T.speed.warning)       a.speed = "warning";
      else                                    a.speed = "normal";
    }
  }

  const seaHash = (v.vessel_id * 9301 + 49297) % 233280;
  const seaLevel = seaHash / 233280;
  if (seaLevel > T.sea.critical)      a.sea = "critical";
  else if (seaLevel > T.sea.warning)  a.sea = "warning";
  else                                a.sea = "normal";

  const vmails = MAILS.filter(m => m.vessel_name === v.vessel_name);
  const hasWarn = vmails.some(m => m.warning_level === "Warning");
  const hasInfo = vmails.some(m => m.warning_level === "Information");
  if (vmails.length === 0) a.alert = "na";
  else if (hasWarn)        a.alert = "critical";
  else if (hasInfo)        a.alert = "warning";
  else                     a.alert = "normal";

  if (!v.ais_timestamp) a.comm = "na";
  else {
    const tsHash = (v.vessel_id * 7321 + 12345) % 100;
    if (tsHash > T.comm.critical)      a.comm = "critical";
    else if (tsHash > T.comm.warning)  a.comm = "warning";
    else                               a.comm = "normal";
  }

  if (v.open_event) {
    a.event = v.open_event.event_level === "Warning" ? "critical" : "warning";
  } else {
    a.event = "normal";
  }

  const pct = (typeof v.progress_pct === "number") ? v.progress_pct : null;
  const portHash = (v.vessel_id * 5779 + 38461) % 100;
  if (pct === null) a.port = "na";
  else if (pct > 92 || pct < 5) {
    if (portHash > T.port.critical)      a.port = "critical";
    else if (portHash > T.port.warning)  a.port = "warning";
    else                                 a.port = "normal";
  } else {
    if (portHash > 95)      a.port = "warning";
    else                    a.port = "normal";
  }

  const engHash = (v.vessel_id * 8419 + 7919) % 100;
  if (engHash > T.engine.critical)      a.engine = "critical";
  else if (engHash > T.engine.warning)  a.engine = "warning";
  else                                  a.engine = "normal";

  const za = vesselZoneAlert(v);
  a.zone = za.level;
  a._zone = za;

  const levels = DIM_KEYS.map(k => a[k]);
  if (levels.includes("critical"))      a.risk = "critical";
  else if (levels.includes("warning"))  a.risk = "warning";
  else if (levels.every(l => l === "na")) a.risk = "na";
  else                                  a.risk = "normal";
  return a;
}

function levelTag(level) {
  const txt = { critical: "Critical", warning: "Warning", normal: "Normal", na: "N/A" }[level] || level;
  return `<span class="alert-tag ${level}">${txt}</span>`;
}

function aisStatusFromSog(sog) {
  if (sog === null || sog === undefined) return { key: "unknown", label: "UNK", title: "AIS 狀態不明" };
  if (sog < 0.5) return { key: "moored", label: "MOOR", title: "繫泊（SOG < 0.5 kn）" };
  if (sog < 2)   return { key: "anchored", label: "ANC", title: "拋錨（0.5–2 kn）" };
  return { key: "under-way", label: "U/W", title: "航行中（≥ 2 kn）" };
}

function eventId(vessel_id, dimension, opened_at) {
  const ym = (opened_at || "").slice(0, 7).replace("-", "");
  return `${vessel_id}-${dimension}-${ym}`;
}
function syncEventsFromAlerts() {
  const seen = new Set();
  VESSELS.forEach(v => {
    const a = computeAlerts(v);
    DIM_KEYS.forEach(k => {
      const lvl = a[k];
      if (lvl !== "critical" && lvl !== "warning") return;
      const openedAt = v.calculated_at || new Date().toISOString().slice(0,16).replace("T"," ");
      const id = eventId(v.vessel_id, k, openedAt);
      seen.add(id);
      const existing = _events.find(e => e.id === id);
      if (existing) {
        existing.level = lvl;
        delete existing.cleared;
      } else {
        _events.push({
          id, vessel_id: v.vessel_id, vessel_name: v.vessel_name,
          dimension: k, level: lvl, opened_at: openedAt,
          status: "new", assignee: null, notes: [],
          history: [{ from: null, to: "new", at: openedAt, by: "system" }],
        });
      }
    });
  });
  _events.forEach(e => {
    if (!seen.has(e.id) && e.status !== "resolved") e.cleared = true;
  });
  saveEvents();
}
function transitionEvent(id, toStatus, byUser, noteText) {
  const e = _events.find(x => x.id === id);
  if (!e) return false;
  const now = new Date().toISOString().slice(0,16).replace("T"," ");
  e.history.push({ from: e.status, to: toStatus, at: now, by: byUser || "operator" });
  e.status = toStatus;
  if (noteText && noteText.trim()) {
    e.notes.push({ at: now, by: byUser || "operator", text: noteText.trim() });
  }
  saveEvents();
  return true;
}
function addEventNote(id, text, byUser) {
  const e = _events.find(x => x.id === id);
  if (!e || !text || !text.trim()) return false;
  const now = new Date().toISOString().slice(0,16).replace("T"," ");
  e.notes.push({ at: now, by: byUser || "operator", text: text.trim() });
  saveEvents();
  return true;
}
function assignEvent(id, assignee) {
  const e = _events.find(x => x.id === id);
  if (!e) return false;
  e.assignee = assignee || null;
  saveEvents();
  return true;
}
function eventsForVessel(vessel_id, includeResolved) {
  return _events
    .filter(e => e.vessel_id === vessel_id && (includeResolved || e.status !== "resolved"))
    .sort((a, b) => (b.opened_at || "").localeCompare(a.opened_at || ""));
}

}

    _fleetMapExpanded = !_fleetMapExpanded;
    document.getElementById("fleet-map-card").classList.toggle("expanded", _fleetMapExpanded);
  });
  document.getElementById("fleet-risk-btn").addEventListener("click", openRiskSheet);
  document.querySelectorAll(".vessel-card").forEach(el => {
    el.addEventListener("click", () => {
      const id = parseInt(el.dataset.vid, 10);
      openVesselDetail(id);
    });
  });

  drawFleetMap(filtered);
}

function vesselCardHtml(v, a) {
  const status = aisStatusFromSog(v.sog);
  const dims = DIM_KEYS.filter(k => a[k] === "critical" || a[k] === "warning");
  const dimChips = dims.length === 0
    ? `<span class="vc-dim normal">✓ 全部正常</span>`
    : dims.map(k => `
        <span class="vc-dim ${a[k]}">
          ${DIM_META[k].icon(a[k] === "critical" ? "#ff8a8a" : "#f5b753")}
          ${DIM_META[k].label}
        </span>`).join("");

  const pct = v.progress_pct;
  const progressColor = a.route === "critical" ? "#ff4d4f"
                      : a.route === "warning"  ? "#f5a623"
                      : "#4a9eff";
  const sog = v.sog !== null && v.sog !== undefined ? v.sog.toFixed(1) : "-";
  const cog = v.cog !== null && v.cog !== undefined ? Math.round(v.cog) : "-";
  const sf  = v.safety_frame_nm || 1.0;
  const xtd = parseFloat(v.cross_track_distance_nm);
  const xtdStr = !isNaN(xtd) ? `${xtd.toFixed(2)} / ${sf.toFixed(2)}` : "-";

  return `
    <div class="vessel-card ${a.risk}" data-vid="${v.vessel_id}">
      <div class="vc-head">
        <span class="vc-pill">${escapeHtml(v.imo)}</span>
        <span class="vc-name">${escapeHtml(v.vessel_name)}</span>
        <span class="vc-risk ${a.risk}">${a.risk === "na" ? "N/A" : a.risk}</span>
      </div>
      <div class="vc-dims">${dimChips}</div>
      <div class="vc-meta">
        <span><b>SOG</b> ${sog} kn</span>
        <span><b>COG</b> ${cog}°</span>
        <span><b>XTD</b> ${xtdStr} NM</span>
        <span><b>AIS</b> <span class="ais-status ${status.key}" style="padding:1px 6px;font-size:11px">${status.label}</span></span>
      </div>
      ${pct !== undefined ? `
        <div class="vc-progress">
          <span>進度</span>
          <div class="vc-bar"><div style="width:${pct}%;background:${progressColor}"></div></div>
          <span class="mono">${pct}%</span>
        </div>` : ""}
    </div>`;
}

function fleetShipIcon(v, alerts, size) {
  const cog = v.cog || 0;
  const color = alerts.risk === "critical" ? "#ff4d4f"
              : alerts.risk === "warning"  ? "#f5a623"
              : "#4cd97a";
  const html = `
    <svg width="${size||20}" height="${size||20}" viewBox="-20 -20 40 40" style="transform: rotate(${cog}deg);filter:drop-shadow(0 1px 2px rgba(0,0,0,0.7))">
      <path d="M 0 -16 L 11 14 L 0 8 L -11 14 Z" fill="${color}" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
    </svg>`;
  return L.divIcon({ html, className: "", iconSize: [size||20, size||20], iconAnchor: [(size||20)/2, (size||20)/2] });
}

function drawFleetMap(filtered) {
  if (_fleetMap) { _fleetMap.remove(); _fleetMap = null; }
  const el = document.getElementById("fleet-map");
  if (!el) return;
  const map = L.map("fleet-map", { zoomControl: false, worldCopyJump: true, attributionControl: false }).setView([20, 60], 2);
  _fleetMap = map;
  L.control.zoom({ position: "bottomright" }).addTo(map);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; OSM &copy; CARTO', subdomains: "abcd", maxZoom: 19,
  }).addTo(map);
  attachMapResize(map, el);

  drawRiskZones(map);

  const points = [];
  filtered.forEach(({ v, a }) => {
    if (v.latitude === null) return;
    const status = aisStatusFromSog(v.sog);
    const tip = `<b>${escapeHtml(v.vessel_name)}</b><br>IMO ${v.imo}<br>SOG ${fmt(v.sog,1)} kn · ${status.label}`;
    [-360, 0, 360].forEach(dx => {
      L.marker([v.latitude, v.longitude + dx], {
        icon: fleetShipIcon(v, a, 18),
      }).bindTooltip(tip, { direction: "top", offset: [0, -4] })
       .on("click", () => openVesselDetail(v.vessel_id))
       .addTo(map);
    });
    points.push([v.latitude, v.longitude]);
  });

  setTimeout(() => map.invalidateSize(), 80);
  if (points.length) {
    const lons = points.map(p => p[1]);
    const span = Math.max(...lons) - Math.min(...lons);
    const fitPts = span > 180
      ? points.map(p => [p[0], p[1] < 0 ? p[1] + 360 : p[1]])
      : points;
    map.fitBounds(L.latLngBounds(fitPts).pad(0.25), { maxZoom: 5 });
  }
}

function drawRiskZones(map) {
  _fleetRiskLayers = {};
  if (!window.RISK_ZONES || !window.RISK_ZONE_CATEGORIES) return;

  const buckets = {};
  window.RISK_ZONES.forEach(z => {
    if (!buckets[z.cat]) buckets[z.cat] = [];
    buckets[z.cat].push(z);
  });

  window.RISK_ZONE_CATEGORIES.forEach(cat => {
    const zones = buckets[cat.key] || [];
    const group = L.layerGroup();
    zones.forEach(z => {
      const fillOpacity = z.level === "critical" ? 0.28
                       : z.level === "high"     ? 0.22
                       : z.level === "medium"   ? 0.16
                       :                          0.12;
      const popupHtml = `
        <div style="min-width:180px;max-width:240px;font-size:12px">
          <div style="font-weight:600;color:${cat.color};margin-bottom:3px">${escapeHtml(cat.label)} · Lv. ${z.level}</div>
          <div style="font-weight:600;color:#e4eaf2">${escapeHtml(z.name)}</div>
          <div style="color:#7c8a9e">${escapeHtml(z.name_en || "")}</div>
          ${z.desc ? `<div style="color:#c4cdda;margin-top:4px">${escapeHtml(z.desc)}</div>` : ""}
        </div>`;
      addWrappedPolygon(group, z.coords, {
        color: cat.color, weight: 1.2, opacity: 0.85,
        fillColor: cat.color, fillOpacity,
        dashArray: cat.key === "eca" || cat.key === "protected" ? "4 3" : null,
      });
      group.eachLayer(layer => {
        if (!layer._rzBound && layer instanceof L.Polygon) {
          layer.bindPopup(popupHtml, { maxWidth: 260 });
          layer._rzBound = true;
        }
      });
    });
    _fleetRiskLayers[cat.key] = group;
    if (_riskLayerState[cat.key]) group.addTo(map);
  });
}
function setRiskLayer(key, enabled) {
  const g = _fleetRiskLayers[key];
  if (!g || !_fleetMap) return;
  if (enabled) { if (!_fleetMap.hasLayer(g)) g.addTo(_fleetMap); }
  else { if (_fleetMap.hasLayer(g)) _fleetMap.removeLayer(g); }
}

function openRiskSheet() {
  if (!window.RISK_ZONE_CATEGORIES) return;
  const buckets = {};
  (window.RISK_ZONES || []).forEach(z => { buckets[z.cat] = (buckets[z.cat] || 0) + 1; });
  const rows = window.RISK_ZONE_CATEGORIES.map(c => `
    <label>
      <input type="checkbox" data-rz="${c.key}" ${_riskLayerState[c.key] ? "checked" : ""} style="width:18px;height:18px;accent-color:${c.color}">
      <span class="rz-swatch" style="background:${c.color}40;border:1px solid ${c.color}"></span>
      <span>${escapeHtml(c.label)}<small style="display:block;color:#7c8a9e">${escapeHtml(c.label_en || "")}</small></span>
      <span class="rz-cnt">${buckets[c.key] || 0}</span>
    </label>`).join("");
  document.getElementById("rz-sheet-content").innerHTML = rows;
  document.getElementById("rz-sheet-content").querySelectorAll("input[data-rz]").forEach(cb => {
    cb.addEventListener("change", () => {
      const k = cb.getAttribute("data-rz");
      _riskLayerState[k] = cb.checked;
      setRiskLayer(k, cb.checked);
      persistRiskLayerState();
    });
  });
  document.getElementById("sheet-mask").classList.add("open");
  document.getElementById("rz-sheet").classList.add("open");
}

let _detailMap = null;
let _detailLayers = {};
let _detailLayerState = { planned: true, corridor: true, ais: true, ship: true, mails: true };

function openVesselDetail(vesselId) {

  const v = VESSELS.find(x => x.vessel_id === vesselId);

  const sf  = v.safety_frame_nm || 1.0;

  const xtdPct = Math.min(100, (xtd / sf) * 100);
  const xtdColor = xtd >= sf ? "#ff4d4f" : xtd >= sf * 0.7 ? "#f5a623" : "#4cd97a";

    <div class="detail-map-wrap">

    </div>

    <div class="section-title">XTD 即時讀值 <span class="en">/ Cross-Track Distance</span></div>
    <div class="card">
      <div class="xtd-block">
        <div class="xtd-row">
          <span class="xtd-label">XTD / Safety</span>

        </div>
        <div class="xtd-bar">
          <div class="fill" style="width:${xtdPct}%;background:${xtdColor}"></div>
          <div class="threshold" style="left:70%"></div>

        <div class="xtd-foot">
          <span>歷史最大 ${maxDev.toFixed(2)} NM</span>

    <div class="section-title">各維度警示 <span class="en">/ Alert Dimensions</span></div>

    <div class="card">

          <span class="k">開始</span><span class="v mono t-sm">${v.open_event.start_time}</span>
          <span class="k">最後偵測</span><span class="v mono t-sm">${v.open_event.last_detected_time}</span>
          <span class="k">最大偏移</span><span class="v mono">${fmt(v.open_event.max_deviation_distance_nm,2)} NM</span>
        </div>
      </div>` : ""}

    <div class="bottom-spacer" style="height:24px"></div>
  `;

  document.getElementById("detail-overlay").classList.add("open");
  document.getElementById("main").classList.add("no-scroll");
  drawDetailMap(v);
}

function closeDetailOverlay() {
  document.getElementById("detail-overlay").classList.remove("open");
  document.getElementById("main").classList.remove("no-scroll");
  _selectedVesselId = null;
  if (_detailMap) { _detailMap.remove(); _detailMap = null; }
}

function dimDescriptionShort(v, k, a) {
  const lvl = a[k];
  const sf = v.safety_frame_nm || 1.0;
  const xtd = parseFloat(v.cross_track_distance_nm) || 0;
  const maxDev = (v.ais_track || []).reduce((m, p) => Math.max(m, p.deviation_nm || 0), 0);
  switch (k) {
    case "route":
      if (lvl === "na") return "無 AIS 軌跡";
      return `目前 XTD ${xtd.toFixed(2)} / Max ${maxDev.toFixed(2)} NM`;
    case "speed": {
      if (v.sog === null) return "無 SOG 資料";
      const planSogs = (v.planned_track || []).filter(p => p.sog > 0).map(p => p.sog);
      const planAvg = planSogs.length ? planSogs.reduce((x,y)=>x+y,0)/planSogs.length : 0;
      return `目前 ${v.sog.toFixed(1)} kn vs 計畫 ${planAvg.toFixed(1)} kn`;
    }
    case "sea": {
      const seaHash = (v.vessel_id * 9301 + 49297) % 233280;
      const wave = (1 + seaHash / 233280 * 5).toFixed(1);
      return `估計浪高 ${wave} m`;
    }
    case "alert": {
      const vmails = MAILS.filter(m => m.vessel_name === v.vessel_name);
      if (!vmails.length) return "無 StormGeo 通知";
      const warns = vmails.filter(m => m.warning_level === "Warning").length;
      return `${vmails.length} 封通知（Warning ${warns}）`;
    }
    case "comm":
      return v.ais_timestamp ? `最新 ${v.ais_timestamp.slice(5,16)}` : "無 AIS 訊號";
    case "event":
      return v.open_event ? `#${v.open_event.id} · ${v.open_event.event_level}` : "無 Open 事件";
    case "port": {
      const pct = v.progress_pct;
      if (pct === undefined) return "無進度";
      if (pct > 92) return `進港相位 ${pct}%`;
      if (pct < 5)  return `離港相位 ${pct}%`;
      return `航行中 ${pct}%`;
    }
    case "engine": {
      const engHash = (v.vessel_id * 8419 + 7919) % 100;
      const rpm = Math.round(70 + engHash * 0.6);
      return `RPM ${rpm}`;
    }
    case "zone": {
      const info = a._zone;
      if (!info || info.hits.length === 0) return "未進入風險區";
      const more = info.hits.length > 1 ? ` +${info.hits.length - 1}` : "";
      return `${info.top.name}（Lv. ${info.top.level}）${more}`;
    }
    default: return "";
  }
}

function drawDetailMap(v) {
  if (_detailMap) { _detailMap.remove(); _detailMap = null; }
  _detailLayers = {};
  const map = L.map("detail-map", { zoomControl: false, minZoom: 2, attributionControl: false }).setView([22.3, 118.5], 4);
  _detailMap = map;
  L.control.zoom({ position: "bottomright" }).addTo(map);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    subdomains: "abcd", maxZoom: 19,
  }).addTo(map);
  attachMapResize(map, document.getElementById("detail-map"));

  map.createPane("corridorPane").style.zIndex = 400;
  map.createPane("plannedPane").style.zIndex = 410;
  map.createPane("aisPane").style.zIndex = 420;

  const a = computeAlerts(v);
  const plannedLL = unwrapLongitudes(v.planned_track.map(p => [p.latitude, p.longitude]));
  const aisLL = unwrapLongitudes((v.ais_track || []).map(p => [p.latitude, p.longitude]));
  const plannedSegs = splitAtAntimeridian(v.planned_track.map(p => [p.latitude, p.longitude]));

  _detailLayers.planned = L.layerGroup();
  plannedSegs.forEach(seg => {
    addWrappedPolyline(_detailLayers.planned, seg, {
      pane: "plannedPane", color: "#4a9eff", weight: 3, opacity: 0.95, dashArray: "10 8",
    }, "計畫航線");
  });
  v.planned_track.forEach(w => {
    addWrappedCircleMarker(_detailLayers.planned, w.latitude, w.longitude, {
      pane: "plannedPane", radius: 3, color: "#4a9eff", fillColor: "#0d0d0d", fillOpacity: 1, weight: 1.5,
    }, `#${w.index} · ${w.position_type}<br>${w.date || ""}`);
  });

  _detailLayers.corridor = L.layerGroup();
  const sfWidth = v.safety_frame_nm || 1.0;
  plannedSegs.forEach(seg => {
    if (seg.length < 2) return;
    const poly = buildCorridor(seg, () => sfWidth);
    addWrappedPolygon(_detailLayers.corridor, poly, {
      pane: "corridorPane", color: "#4a9eff", weight: 1,
      fillColor: "#4a9eff", fillOpacity: 0.10, dashArray: "3 4",
    });
  });

  _detailLayers.ais = L.layerGroup();
  if (v.ais_track && v.ais_track.length >= 2) {
    const pts = v.ais_track;
    let segStart = 0;
    for (let i = 1; i <= pts.length; i++) {
      const endOfSeg = (i === pts.length) || (pts[i].is_deviated !== pts[segStart].is_deviated);
      if (endOfSeg) {
        const segPts = pts.slice(segStart, i + (i < pts.length ? 1 : 0));
        const isDev = pts[segStart].is_deviated;
        splitAtAntimeridian(segPts.map(p => [p.latitude, p.longitude])).forEach(sub => {
          addWrappedPolyline(_detailLayers.ais, sub, {
            pane: "aisPane",
            color: isDev ? "#ff6b6b" : "#4cd97a",
            weight: isDev ? 4 : 3, opacity: 0.95,
          });
        });
        segStart = i;
      }
    }
    pts.forEach(p => {
      addWrappedCircleMarker(_detailLayers.ais, p.latitude, p.longitude, {
        pane: "aisPane",
        radius: p.is_deviated ? 4 : 3,
        color: p.is_deviated ? "#ff6b6b" : "#4cd97a",
        fillColor: p.is_deviated ? "#ff6b6b" : "#0d0d0d",
        fillOpacity: p.is_deviated ? 0.8 : 1, weight: p.is_deviated ? 2 : 1,
      });
    });
  }

  _detailLayers.ship = L.layerGroup();
  if (v.latitude !== null) {
    [-360, 0, 360].forEach(d => {
      L.marker([v.latitude, v.longitude + d], {
        icon: fleetShipIcon(v, a, 22), zIndexOffset: 1000,
      }).addTo(_detailLayers.ship);
    });
  }

  _detailLayers.mails = L.layerGroup();
  MAILS.filter(m => m.vessel_name === v.vessel_name && m.latitude !== null).forEach(m => {
    const isWarn = m.warning_level === "Warning";
    const bg = isWarn ? "#c0392b" : "#1c5a96";
    const html = `<div style="background:${bg};color:#fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);width:20px;height:20px;border:2px solid #fff;display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:12px;font-weight:700">!</span></div>`;
    const popupHtml = `
      <div class="mail-popup">
        <div class="ml-time">${m.warning_event_time || "-"}</div>
        <div style="margin:2px 0;font-weight:600;color:#e4eaf2">${m.warning_level} (${m.warning_code})</div>
        <div style="color:#c4cdda;margin-top:4px;line-height:1.5">${escapeHtml((m.warning_description||"").substring(0,140))}${(m.warning_description||"").length>140?'…':''}</div>
      </div>`;
    L.marker([m.latitude, m.longitude], {
      icon: L.divIcon({ html, className: "", iconSize: [20,20], iconAnchor: [10,20] })
    }).bindPopup(popupHtml, { maxWidth: 280 }).addTo(_detailLayers.mails);
  });

  Object.keys(_detailLayers).forEach(k => {
    if (_detailLayerState[k]) _detailLayers[k].addTo(map);
  });

  setTimeout(() => map.invalidateSize(), 80);
  const all = plannedLL.slice().concat(aisLL);
  if (all.length) map.fitBounds(L.latLngBounds(all).pad(0.15));
}

function openLayerSheet() {
  const v = VESSELS.find(x => x.vessel_id === _selectedVesselId);
  if (!v) return;
  const aisCount = (v.ais_track || []).length;
  const mailCount = MAILS.filter(m => m.vessel_name === v.vessel_name && m.latitude !== null).length;
  const rows = [
    ["planned",  `計畫航線（含 Waypoints）`],
    ["corridor", `Safety Frame 走廊`],
    ["ais",      `AIS 航跡（${aisCount} 點）`],
    ["ship",     `船舶目前位置`],
    ["mails",    `Warning Mail（${mailCount}）`],
  ].map(([k, lbl]) => `
    <label>
      <input type="checkbox" data-ly="${k}" ${_detailLayerState[k] ? "checked" : ""}>
      <span>${lbl}</span>
    </label>`).join("");
  document.getElementById("layer-sheet-content").innerHTML = rows;
  document.getElementById("layer-sheet-content").querySelectorAll("input[data-ly]").forEach(cb => {
    cb.addEventListener("change", () => {
      const k = cb.getAttribute("data-ly");
      _detailLayerState[k] = cb.checked;
      const g = _detailLayers[k];
      if (!g || !_detailMap) return;
      if (cb.checked) { if (!_detailMap.hasLayer(g)) g.addTo(_detailMap); }
      else { if (_detailMap.hasLayer(g)) _detailMap.removeLayer(g); }
    });
  });
  document.getElementById("sheet-mask").classList.add("open");
  document.getElementById("layer-sheet").classList.add("open");
}

function closeAllSheets() {
  document.getElementById("sheet-mask").classList.remove("open");
  document.getElementById("layer-sheet").classList.remove("open");
  document.getElementById("rz-sheet").classList.remove("open");
}

/* ─────────────────────────────────────────────────────────────────
 * Events page
 * ───────────────────────────────────────────────────────────────── */
function renderEvents() {
  syncEventsFromAlerts();

  const filtered = _events.filter(e => {
    if (_eventFilter.status !== "ALL" && e.status !== _eventFilter.status) return false;
    if (_eventFilter.level  !== "ALL" && e.level  !== _eventFilter.level)  return false;
    return true;
  });
  const statusRank = { new: 0, ack: 1, in_progress: 2, resolved: 3 };
  const levelRank  = { critical: 0, warning: 1 };
  filtered.sort((a, b) => {
    const s = statusRank[a.status] - statusRank[b.status];
    if (s !== 0) return s;
    const l = levelRank[a.level] - levelRank[b.level];
    if (l !== 0) return l;
    return (b.opened_at || "").localeCompare(a.opened_at || "");
  });

  const counts = {
    total: _events.length,
    new:         _events.filter(e => e.status === "new").length,
    ack:         _events.filter(e => e.status === "ack").length,
    in_progress: _events.filter(e => e.status === "in_progress").length,
    resolved:    _events.filter(e => e.status === "resolved").length,
  };
  document.getElementById("header-sub").textContent =
    `${counts.total} 件 · ${counts.new + counts.ack + counts.in_progress} 未結案`;

  const statusChips = [
    ["ALL", "全部"],
    ["new", `新立案 ${counts.new}`],
    ["ack", `已認可 ${counts.ack}`],
    ["in_progress", `處理中 ${counts.in_progress}`],
    ["resolved", `已解決 ${counts.resolved}`],
  ].map(([k, lbl]) => `<button class="chip${_eventFilter.status===k?' active':''}" data-status="${k}">${lbl}</button>`).join("");

  const levelChips = [
    ["ALL", "全部等級"],
    ["critical", "Critical"],
    ["warning", "Warning"],
  ].map(([k, lbl]) => `<button class="chip${_eventFilter.level===k?' active':''}" data-level="${k}">${lbl}</button>`).join("");

  const cards = filtered.length === 0
    ? `<div class="empty"><div class="ico">✓</div>無符合條件的事件</div>`
    : filtered.map(e => {
        const dim = DIM_META[e.dimension];
        return `
          <div class="ev-card${e.cleared ? " cleared" : ""}" onclick="openEventModal('${e.id}')">
            <div class="ev-head">
              <span class="ev-dim">${dim.icon()} ${dim.label}</span>
              ${levelTag(e.level)}
              ${statusBadge(e.status)}
            </div>
            <div style="font-size:14px;color:#e4eaf2;font-weight:500;margin-bottom:4px">${escapeHtml(e.vessel_name)} <span class="muted" style="font-weight:400;font-size:12px">IMO ${VESSELS.find(v=>v.vessel_id===e.vessel_id)?.imo||"-"}</span></div>
            <div class="ev-meta">
              <span>開立 ${e.opened_at.slice(5,16)}</span>
              ${e.assignee ? `<span>· ${escapeHtml(e.assignee)}</span>` : '<span class="muted">· 未指派</span>'}
              ${e.notes.length > 0 ? `<span>· 💬 ${e.notes.length}</span>` : ""}
              ${e.cleared ? `<span class="muted">· cleared</span>` : ""}
            </div>
          </div>`;
      }).join("");

  document.getElementById("main").innerHTML = `
    <div class="page-title">
      <h2>事件處理</h2>
      <span class="sub">Events · ${filtered.length}/${counts.total}</span>
    </div>
    <div class="pill-row">
      <span class="pill"><span style="background:#ff8a8a;width:8px;height:8px;border-radius:50%"></span>New · <b>${counts.new}</b></span>
      <span class="pill"><span style="background:#f5b753;width:8px;height:8px;border-radius:50%"></span>Ack · <b>${counts.ack}</b></span>
      <span class="pill"><span style="background:#7ec5ff;width:8px;height:8px;border-radius:50%"></span>處理中 · <b>${counts.in_progress}</b></span>
      <span class="pill"><span style="background:#6ee094;width:8px;height:8px;border-radius:50%"></span>Resolved · <b>${counts.resolved}</b></span>
    </div>
    <div class="chip-row" id="ev-status-chips">${statusChips}</div>
    <div class="chip-row" id="ev-level-chips">${levelChips}</div>
    ${cards}
    <div class="bottom-spacer"></div>
  `;

  document.querySelectorAll("#ev-status-chips .chip").forEach(c => {
    c.addEventListener("click", () => { _eventFilter.status = c.dataset.status; renderEvents(); });
  });
  document.querySelectorAll("#ev-level-chips .chip").forEach(c => {
    c.addEventListener("click", () => { _eventFilter.level = c.dataset.level; renderEvents(); });
  });
}

window.openEventModal = function(evId) {
  const e = _events.find(x => x.id === evId);
  if (!e) return;
  const v = VESSELS.find(x => x.vessel_id === e.vessel_id);
  const dim = DIM_META[e.dimension];
  const a = v ? computeAlerts(v) : null;
  const desc = v ? dimDescriptionShort(v, e.dimension, a) : "";

  const trans = EVENT_TRANSITIONS[e.status] || [];
  const transBtns = trans.map(([to, label]) =>
    `<button class="trans-btn${to === "new" || to === "ack" ? " secondary" : ""}" onclick="doTransition('${e.id}','${to}')">${label}</button>`
  ).join("");

  const historyHtml = e.history.map(h => `
    <div class="history-item">
      <span class="h-time mono">${h.at}</span>
      <span class="h-by">${escapeHtml(h.by)}</span>
      <span class="h-arrow">${h.from ? `${EVENT_STATUSES[h.from]?.cn || h.from}` : "—"} → ${EVENT_STATUSES[h.to]?.cn || h.to}</span>
    </div>`).join("");

  const notesHtml = e.notes.length === 0
    ? `<div class="muted t-sm">尚無備註</div>`
    : e.notes.map(n => `
      <div class="note-item">
        <div class="note-head">${n.at} · ${escapeHtml(n.by)}</div>
        <div>${escapeHtml(n.text)}</div>
      </div>`).join("");

  const assignOpts = ['<option value="">未指派 / Unassigned</option>']
    .concat(OPERATORS.map(o => `<option value="${o}"${e.assignee===o?' selected':''}>${o}</option>`))
    .join("");

  document.getElementById("ev-h-title").innerHTML = `${dim.icon("#9ec5ff")} ${dim.label}`;
  document.getElementById("ev-modal-body").innerHTML = `
    <div style="margin-bottom:10px">
      <div class="mono t-sm muted">${e.id}</div>
      <div style="font-size:16px;color:#e4eaf2;font-weight:600;margin-top:2px">${escapeHtml(e.vessel_name)}</div>
      <div class="t-sm muted">IMO ${v?.imo || "-"} ${e.cleared ? '· 條件已消失' : ''}</div>
    </div>

    <h4>當前狀態</h4>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      ${statusBadge(e.status)}
      ${levelTag(e.level)}
      <span class="muted t-sm">開立 ${e.opened_at}</span>
    </div>

    <h4>警示內容</h4>
    <div style="font-size:14px;color:#d8dee9;background:#1a1a1a;padding:10px 12px;border-radius:6px">${desc}</div>

    <h4>狀態轉換</h4>
    <div class="trans-buttons">${transBtns || '<span class="muted t-sm">無可用轉換</span>'}</div>

    <h4>指派</h4>
    <select class="ev-select" id="ev-assign" onchange="doAssign('${e.id}', this.value)">${assignOpts}</select>

    <h4>新增備註</h4>
    <textarea class="note-input" id="ev-note-input" placeholder="輸入備註…"></textarea>
    <div style="text-align:right;margin-top:8px">
      <button class="trans-btn secondary" onclick="submitNote('${e.id}')">送出備註</button>
    </div>

    <h4>備註紀錄 (${e.notes.length})</h4>
    <div>${notesHtml}</div>

    <h4>狀態歷程</h4>
    <div>${historyHtml}</div>
    <div class="bottom-spacer"></div>
  `;
  document.getElementById("ev-modal").classList.add("open");
};
window.closeEventModal = function() {
  document.getElementById("ev-modal").classList.remove("open");
};
window.doTransition = function(evId, toStatus) {
  const assignee = document.getElementById("ev-assign")?.value || null;
  const noteText = document.getElementById("ev-note-input")?.value || "";
  transitionEvent(evId, toStatus, assignee || "operator", noteText);
  showToast(`已轉換至：${EVENT_STATUSES[toStatus]?.cn || toStatus}`);
  openEventModal(evId);
  if (_currentTab === "events") renderEvents();
};
window.doAssign = function(evId, assignee) {
  assignEvent(evId, assignee || null);
  showToast(assignee ? `已指派：${assignee}` : "已清除指派");
  if (_currentTab === "events") renderEvents();
};
window.submitNote = function(evId) {
  const ta = document.getElementById("ev-note-input");
  if (!ta || !ta.value.trim()) return;
  addEventNote(evId, ta.value, document.getElementById("ev-assign")?.value || "operator");
  ta.value = "";
  showToast("已新增備註");
  openEventModal(evId);
};

/* ─────────────────────────────────────────────────────────────────
 * Timeline page
 * ───────────────────────────────────────────────────────────────── */
function renderTimeline() {
  const items = [];
  MAILS.forEach(m => {
    items.push({
      time: m.warning_event_time || m.received_time,
      kind: m.warning_level === "Warning" ? "critical" : "info",
      vessel: m.vessel_name,
      title: `${m.warning_level} · ${m.warning_code}`,
      body: (m.warning_description || "").substring(0, 160) + ((m.warning_description||"").length > 160 ? "…" : ""),
    });
  });
  VESSELS.forEach(v => {
    if (v.open_event) {
      items.push({
        time: v.open_event.start_time,
        kind: v.open_event.event_level === "Warning" ? "critical" : "warning",
        vessel: v.vessel_name,
        title: `Open Event #${v.open_event.id} · ${v.open_event.event_level}`,
        body: `最大偏移 ${fmt(v.open_event.max_deviation_distance_nm,2)} NM`,
      });
    }
  });
  items.sort((a, b) => (b.time || "").localeCompare(a.time || ""));
  document.getElementById("header-sub").textContent = `${items.length} 筆警示紀錄`;

  const html = items.length === 0
    ? `<div class="empty">無警示紀錄</div>`
    : `<div class="tl-list">${items.map(it => `
        <div class="tl-item ${it.kind}">
          <div class="tl-head">
            <span class="tl-title">${escapeHtml(it.title)}<span class="tl-vessel">${escapeHtml(it.vessel)}</span></span>
            <span class="tl-time mono">${escapeHtml(it.time || "-")}</span>
          </div>
          <div class="tl-body">${escapeHtml(it.body)}</div>
        </div>`).join("")}</div>`;

  document.getElementById("main").innerHTML = `
    <div class="page-title">
      <h2>警示時間線</h2>
      <span class="sub">Timeline · ${items.length} 筆</span>
    </div>
    ${html}
    <div class="bottom-spacer"></div>
  `;
}

/* ─────────────────────────────────────────────────────────────────
 * Thresholds page
 * ───────────────────────────────────────────────────────────────── */
function renderThresholds() {
  const cards = Object.keys(THRESHOLD_META).map(k => {
    const m = THRESHOLD_META[k];
    const cur = _thresholds[k];
    const def = DEFAULT_THRESHOLDS[k];
    const dirty = (cur.warning !== def.warning) || (cur.critical !== def.critical);
    const stepperHtml = (lvl) => `
      <div class="th-stepper">
        <button type="button" class="th-step-up" data-k="${k}" data-lvl="${lvl}" aria-label="增加">
          <svg viewBox="0 0 12 12"><path d="M2 8 L6 4 L10 8"/></svg>
        </button>
        <button type="button" class="th-step-down" data-k="${k}" data-lvl="${lvl}" aria-label="減少">
          <svg viewBox="0 0 12 12"><path d="M2 4 L6 8 L10 4"/></svg>
        </button>
      </div>`;
    return `
      <div class="th-card" data-k="${k}">
        <div class="th-head">
          ${DIM_META[k]?.icon ? DIM_META[k].icon() : ""}
          <b>${m.label}</b>
          ${dirty ? '<span class="modified">已修改</span>' : ""}
        </div>
        <div class="th-sub">${m.unitShort} · 範圍 ${m.range} · 預設 W ${def.warning} / C ${def.critical}</div>
        <div class="th-fields">
          <div class="th-field">
            <span class="th-label warning">Warning ≥</span>
            <div class="th-input-wrap">
              <input type="number" class="th-input" data-k="${k}" data-lvl="warning"
                     value="${cur.warning}" step="${m.step}" min="${m.min}" max="${m.max}"
                     style="color:#f5b753">
              ${stepperHtml("warning")}
              <span class="th-unit">${escapeHtml(m.unitShort)}</span>
            </div>
          </div>
          <div class="th-field">
            <span class="th-label critical">Critical ≥</span>
            <div class="th-input-wrap">
              <input type="number" class="th-input" data-k="${k}" data-lvl="critical"
                     value="${cur.critical}" step="${m.step}" min="${m.min}" max="${m.max}"
                     style="color:#ff8a8a">
              ${stepperHtml("critical")}
              <span class="th-unit">${escapeHtml(m.unitShort)}</span>
            </div>
          </div>
        </div>
      </div>`;
  }).join("");

  const dirtyCount = Object.keys(THRESHOLD_META).filter(k => {
    const cur = _thresholds[k], def = DEFAULT_THRESHOLDS[k];
    return (cur.warning !== def.warning) || (cur.critical !== def.critical);
  }).length;
  document.getElementById("header-sub").textContent = dirtyCount > 0
    ? `${dirtyCount} 項已修改`
    : `全部為預設值`;

  document.getElementById("main").innerHTML = `
    <div class="page-title">
      <h2>閾值設定</h2>
      <span class="sub">Thresholds</span>
    </div>
    <div class="th-trigger-info">
      <b>觸發邏輯</b><br>
      ・<b>route</b>：max(目前 XTD, 歷史最大) ≥ SF × 閾值<br>
      ・<b>speed</b>：|SOG − 計畫| / 計畫 &gt; 閾值<br>
      ・<b>sea / comm / port / engine</b>：對應分數 &gt; 閾值<br>
      <span class="t-sm">儲存後立即重評，會自動補立 / cleared 標記事件</span>
    </div>
    ${cards}
    <div class="th-actions">
      <span class="saved-tip" id="th-saved-tip"></span>
      <button class="btn-reset" id="th-reset">恢復預設</button>
      <button class="btn-save" id="th-save">儲存</button>
    </div>
  `;

  document.getElementById("th-save").addEventListener("click", saveThresholdsFromPage);
  document.getElementById("th-reset").addEventListener("click", () => {
    resetThresholds();
    syncEventsFromAlerts();
    renderThresholds();
    showToast("已恢復預設");
  });
  document.querySelectorAll("#main .th-stepper button").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = btn.closest(".th-input-wrap").querySelector(".th-input");
      try {
        if (btn.classList.contains("th-step-up")) input.stepUp();
        else                                      input.stepDown();
      } catch (e) {}
      input.dispatchEvent(new Event("input", { bubbles: true }));
    });
  });
}
function saveThresholdsFromPage() {
  document.querySelectorAll("#main .th-input").forEach(el => {
    const k = el.dataset.k, lvl = el.dataset.lvl;
    const v = parseFloat(el.value);
    if (!isNaN(v) && _thresholds[k]) _thresholds[k][lvl] = v;
  });
  saveThresholds();
  syncEventsFromAlerts();
  renderThresholds();
  showToast(`已儲存 ${new Date().toLocaleTimeString()}`);
}

/* ─────────────────────────────────────────────────────────────────
 * Toast
 * ───────────────────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById("toast");
  if (!t) return;
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

/* ─────────────────────────────────────────────────────────────────
 * Boot
 * ───────────────────────────────────────────────────────────────── */
loadThresholds();
loadEvents();
syncEventsFromAlerts();

document.querySelectorAll(".m-tab").forEach(t => {
  t.addEventListener("click", () => setTab(t.dataset.tab));
});
document.getElementById("detail-back").addEventListener("click", closeDetailOverlay);
document.getElementById("detail-layer-btn").addEventListener("click", openLayerSheet);
document.getElementById("sheet-mask").addEventListener("click", closeAllSheets);
document.getElementById("layer-sheet-close").addEventListener("click", closeAllSheets);
document.getElementById("rz-sheet-close").addEventListener("click", closeAllSheets);
document.getElementById("ev-modal-close").addEventListener("click", closeEventModal);
document.getElementById("ev-modal").addEventListener("click", e => {
  if (e.target.id === "ev-modal") closeEventModal();
});
document.getElementById("header-action").addEventListener("click", () => {
  syncEventsFromAlerts();
  render();
  showToast("已重新整理");
});

// 更新事件 tab 上的紅點 badge
function updateTabBadge() {
  const tab = document.getElementById("tab-events");
  if (!tab) return;
  const open = _events.filter(e => e.status !== "resolved").length;
  let badge = tab.querySelector(".tab-badge");
  if (open > 0) {
    if (!badge) {
      badge = document.createElement("span");
      badge.className = "tab-badge";
      tab.appendChild(badge);
    }
    badge.textContent = open > 99 ? "99+" : open;
  } else if (badge) {
    badge.remove();
  }
}
updateTabBadge();
const _origSave = saveEvents;
saveEvents = function() { _origSave(); updateTabBadge(); };

setTab("fleet");
</script>
