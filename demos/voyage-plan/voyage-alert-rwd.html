/* ═══════════════════════════════════════════════════════════════
 * 閾值頁 v6：兩個 view（分航段集體設定 / 單船設定）
 *   - 共用 dimRowHTML：產生一行「W input + C input + 預設 + 影響預覽」
 *   - Batch：選 segment + 套用對象，多維度同時編輯，按鈕一次套用
 *   - Per-Vessel：選船 + 選 segment，inline 編輯每維度，blur 即存
 *   - 兩 view 都透過 SEGMENT_META[seg].dims 決定要列出哪些維度 */

/* 取統一的 dim meta：DIM_META 有 8 個主維度；THRESHOLD_META 額外含 driftAnchor / driftAdrift 兩個漂航圈
 *   兩者 key 不重疊，這裡合併查找以供 dimRowHTML 與 getDimCurrentMetric 共用 */
function getDimDisplayMeta(dim) {
  if (DIM_META[dim]) return DIM_META[dim];
  const t = THRESHOLD_META[dim];
  if (t) {
    return {
      label: t.label, short: t.short,
      // 漂航圈用同一個 anchorage icon 較直觀
      icon: (c) => (DIM_META.anchorage?.icon(c) || ""),
    };
  }
  return { label: dim, short: dim, icon: () => "" };
}

function dimRowHTML({ dim, valW, valC, defW, defC, metric, level, overridden, isCore, segNote, withReset, hideMetric, defSource }) {
  const m = getDimDisplayMeta(dim);
  const isTBC = TBC_DIMS.has(dim);
  let metricBlock = "";
  if (!hideMetric) {
    metricBlock = metric != null
      ? `<span class="th-row-current">船舶現況 / Current<span class="th-row-current-val">${formatThresholdValue(dim, metric)}</span><span class="th-row-lvl" data-level="${level}">${level === "critical" ? "Critical" : level === "warning" ? "Warning" : "Normal"}</span></span>`
      : `<span class="th-row-current muted">船舶現況 / Current —</span>`;
  }
  // 預設值來源標記：來自航線計畫（plan_thresholds）→ 顯示「計畫」tag，提示該預設值是直接從船舶上報的航線計畫帶入
  const defSrcTag = defSource === "plan" ? `<span class="th-default-src" title="預設值來自船舶上報的航線計畫">計畫</span>` : "";
  return `
    <div class="th-dim-row${overridden ? " is-overridden" : ""}${isCore ? " is-core" : ""}${isTBC ? " is-tbc" : ""}" data-dim="${dim}">
      <div class="th-dim-head">
        <span class="th-dim-icon">${m.icon()}</span>
        <span class="th-dim-name">${m.label}</span>
        <span class="th-dim-short">${m.short}</span>
        ${isCore ? `<span class="th-tag th-tag-core">該段核心</span>` : ""}
        ${isTBC ? `<span class="th-tag th-tag-tbc" title="監測項目待客戶確認">待確認 / TBC</span>` : ""}
        ${overridden ? `<span class="th-tag th-tag-overridden">★ 已調整 / Modified${segNote ? ` · ${segNote}` : ""}</span>` : ""}
        ${withReset && overridden ? `<button type="button" class="th-row-reset" data-dim="${dim}">復原</button>` : ""}
      </div>
      <div class="th-dim-inputs">
        <span class="th-num">
          <label>W ≥</label>
          <input type="number" class="th-input th-warn" data-dim="${dim}" data-lvl="warning"
                 value="${valW ?? ""}" placeholder="${defW}" step="0.1" min="0" max="200"${isTBC ? " disabled" : ""}>
          <span class="th-default">預設 ${formatThresholdValue(dim, defW)}${defSrcTag}</span>
        </span>
        <span class="th-num">
          <label>C ≥</label>
          <input type="number" class="th-input th-crit" data-dim="${dim}" data-lvl="critical"
                 value="${valC ?? ""}" placeholder="${defC}" step="0.1" min="0" max="200"${isTBC ? " disabled" : ""}>
          <span class="th-default">預設 ${formatThresholdValue(dim, defC)}${defSrcTag}</span>
        </span>
        ${metricBlock}
      </div>
    </div>`;
}

/* 分航段集體設定 view — 選航段 + 套用對象 + 多維度同時編輯 + 一次套用 */
function renderBatchBySegmentSetup(visibleVessels) {
  const segments = Object.keys(SEGMENT_META);
  const seg = SEGMENT_META[_batchSegment] || SEGMENT_META.sea;
  const myCount = visibleVessels.length;

  // segment 切換 tabs
  const segTabs = segments.map(s => {
    const meta = SEGMENT_META[s];
    return `<button type="button" class="th-seg-tab${s === _batchSegment ? " is-active" : ""}" data-seg="${s}"
              style="--seg-color:${meta.color}">
              <span class="th-seg-icon">${meta.icon}</span>
              <span>${meta.cn}<span class="en"> / ${meta.en}</span></span>
            </button>`;
  }).join("");

  // 套用對象 — 依登入身份：
  //   - 監管 / Manager：只能選「我的全部船」（自動鎖定，無 radio）
  //   - 主管 / Supervisor：可選「全船隊預設」或「依監管人員的船隊」（後者用 dropdown 選哪位監管）
  // 個別船舶移除（已有單船設定頁簽）
  const adminMode = isAdmin(_currentUser);
  if (!adminMode) { _batchScope = "my"; }   // 監管強制 my
  else if (_batchScope === "single" || _batchScope === "my") { _batchScope = "byMgr"; }
  if (adminMode && !_batchScopeManager) { _batchScopeManager = MANAGERS[0]; }
  const mgrOpts = MANAGERS.map(m => {
    const cnt = VESSELS.filter(v => v.manager === m).length;
    return `<option value="${escapeHtml(m)}"${m === _batchScopeManager ? " selected" : ""}>${escapeHtml(m)}（${cnt} 艘）</option>`;
  }).join("");
  const scopeRow = adminMode
    ? `
    <div class="th-batch-scope">
      <span class="th-batch-label">套用對象 / Scope</span>
      <label class="th-radio"><input type="radio" name="th-batch-scope" value="global"${_batchScope === "global" ? " checked" : ""}> 全船隊預設 <span class="en">/ Fleet default</span></label>
      <label class="th-radio"><input type="radio" name="th-batch-scope" value="byMgr"${_batchScope === "byMgr" ? " checked" : ""}> 依監管人員的船隊 <span class="en">/ By manager's fleet</span></label>
      <select id="th-batch-mgr"${_batchScope === "byMgr" ? "" : " disabled"}>${mgrOpts}</select>
    </div>`
    : `
    <div class="th-batch-scope">
      <span class="th-batch-label">套用對象 / Scope</span>
      <span class="th-radio" style="opacity:0.9">● 我的全部船 <span class="en">/ My vessels (${myCount})</span></span>
      <span class="th-batch-hint" style="color:#7c8a9e;font-size:11px;margin-left:8px">如需針對個別船舶，請切到「單船設定」</span>
    </div>`;

  // 維度列：以「目前該 scope 下的有效值」當顯示參考（值預先帶入）
  // - global：_thresholds[dim]
  // - my：取「我管的第一艘」當參考
  // - byMgr：取「該監管管的第一艘」當參考
  let targetVessel = null;
  if (_batchScope === "my") {
    targetVessel = visibleVessels.find(v => v.manager === _currentUser) || visibleVessels[0];
  } else if (_batchScope === "byMgr") {
    targetVessel = VESSELS.find(v => v.manager === _batchScopeManager);
  }
  const dimRows = seg.dims.map(d => {
    const def = DEFAULT_THRESHOLDS[d]; if (!def) return "";
    const curGW = _thresholds[d]?.warning  ?? def.warning;
    const curGC = _thresholds[d]?.critical ?? def.critical;
    let valW = null, valC = null, overridden = false, segNote = "";
    if (_batchScope === "global") {
      // 顯示目前全船隊預設（_thresholds 經調整後可能與 factory default 不同）
      valW = curGW !== def.warning  ? curGW : null;
      valC = curGC !== def.critical ? curGC : null;
      overridden = valW !== null || valC !== null;
    } else if (targetVessel) {
      const ovr = getVesselOverrideRaw(targetVessel.vessel_id, d);
      if (ovr) {
        valW = ovr.warning ?? null;
        valC = ovr.critical ?? null;
        overridden = !!(ovr.warning != null || ovr.critical != null);
        if (ovr.segment && ovr.segment !== "all") segNote = SEGMENT_META[ovr.segment]?.cn || ovr.segment;
      }
    }
    // batch view 是「批次套用到多艘船」的場景，顯示單艘船舶現況反而誤導，
    // 一律不傳 metric → dimRowHTML 顯示「船舶現況 —」灰色 placeholder
    return dimRowHTML({
      dim: d, valW, valC,
      defW: curGW, defC: curGC,
      metric: null, level: "normal", overridden,
      isCore: seg.coreDims.includes(d),
      segNote,
      hideMetric: true,   // batch 模式徹底隱藏，避免使用者誤以為這是「某艘船的狀況」
    });
  }).filter(Boolean).join("");

  // 影響預覽：列出 visibleVessels 在目前 form 設定下各維度的等級
  const impactList = (_batchScope === "global" || _batchScope === "my")
    ? visibleVessels.map(v => {
        // 用全船隊預設 + 目標 scope 的 override 預測（簡化版：只看 global 預設變動的影響）
        return `<li class="th-impact-row" data-vid="${v.vessel_id}">${escapeHtml(v.vessel_name)}</li>`;
      }).join("")
    : "";

  const portNote = _batchSegment === "port"
    ? `<div class="th-batch-note" style="border-left-color:${seg.color}">
         港口操船段以 CPA／TCPA 監測碰撞風險（依規格 v1.0 §4 + §6.3），需 SDataPro 周邊 AIS。Demo 階段尚未實作 CPA／TCPA，僅顯示主機維度。
       </div>`
    : "";

  return `
    <div class="th-batch">
      <div class="th-seg-tabs" role="tablist">${segTabs}</div>
      ${portNote}
      ${scopeRow}

      <div class="th-batch-dims">
        <div class="th-batch-dims-head">
          <b style="color:${seg.color}">${seg.icon} ${seg.cn}</b>
          <span style="color:#7c8a9e;font-size:12px"> · 監測維度（${seg.dims.length}）· 核心維度標 ★</span>
        </div>
        ${dimRows || `<div class="th-empty">此航段尚無可設定的維度（CPA／TCPA 待補）</div>`}
      </div>

      <div class="th-batch-footer">
        <span class="th-impact" id="th-batch-impact">影響預覽：—</span>
        <button type="button" class="trans-btn secondary" id="th-batch-reset">清除此航段所有設定</button>
      </div>

      <div class="th-batch-note">
        輸入完成後按 Enter 或點到其它欄位即自動儲存（依「套用對象」自動寫入對應層級）。留空＝沿用「上一層」（單船→全船隊預設；全船隊→系統預設）。Critical 必須大於 Warning。
      </div>
    </div>`;
}

function wireBatchBySegmentSetup() {
  const root = document.querySelector(".th-batch");
  if (!root) return;
  // segment tabs
  root.querySelectorAll(".th-seg-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      _batchSegment = btn.dataset.seg;
      sessionStorage.setItem("slab_va_th_batch_segment", _batchSegment);
      renderThresholds();
    });
  });
  // scope radio
  root.querySelectorAll('input[name="th-batch-scope"]').forEach(r => {
    r.addEventListener("change", () => {
      _batchScope = r.value;
      sessionStorage.setItem("slab_va_th_batch_scope", _batchScope);
      renderThresholds();
    });
  });
  // 主管「依監管人員」下拉
  const mgrSel = root.querySelector("#th-batch-mgr");
  if (mgrSel) {
    mgrSel.addEventListener("change", () => {
      _batchScopeManager = mgrSel.value;
      sessionStorage.setItem("slab_va_th_batch_mgr", _batchScopeManager);
      renderThresholds();
    });
  }
  // input 即時預覽 + blur/Enter 寫回（與單船 view 模式一致）
  root.querySelectorAll(".th-input").forEach(inp => {
    inp.addEventListener("input", () => refreshDimRowLevel(inp.closest(".th-dim-row")));
    const commit = () => commitBatchRow(inp.closest(".th-dim-row"));
    inp.addEventListener("blur", commit);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); inp.blur(); } });
  });

  // 整個航段一鍵清除（套用對象決定影響範圍）
  root.querySelector("#th-batch-reset").addEventListener("click", () => resetBatchSegment());

  // 初始計算 footer 影響預覽
  refreshBatchImpact();
}

/* batch view：單列 commit。依目前 scope 寫入對應層級。
 *   - global：寫 _thresholds[dim]
 *   - my：寫入「我管的所有船」的 _vesselOverrides
 *   - single：寫入單艘船 _vesselOverrides */
function commitBatchRow(row) {
  if (!row) return;
  const dim = row.dataset.dim;
  const def = DEFAULT_THRESHOLDS[dim]; if (!def) return;
  const wInp = row.querySelector(".th-warn");
  const cInp = row.querySelector(".th-crit");
  const wRaw = wInp.value, cRaw = cInp.value;
  const w = wRaw === "" ? null : parseFloat(wRaw);
  const c = cRaw === "" ? null : parseFloat(cRaw);
  // 兩格都空：清除該層級該維度（依 scope）
  const seg = _batchSegment;
  const isClear = (w == null && c == null);
  if (!isClear) {
    const finalW = w != null ? w : def.warning;
    const finalC = c != null ? c : def.critical;
    if (finalC <= finalW) {
      alert("Critical 必須大於 Warning。");
      // 還原 input 為儲存中值
      if (_batchScope === "global") {
        wInp.value = (_thresholds[dim]?.warning ?? def.warning) !== def.warning ? _thresholds[dim].warning : "";
        cInp.value = (_thresholds[dim]?.critical ?? def.critical) !== def.critical ? _thresholds[dim].critical : "";
      } else {
        const targetVid = _batchScope === "single" ? _batchScopeVid
          : (isAdmin(_currentUser) ? VESSELS[0]?.vessel_id : VESSELS.find(v => v.manager === _currentUser)?.vessel_id);
        const ovr = getVesselOverrideRaw(targetVid, dim);
        wInp.value = ovr?.warning ?? "";
        cInp.value = ovr?.critical ?? "";
      }
      refreshDimRowLevel(row);
      return;
    }
  }
  if (_batchScope === "global") {
    if (isClear) {
      _thresholds[dim].warning  = def.warning;
      _thresholds[dim].critical = def.critical;
    } else {
      if (w != null) _thresholds[dim].warning  = w;
      if (c != null) _thresholds[dim].critical = c;
    }
    saveThresholds();
  } else if (_batchScope === "my") {
    const targets = VESSELS.filter(v => v.manager === _currentUser);
    targets.forEach(v => setVesselOverride(v.vessel_id, dim, w, c, seg));
  } else if (_batchScope === "byMgr") {
    // 主管選某監管的船隊
    const targets = VESSELS.filter(v => v.manager === _batchScopeManager);
    targets.forEach(v => setVesselOverride(v.vessel_id, dim, w, c, seg));
  }
  syncEventsFromAlerts();
  renderThresholds();
}

function refreshDimRowLevel(row) {
  if (!row) return;
  const dim = row.dataset.dim;
  const def = DEFAULT_THRESHOLDS[dim]; if (!def) return;
  const wInp = row.querySelector(".th-warn");
  const cInp = row.querySelector(".th-crit");
  const w = wInp.value === "" ? (_thresholds[dim]?.warning  ?? def.warning)  : parseFloat(wInp.value);
  const c = cInp.value === "" ? (_thresholds[dim]?.critical ?? def.critical) : parseFloat(cInp.value);
  // 取 row 對應的「目標船舶」：批次 view 看 _batchScope 決定，單船 view 看 _vesselViewVid
  const isVesselView = !!row.closest(".th-vessel-view");
  const v = isVesselView
    ? VESSELS.find(x => x.vessel_id === _vesselViewVid)
    : (_batchScope === "single"
        ? VESSELS.find(x => x.vessel_id === _batchScopeVid)
        : (_batchScope === "my"
            ? VESSELS.filter(x => isAdmin(_currentUser) || x.manager === _currentUser)[0]
            : null));
  const metricEl = row.querySelector(".th-row-current");
  if (!metricEl) return;
  if (!v) {
    metricEl.classList.add("muted");
    metricEl.innerHTML = "船舶現況 / Current —";
    return;
  }
  const metric = getDimCurrentMetric(v, dim);
  const lvl = dimLevelFor(metric, w, c);
  if (metric == null) {
    metricEl.classList.add("muted");
    metricEl.innerHTML = "船舶現況 / Current —";
    return;
  }
  metricEl.classList.remove("muted");
  metricEl.innerHTML = `船舶現況 / Current<span class="th-row-current-val">${formatThresholdValue(dim, metric)}</span><span class="th-row-lvl" data-level="${lvl}">${lvl === "critical" ? "Critical" : lvl === "warning" ? "Warning" : "Normal"}</span>`;
}

function refreshBatchImpact() {
  const el = document.getElementById("th-batch-impact");
  if (!el) return;
  const seg = SEGMENT_META[_batchSegment];
  let label = "—";
  if (_batchScope === "global") label = `將寫入全船隊預設，影響 ${VESSELS.length} 艘船`;
  else if (_batchScope === "my") {
    const targets = VESSELS.filter(v => v.manager === _currentUser);
    label = `將寫入「我的全部船」個別設定（${targets.length} 艘）`;
  } else if (_batchScope === "byMgr") {
    const targets = VESSELS.filter(v => v.manager === _batchScopeManager);
    label = `將寫入「${_batchScopeManager}」船隊（${targets.length} 艘）`;
  }
  if (seg && _batchSegment !== "all") label += ` · 限 ${seg.cn}`;
  el.textContent = `影響預覽：${label}`;
}

function applyBatchSegment() {
  const root = document.querySelector(".th-batch");
  if (!root) return;
  const seg = _batchSegment;
  const rows = Array.from(root.querySelectorAll(".th-dim-row"));
  const changes = []; // { dim, w, c }
  let invalid = null;
  rows.forEach(row => {
    const dim = row.dataset.dim;
    const def = DEFAULT_THRESHOLDS[dim]; if (!def) return;
    const wRaw = row.querySelector(".th-warn").value;
    const cRaw = row.querySelector(".th-crit").value;
    const w = wRaw === "" ? null : parseFloat(wRaw);
    const c = cRaw === "" ? null : parseFloat(cRaw);
    // 跳過全部空白的列（沿用上層）
    if (w == null && c == null) return;
    const finalW = w != null ? w : def.warning;
    const finalC = c != null ? c : def.critical;
    if (finalC <= finalW) { invalid = `「${DIM_META[dim]?.label}」: Critical 必須大於 Warning`; return; }
    changes.push({ dim, w, c });
  });
  if (invalid) { alert(invalid); return; }
  if (!changes.length) { alert("沒有輸入任何閾值。請在至少一個維度輸入 W 或 C。"); return; }

  const segLabel = SEGMENT_META[seg]?.cn || seg;
  if (_batchScope === "global") {
    if (!confirm(`即將寫入全船隊預設：${changes.length} 個維度，${segLabel}。\n\n確認套用？`)) return;
    changes.forEach(({ dim, w, c }) => {
      if (w != null) _thresholds[dim].warning  = w;
      if (c != null) _thresholds[dim].critical = c;
    });
    saveThresholds();
  } else if (_batchScope === "my") {
    const visibleVessels = isAdmin(_currentUser)
      ? VESSELS
      : VESSELS.filter(v => v.manager === _currentUser);
    if (!visibleVessels.length) { alert("沒有可套用的船舶。"); return; }
    if (!confirm(`即將對 ${visibleVessels.length} 艘船舶寫入「${segLabel}」的 ${changes.length} 個維度覆寫。\n\n確認套用？`)) return;
    visibleVessels.forEach(v => {
      changes.forEach(({ dim, w, c }) => setVesselOverride(v.vessel_id, dim, w, c, seg));
    });
  } else if (_batchScope === "single") {
    if (!_batchScopeVid) { alert("請選擇船舶。"); return; }
    const v = VESSELS.find(x => x.vessel_id === _batchScopeVid);
    if (!confirm(`即將對 ${v?.vessel_name} 寫入「${segLabel}」的 ${changes.length} 個維度覆寫。\n\n確認套用？`)) return;
    changes.forEach(({ dim, w, c }) => setVesselOverride(_batchScopeVid, dim, w, c, seg));
  }
  syncEventsFromAlerts();
  renderThresholds();
}

function resetBatchSegment() {
  const seg = _batchSegment;
  const segLabel = SEGMENT_META[seg]?.cn || seg;
  const dims = SEGMENT_META[seg]?.dims || [];
  if (_batchScope === "global") {
    if (!confirm(`即將把「${segLabel}」相關 ${dims.length} 個維度的全船隊預設重置為系統原廠值。\n\n確認？`)) return;
    dims.forEach(d => {
      const def = DEFAULT_THRESHOLDS[d];
      if (def) { _thresholds[d].warning = def.warning; _thresholds[d].critical = def.critical; }
    });
    saveThresholds();
  } else if (_batchScope === "my") {
    const targets = VESSELS.filter(v => v.manager === _currentUser);
    if (!confirm(`即將清除「我的全部船（${targets.length} 艘）」在「${segLabel}」的 ${dims.length} 個維度設定。\n\n確認？`)) return;
    targets.forEach(v => dims.forEach(d => setVesselOverride(v.vessel_id, d, null, null)));
  } else if (_batchScope === "byMgr") {
    const targets = VESSELS.filter(v => v.manager === _batchScopeManager);
    if (!confirm(`即將清除「${_batchScopeManager}」船隊（${targets.length} 艘）在「${segLabel}」的 ${dims.length} 個維度設定。\n\n確認？`)) return;
    targets.forEach(v => dims.forEach(d => setVesselOverride(v.vessel_id, d, null, null)));
  }
  syncEventsFromAlerts();
  renderThresholds();
}

/* 單船設定 view — 選船 + 切航段 + 每維度 inline 編輯，blur 即存 */
function renderPerVesselSetup(visibleVessels) {
  if (!visibleVessels.length) {
    return `<div class="th-vessel-view th-empty">目前帳號沒有可管理的船舶。</div>`;
  }
  const segments = Object.keys(SEGMENT_META);
  const seg = SEGMENT_META[_vesselViewSegment] || SEGMENT_META.sea;
  const v = visibleVessels.find(x => x.vessel_id === _vesselViewVid) || visibleVessels[0];
  const a = computeAlerts(v);
  const riskColor = a.risk === "critical" ? "#ff8a8a"
                 : a.risk === "warning"  ? "#f5b753"
                 : a.risk === "normal"   ? "#6ee094" : "#7c8a9e";
  const riskLabel = a.risk === "critical" ? "Critical"
                 : a.risk === "warning"  ? "Warning"
                 : a.risk === "normal"   ? "Normal" : "N/A";

  const vesselOpts = visibleVessels.map(x =>
    `<option value="${x.vessel_id}"${x.vessel_id === v.vessel_id ? " selected" : ""}>${escapeHtml(x.vessel_name)} · IMO ${escapeHtml(x.imo)}</option>`).join("");

  const segTabs = segments.map(s => {
    const meta = SEGMENT_META[s];
    return `<button type="button" class="th-seg-tab${s === _vesselViewSegment ? " is-active" : ""}" data-seg="${s}"
              style="--seg-color:${meta.color}">
              <span class="th-seg-icon">${meta.icon}</span>
              <span>${meta.cn}<span class="en"> / ${meta.en}</span></span>
            </button>`;
  }).join("");

  const dimRows = seg.dims.map(d => {
    const def = DEFAULT_THRESHOLDS[d]; if (!def) return "";
    const ovr = getVesselOverrideRaw(v.vessel_id, d);
    const valW = ovr?.warning  ?? null;
    const valC = ovr?.critical ?? null;
    // 單船 view 的「預設」優先序：船舶航線計畫上限（plan_thresholds）> 全船隊預設 > 系統預設
    const planTh = v.plan_thresholds?.[d];
    const defW = planTh?.warning  ?? _thresholds[d]?.warning  ?? def.warning;
    const defC = planTh?.critical ?? _thresholds[d]?.critical ?? def.critical;
    const overridden = !!(ovr && (ovr.warning != null || ovr.critical != null));
    const segNote = ovr?.segment && ovr.segment !== "all" ? SEGMENT_META[ovr.segment]?.cn || ovr.segment : "";
    const metric = getDimCurrentMetric(v, d);
    const effW = valW != null ? valW : defW;
    const effC = valC != null ? valC : defC;
    const level = dimLevelFor(metric, effW, effC);
    return dimRowHTML({
      dim: d, valW, valC, defW, defC, metric, level, overridden,
      isCore: seg.coreDims.includes(d), segNote,
      defSource: planTh ? "plan" : null,   // 用於 dimRowHTML 顯示「來自航線計畫」標記
      withReset: true,
    });
  }).filter(Boolean).join("");

  return `
    <div class="th-vessel-view">
      <div class="th-vv-head">
        <span class="th-vv-label">船舶 / Vessel</span>
        <select id="th-vv-vid">${vesselOpts}</select>
        <span class="th-vv-risk" style="color:${riskColor};border-color:${riskColor}44;background:${riskColor}1a">${riskLabel}</span>
        ${isAdmin(_currentUser) ? `<span class="th-vv-mgr">${escapeHtml(v.manager || "")}</span>` : ""}
      </div>
      <div class="th-seg-tabs" role="tablist">${segTabs}</div>
      <div class="th-batch-dims">
        <div class="th-batch-dims-head">
          <b style="color:${seg.color}">${seg.icon} ${seg.cn}</b>
          <span style="color:#7c8a9e;font-size:12px"> · 監測維度（${seg.dims.length}）· 核心維度標 ★</span>
        </div>
        ${dimRows || `<div class="th-empty">此航段尚無可設定的維度（CPA／TCPA 待補）</div>`}
      </div>
      <div class="th-batch-footer">
        <span class="th-impact">輸入完成後按 Enter 或點到其它欄位即自動儲存</span>
        <button type="button" class="trans-btn secondary" id="th-vv-reset">清除此航段所有設定</button>
      </div>
      <div class="th-batch-note">
        留空＝沿用全船隊預設。Critical 必須大於 Warning。每維度也可單獨按 [復原] 還原為預設。
      </div>
    </div>`;
}

function wirePerVesselSetup() {
  const root = document.querySelector(".th-vessel-view");
  if (!root) return;
  // 船舶切換
  const vsel = root.querySelector("#th-vv-vid");
  if (vsel) vsel.addEventListener("change", () => {
    _vesselViewVid = parseInt(vsel.value, 10);
    renderThresholds();
  });
  // segment 切換
  root.querySelectorAll(".th-seg-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      _vesselViewSegment = btn.dataset.seg;
      sessionStorage.setItem("slab_va_th_vv_segment", _vesselViewSegment);
      renderThresholds();
    });
  });
  // input 即時預覽 + blur/Enter 寫回
  root.querySelectorAll(".th-input").forEach(inp => {
    inp.addEventListener("input", () => refreshDimRowLevel(inp.closest(".th-dim-row")));
    const commit = () => {
      const row = inp.closest(".th-dim-row");
      const dim = row.dataset.dim;
      const def = DEFAULT_THRESHOLDS[dim]; if (!def) return;
      const wRaw = row.querySelector(".th-warn").value;
      const cRaw = row.querySelector(".th-crit").value;
      const w = wRaw === "" ? null : parseFloat(wRaw);
      const c = cRaw === "" ? null : parseFloat(cRaw);
      if (w == null && c == null) {
        setVesselOverride(_vesselViewVid, dim, null, null);
      } else {
        const finalW = w != null ? w : def.warning;
        const finalC = c != null ? c : def.critical;
        if (finalC <= finalW) {
          alert("Critical 必須大於 Warning。");
          const ovr = getVesselOverrideRaw(_vesselViewVid, dim);
          row.querySelector(".th-warn").value = ovr?.warning  ?? "";
          row.querySelector(".th-crit").value = ovr?.critical ?? "";
          refreshDimRowLevel(row);
          return;
        }
        setVesselOverride(_vesselViewVid, dim, w, c, _vesselViewSegment);
      }
      syncEventsFromAlerts();
      renderThresholds();
    };
    inp.addEventListener("blur", commit);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); inp.blur(); } });
  });
  // 整個航段一鍵清除
  const segResetBtn = root.querySelector("#th-vv-reset");
  if (segResetBtn) {
    segResetBtn.addEventListener("click", () => {
      const seg = SEGMENT_META[_vesselViewSegment];
      if (!seg) return;
      const v = VESSELS.find(x => x.vessel_id === _vesselViewVid);
      if (!v) return;
      if (!confirm(`即將清除「${v.vessel_name}」在「${seg.cn}」的 ${seg.dims.length} 個維度 override。\n\n確認？`)) return;
      seg.dims.forEach(d => setVesselOverride(_vesselViewVid, d, null, null));
      syncEventsFromAlerts();
      renderThresholds();
    });
  }
  // 維度復原
  root.querySelectorAll(".th-row-reset").forEach(btn => {
    btn.addEventListener("click", () => {
      const dim = btn.dataset.dim;
      setVesselOverride(_vesselViewVid, dim, null, null);
      syncEventsFromAlerts();
      renderThresholds();
    });
  });
}

function renderThresholds() {
  const dirtyCount = Object.keys(THRESHOLD_META).filter(k => {
    const cur = _thresholds[k], def = DEFAULT_THRESHOLDS[k];
    return (cur.warning !== def.warning) || (cur.critical !== def.critical);
  }).length;
  const visibleVessels = isAdmin(_currentUser)
    ? VESSELS
    : VESSELS.filter(v => v.manager === _currentUser);
  // 預設挑第一艘可見船作為「單船設定」view 的初始船
  if (!_vesselViewVid || !visibleVessels.find(v => v.vessel_id === _vesselViewVid)) {
    _vesselViewVid = visibleVessels[0]?.vessel_id || null;
  }
  if (!_batchScopeVid || !visibleVessels.find(v => v.vessel_id === _batchScopeVid)) {
    _batchScopeVid = visibleVessels[0]?.vessel_id || null;
  }

  document.getElementById("main").innerHTML = `
    <h2 class="page-title">
      <span>閾值設定 <span class="bi-line"><span class="en">/ Thresholds</span></span></span>
      <small>共 ${Object.keys(THRESHOLD_META).length} 個維度${dirtyCount > 0 ? ` · <span style="color:#f5b753">${dirtyCount} 項已修改</span>` : " · 全部為預設值"}</small>
    </h2>

    <div style="color:#9aa5b8;font-size:14px;margin-bottom:14px;line-height:1.55">
      依「分航段集體設定」或「單船設定」兩種模式調整閾值。輸入完成後按 Enter 或點到其它欄位即自動儲存，立即重算所有船舶警示並依新閾值補立事件、消失條件的事件會標記 Cleared。
    </div>

    <details class="th-help">
      <summary>使用說明 <span class="en">/ Help</span>　<span class="th-help-hint">點此展開</span></summary>
      <div class="th-help-body">
        <div class="th-help-section">
          <b>兩種模式的差別</b>
          <ul>
            <li><b>分航段集體設定</b>：選一個航段（海上 / 錨泊 / 港口 / 全航段通用）＋ 套用對象（主管才可選「全船隊預設」；監管只能「我的全部船」）。多個維度同時編輯，「按 Enter 或點到其它欄位」即自動儲存。</li>
            <li><b>單船設定</b>：選一艘船，逐航段逐維度精細調整。同樣「按 Enter 或點到其它欄位」即自動儲存；已調整的維度會標 ★ 並可用 [復原] 還原；底部「清除此航段所有設定」可一鍵還原該段全部維度。</li>
            <li>兩個 view 的儲存模式相同，差別只在「想批量套到很多船」就用集體、「想針對一艘船細調」就用單船。</li>
          </ul>
        </div>

        <div class="th-help-section">
          <b>「船舶現況 / Current」是甚麼？右邊的 Normal / Warning / Critical 徽章又是甚麼？</b>
          <ul>
            <li>每一列右側的「船舶現況」顯示<b>該船目前實際測得的數值</b>，與設定的 W/C 對照後得出徽章等級：
              <ul>
                <li>目前值 &lt; Warning → <span class="th-row-lvl" data-level="normal">Normal</span> 綠</li>
                <li>Warning ≤ 目前值 &lt; Critical → <span class="th-row-lvl" data-level="warning">Warning</span> 橘</li>
                <li>目前值 ≥ Critical → <span class="th-row-lvl" data-level="critical">Critical</span> 紅</li>
              </ul>
            </li>
            <li>編輯 W/C 時徽章會即時刷新，方便預覽「這個閾值套下去，這艘船現在會被歸到哪個等級」。</li>
            <li>注意：徽章是描述「船舶現況」的結果，不是設定值的等級。</li>
          </ul>
        </div>

        <div class="th-help-section">
          <b>「目前 XXX」單位由維度決定（只顯示在「單船設定」）</b>
          <ul>
            <li><b>航線偏移 / Route Deviation</b> — <b>NM（海浬）</b>，當下 XTD 與本航次歷史最大偏移取較大者。例：0.366 NM。</li>
            <li><b>速度異常 / Speed Anomaly</b> — <b>%</b>，<code>|目前 SOG − 計畫平均| ÷ 計畫平均</code>。例：偏差 31%。</li>
            <li><b>風速 / Wind Speed</b> — <b>m/s</b>，蒲福風級 7≈15、9≈22。</li>
            <li><b>有效波高 / Sig. Wave Height</b>、<b>湧浪高度 / Swell Height</b> — <b>m（公尺）</b>。</li>
            <li><b>風向 / Wind Direction</b>、<b>湧浪方向 / Swell Direction</b> — <b>度（相對船首）</b>，閾值語意待客戶確認（標 TBC，輸入欄暫 disabled）。</li>
            <li><b>漂航圈半徑（拋錨 / 漂航）</b> — <b>m（公尺）</b>，船舶位置距漂航圈中心的真實距離（Haversine）。</li>
            <li><b>主機異常 / Main Engine</b> — 待確認 RPM／EGT／油壓 的權重與單位（標 TBC，輸入欄暫 disabled）。</li>
          </ul>
          <div style="color:#7c8a9e;font-size:11px;margin-top:4px">「分航段集體設定」是批次模式，會套到多艘船，因此不顯示單一艘船的「船舶現況」以避免誤導。</div>
        </div>

        <div class="th-help-section">
          <b>套用對象（依登入身份）</b>
          <ul>
            <li><b>主管 / Supervisor</b>：可選「全船隊預設」與「我的全部船」（= 全部 9 艘）。</li>
            <li><b>監管人員 / Manager</b>：只能選「我的全部船」（= 自己管的 3 艘）；如需針對個別船舶，請切到「單船設定」分頁。</li>
          </ul>
        </div>

        <div class="th-help-section">
          <b>不在此處設定的維度</b>
          <ul>
            <li><b>AIS 訊號 / AIS Comms</b> — 訊號斷線、位置回報延遲屬於系統面異常，由系統自動偵測（依 AIS gap），<b>不需也不開放</b>人為設定閾值。</li>
            <li><b>警示信件 / Warning Mail</b>、<b>區域警示 / Zone Alert</b> — 由外部來源（StormGeo 通知信、風險區命中）直接決定等級，無 W/C 可調。</li>
            <li><b>港口航段</b>不做計畫偏離（規格 v1.0 §4：無可執行的計畫航線、又船多），改為以 <b>CPA/TCPA</b> 監測碰撞風險，需 SDataPro 周邊 AIS，待 Phase 2 接入。</li>
          </ul>
        </div>
      </div>
    </details>

    <div class="th-view-tabs" role="tablist">
      <button type="button" class="th-tab${_thresholdView === "batch"  ? " is-active" : ""}" data-view="batch"  role="tab">分航段集體設定 <span class="en">/ Batch by Segment</span></button>
      <button type="button" class="th-tab${_thresholdView === "vessel" ? " is-active" : ""}" data-view="vessel" role="tab">單船設定 <span class="en">/ Per-Vessel</span></button>
    </div>

    <div class="th-view-body" data-view="${_thresholdView}">
      ${_thresholdView === "vessel" ? renderPerVesselSetup(visibleVessels) : renderBatchBySegmentSetup(visibleVessels)}
    </div>
  `;

  // ── view tab 切換 ───────────────────────────────────────────────
  document.querySelectorAll(".th-view-tabs .th-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      const v = btn.dataset.view;
      if (v === _thresholdView) return;
      _thresholdView = v;
      sessionStorage.setItem("slab_va_th_view", v);
      renderThresholds();
    });
  });

  // ── 兩個 view 各自的接線 ────────────────────────────────────────
  if (_thresholdView === "batch")  wireBatchBySegmentSetup();
  if (_thresholdView === "vessel") wirePerVesselSetup();
}

function saveThresholdsFromPage() {
  // 從頁面內所有 .th-input 讀回
  document.querySelectorAll("#main .th-input").forEach(el => {
    const k = el.dataset.k, lvl = el.dataset.lvl;
    const v = parseFloat(el.value);
    if (!isNaN(v) && _thresholds[k]) _thresholds[k][lvl] = v;
  });
  saveThresholds();
  syncEventsFromAlerts();   // 用新閾值重評估、補立案
  renderThresholds();        // 重畫本頁，更新「已修改」標記與計數
  const tip = document.getElementById("th-saved-tip");
  if (tip) {
    tip.textContent = `已儲存 / Saved at ${new Date().toLocaleTimeString()}`;
    clearTimeout(window.__thSavedTimer);
    window.__thSavedTimer = setTimeout(() => { tip.textContent = ""; }, 2500);
  }
}
window.resetThresholdsAndRefresh = function() {
  resetThresholds();
  syncEventsFromAlerts();
  renderThresholds();
};

/* ─────────────────────────────────────────────────────────────────
 * Sidebar pin toggle — 預設收合，hover 暫時展開，pin 鎖定展開
 * (localStorage 只記憶 pin 狀態；hover 由 CSS :hover 處理)
 * ───────────────────────────────────────────────────────────────── */
const SIDEBAR_PIN_KEY = "slab_va_sidebar_pinned_v1";
function applySidebarState() {
  const sb = document.getElementById("sidebar");
  const pinned = localStorage.getItem(SIDEBAR_PIN_KEY) === "1";
  if (sb) {
    sb.classList.toggle("pinned", pinned);
    const btn = document.getElementById("sb-toggle-btn");
    if (btn) btn.title = pinned
      ? "取消固定（hover 時自動展開）/ Unpin sidebar"
      : "固定展開 / Pin sidebar open";
  }
}
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("sb-toggle-btn");
  if (btn) {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const sb = document.getElementById("sidebar");
      const next = !(sb.classList.contains("pinned"));
      localStorage.setItem(SIDEBAR_PIN_KEY, next ? "1" : "0");
      applySidebarState();
    });
  }
});

/* ─────────────────────────────────────────────────────────────────
 * Icon header tooltip (portal) — 把 tooltip element append 到 body，
 *   位置用 getBoundingClientRect 計算。避開 .alert-table-wrap 的
 *   overflow:auto 將絕對定位 tooltip clip 掉的問題。預設彈在 header
 *   上方；上方空間不夠時 fallback 到下方。
 * ───────────────────────────────────────────────────────────────── */
let _iconTipEl = null;
function _hideIconTip() {
  if (_iconTipEl) { _iconTipEl.remove(); _iconTipEl = null; }
}
function _showIconTip(el) {
  _hideIconTip();
  const tip = el.dataset.tip;
  if (!tip) return;
  // 第一行為標題，第二行起為說明內容（保留換行）
  const idx = tip.indexOf("\n");
  const title = idx === -1 ? tip : tip.slice(0, idx);
  const body  = idx === -1 ? "" : tip.slice(idx + 1).replace(/^\s+/, "");
  _iconTipEl = document.createElement("div");
  _iconTipEl.className = "icon-tip-portal" + (body ? "" : " no-body");
  const titleEl = document.createElement("div");
  titleEl.className = "tip-title";
  titleEl.textContent = title;
  _iconTipEl.appendChild(titleEl);
  if (body) {
    // 拆 CN / EN：找出第一個「整行都沒中文字」的行當作 EN 起點，
    // 之前的行歸為 CN 段（即使 EN 段內含中文名詞，例如 "・繫泊 MOOR"，也仍歸 EN）
    const lines = body.split("\n");
    const hasCJK = (s) => /[一-鿿]/.test(s);
    let enStart = -1;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].trim() && !hasCJK(lines[i])) { enStart = i; break; }
    }
    const cnText = (enStart === -1 ? lines : lines.slice(0, enStart)).join("\n").trim();
    const enText = (enStart === -1 ? [] : lines.slice(enStart)).join("\n").trim();
    if (cnText) {
      const cnEl = document.createElement("div");
      cnEl.className = "tip-body tip-body-cn";
      cnEl.textContent = cnText;
      _iconTipEl.appendChild(cnEl);
    }
    if (enText) {
      const enEl = document.createElement("div");
      enEl.className = "tip-body tip-body-en";
      enEl.textContent = enText;
      _iconTipEl.appendChild(enEl);
    }
  }
  document.body.appendChild(_iconTipEl);
  const r = el.getBoundingClientRect();
  const tr = _iconTipEl.getBoundingClientRect();
  let top = r.top - tr.height - 10;
  if (top < 8) top = r.bottom + 10;        // 上方擠不下就放下方
  let left = r.left + r.width/2 - tr.width/2;
  if (left < 8) left = 8;
  if (left + tr.width > innerWidth - 8) left = innerWidth - tr.width - 8;
  _iconTipEl.style.top = top + "px";
  _iconTipEl.style.left = left + "px";
}
// 事件代理：每次 render 出新表頭都自動套用
document.body.addEventListener("mouseover", e => {
  const el = e.target.closest(".icon-header, .bi-th-tip");
  if (el) _showIconTip(el);
});
document.body.addEventListener("mouseout", e => {
  const el = e.target.closest(".icon-header, .bi-th-tip");
  if (el && !el.contains(e.relatedTarget)) _hideIconTip();
});
document.addEventListener("scroll", _hideIconTip, true);
window.addEventListener("resize", _hideIconTip);

/* 警示行可摺疊：點 summary 內的操作按鈕（pan/open/drift settings）時，
 *   阻擋 <details> 預設切換行為（preventDefault），讓使用者明確按 chevron 或空白處才展開 */
document.body.addEventListener("click", e => {
  const btn = e.target.closest(".alert-row-collapsible > summary button");
  if (btn) e.preventDefault();
}, true);

// 右上角帳號切換器（demo 用）— 填入監管人員與主管選項並接 change 事件
function initUserSwitcher() {
  const wrap = document.getElementById("user-switcher");
  const sel = document.getElementById("user-select");
  if (!sel) return;
  // 重建 optgroup 內容
  const mgrGroup = sel.querySelector('optgroup[label*="Managers"]');
  const admGroup = sel.querySelector('optgroup[label*="Supervisor"]');
  if (mgrGroup) mgrGroup.innerHTML = MANAGERS.map(m =>
    `<option value="${m.replace(/"/g, "&quot;")}">${m}</option>`).join("");
  if (admGroup) admGroup.innerHTML = ADMINS.map(a =>
    `<option value="${a.replace(/"/g, "&quot;")}">${a}</option>`).join("");
  sel.value = _currentUser;
  wrap.classList.toggle("is-admin", isAdmin(_currentUser));
  sel.addEventListener("change", e => {
    _currentUser = e.target.value;
    sessionStorage.setItem("slab_va_current_user", _currentUser);
    wrap.classList.toggle("is-admin", isAdmin(_currentUser));
    // 切換帳號要回到船隊總覽（可能停在他人船舶 detail 上）
    _selectedVessel = null;
    if (typeof route === "function") route();
  });
}

// 啟動：載入持久化閾值、事件 + 從目前警示同步新立案
loadThresholds();
loadEvents();
syncEventsFromAlerts();
applySidebarState();
initUserSwitcher();
route();
</script>
