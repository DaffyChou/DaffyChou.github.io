function _wireAlertBlock(root) {
  // Checkbox → _alertSettings + 子參數 enable/disable
  root.querySelectorAll(".as-cb").forEach(cb => {
    cb.addEventListener("change", () => {
      const obj = cb.dataset.k, prop = cb.dataset.p;
      _alertSettings[obj][prop] = cb.checked;
      const specialMap = {
        "speed.enabled":       "ba-sp-en-body",
        "routeDev.enabled":    "ba-rd-en-body",
        "drift.autoEnabled":   "ba-dr-auto-p",
        "drift.customEnabled": "ba-dr-cus-body",
        "aisLost.enabled":     "ba-ais-body",
        "berthing.enabled":    "ba-bt-body",
      };
      const el = document.getElementById(specialMap[`${obj}.${prop}`]);
      if (el) { el.style.opacity = cb.checked ? "" : "0.4"; el.style.pointerEvents = cb.checked ? "" : "none"; }
      saveAlertSettings();
    });
  });

  // 通知管道 toggle
  root.querySelectorAll(".as-channel-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const ch = btn.dataset.ch;
      _alertSettings.channels[ch] = !_alertSettings.channels[ch];
      btn.classList.toggle("active", _alertSettings.channels[ch]);
      saveAlertSettings();
    });
  });

  // Stepper 按鈕
  root.querySelectorAll(".th-step-up, .th-step-down").forEach(btn => {
    btn.addEventListener("click", () => {
      const inp = document.getElementById(btn.dataset.for);
      if (!inp) return;
      const step = parseFloat(inp.step) || 1;
      const cur  = parseFloat(inp.value) || 0;
      const min  = inp.min !== "" ? parseFloat(inp.min) : -Infinity;
      const max  = inp.max !== "" ? parseFloat(inp.max) :  Infinity;
      inp.value  = btn.classList.contains("th-step-up")
        ? Math.min(max, parseFloat((cur + step).toFixed(6)))
        : Math.max(min, parseFloat((cur - step).toFixed(6)));
      inp.dispatchEvent(new Event("change"));
    });
  });

  // 數值輸入 auto-save
  const numSaveMap = {
    "ba-sp-dur":     v => { _alertSettings.speed.duration        = v; saveAlertSettings(); },
    "ba-rd-dur":     v => { _alertSettings.routeDev.duration     = v; saveAlertSettings(); },
    "ba-dr-auto-r":  v => { _alertSettings.drift.autoRadius      = v; saveAlertSettings(); },
    "ba-dr-cus-r":   v => { _alertSettings.drift.customRadius    = v; saveAlertSettings(); },
    "ba-lat-deg":    v => { _alertSettings.drift.lat_deg         = v; saveAlertSettings(); },
    "ba-lat-min":    v => { _alertSettings.drift.lat_min         = v; saveAlertSettings(); },
    "ba-lon-deg":    v => { _alertSettings.drift.lon_deg         = v; saveAlertSettings(); },
    "ba-lon-min":    v => { _alertSettings.drift.lon_min         = v; saveAlertSettings(); },
    "ba-ais-dur":    v => { _alertSettings.aisLost.duration      = v; saveAlertSettings(); },
    "ba-bt-dist":    v => { _alertSettings.berthing.distance     = v; saveAlertSettings(); },
    "ba-bt-dur":     v => { _alertSettings.berthing.duration     = v; saveAlertSettings(); },
  };
  Object.entries(numSaveMap).forEach(([id, fn]) => {
    const el = document.getElementById(id);
    if (!el) return;
    const handler = () => { const v = parseFloat(el.value); if (!isNaN(v)) fn(v); };
    el.addEventListener("change", handler);
    el.addEventListener("blur",   handler);
  });

  // Select auto-save
  const selSaveMap = {
    "ba-lat-hem": v => { _alertSettings.drift.lat_hem = v; saveAlertSettings(); },
    "ba-lon-hem": v => { _alertSettings.drift.lon_hem = v; saveAlertSettings(); },
  };
  Object.entries(selSaveMap).forEach(([id, fn]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("change", () => fn(el.value));
  });

  // Zone tag 切換
  root.querySelectorAll(".as-tag-btn[data-zone]").forEach(btn => {
    btn.addEventListener("click", () => {
      const zid = btn.dataset.zone, prefix = btn.dataset.prefix;
      const key = prefix === "gf" ? "geofence" : "berthing";
      const arr = _alertSettings[key].zones;
      const idx = arr.indexOf(zid);
      if (idx === -1) arr.push(zid); else arr.splice(idx, 1);
      btn.classList.toggle("active", idx === -1);
      saveAlertSettings();
    });
  });

  // 搭靠區域 radio
  root.querySelectorAll('input[name="ba-bt-area"]').forEach(r => {
    r.addEventListener("change", () => {
      _alertSettings.berthing.areaMode = r.value;
      const el = document.getElementById("ba-bt-zones");
      if (el) el.style.display = r.value === "zone" ? "" : "none";
      saveAlertSettings();
    });
  });
}

              ${n("as-sp-warn", Math.round(_thresholds.speed.warning*100), 0, 200, 5, "% 超速")}
            </div>
            <div class="as-field-params">
              <span style="min-width:90px;color:var(--k-ff8a8a)">Critical ≥</span>
              ${n("as-sp-crit", Math.round(_thresholds.speed.critical*100), 0, 200, 5, "% 超速")}
            </div>
          </div>
        </div>
      </div>

      <!-- 漂航圈偏移監控 -->
      <div class="as-section${sec("drift")}" data-section="drift">
        <div class="as-section-title">漂航圈偏移監控</div>
        <div class="as-section-desc">監控船舶在錨泊狀態下是否偏離設定位置。</div>
        <div class="as-field">
          <input type="checkbox" class="as-cb" id="as-dr-auto" data-k="drift" data-p="autoEnabled"${s.drift.autoEnabled?" checked":""}>
          <div class="as-field-body">
            <label class="as-field-label" for="as-dr-auto">走錨自動監控</label>
            <div class="as-field-sub">（船舶在拋錨狀態自動監控）</div>
            <div class="as-field-params" id="as-dr-auto-p" style="${ds(s.drift.autoEnabled)};margin-top:8px">
              <span>離開錨地：</span>${n("as-dr-auto-r", s.drift.autoRadius, 0.1, 50, 0.1, "公里")}
            </div>
          </div>
        </div>
        <div class="as-field">
          <input type="checkbox" class="as-cb" id="as-dr-cus" data-k="drift" data-p="customEnabled"${s.drift.customEnabled?" checked":""}>
          <div class="as-field-body">
            <label class="as-field-label" for="as-dr-cus">自訂錨地位置</label>
            <div id="as-dr-cus-body" style="${ds(s.drift.customEnabled)}">
              <div class="as-coord-group" style="margin-top:8px">
                <span class="as-coord-label">緯度：</span>
                ${n("as-lat-deg", s.drift.lat_deg, 0, 90, 1, "°")}
                ${n("as-lat-min", s.drift.lat_min, 0, 59.999, 0.001, "′")}
                <select class="as-select" id="as-lat-hem"><option value="N"${s.drift.lat_hem==="N"?" selected":""}>N</option><option value="S"${s.drift.lat_hem==="S"?" selected":""}>S</option></select>
              </div>
              <div class="as-coord-group" style="margin-top:6px">
                <span class="as-coord-label">經度：</span>
                ${n("as-lon-deg", s.drift.lon_deg, 0, 180, 1, "°")}
                ${n("as-lon-min", s.drift.lon_min, 0, 59.999, 0.001, "′")}
                <select class="as-select" id="as-lon-hem"><option value="E"${s.drift.lon_hem==="E"?" selected":""}>E</option><option value="W"${s.drift.lon_hem==="W"?" selected":""}>W</option></select>
              </div>
              <div class="as-field-params" style="margin-top:8px">
                <span>離開錨位：</span>${n("as-dr-cus-r", s.drift.customRadius, 0.1, 50, 0.1, "公里")}
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- AIS 信號中斷 -->
      <div class="as-section${sec("aisLost")}" data-section="aisLost">
        <div class="as-section-title">AIS 信號中斷</div>
        <div class="as-section-desc">船舶 AIS 訊號消失超過設定時間則發送提醒。</div>
        <div class="as-field">
          <input type="checkbox" class="as-cb" id="as-ais-en" data-k="aisLost" data-p="enabled"${s.aisLost.enabled?" checked":""}>
          <div class="as-field-body">
            <label class="as-field-label" for="as-ais-en">信號消失提醒</label>
            <div class="as-field-params" style="${ds(s.aisLost.enabled)};margin-top:8px">
              <span>消失時間門檻：</span>${n("as-ais-dur", s.aisLost.duration, 10, 1440, 10, "分鐘")}
            </div>
          </div>
        </div>
      </div>

      <!-- 航線偏移監控 -->
      <div class="as-section${sec("routeDev")}" data-section="routeDev">
        <div class="as-section-title">航線偏移監控</div>
        <div class="as-section-desc">船舶偏離計畫航線超過設定的距離並持續一定時間則發送提醒。</div>
        <div class="as-field">
          <input type="checkbox" class="as-cb" id="as-rd-en" data-k="routeDev" data-p="enabled"${s.routeDev.enabled?" checked":""}>
          <div class="as-field-body">
            <label class="as-field-label" for="as-rd-en">航線偏移監控</label>
            <div class="as-field-params" style="${ds(s.routeDev.enabled)};margin-top:8px">
              <span>計畫航線：</span>
              <select class="as-select" id="as-rd-sel"><option value="">請選擇</option>${routeOpts}</select>
              <button type="button" class="as-tag-btn" style="height:32px;padding:0 10px">＋ 新增</button>
            </div>
            <div class="as-field-params" style="${ds(s.routeDev.enabled)};margin-top:8px">
              <span>偏離航線：</span>${n("as-rd-dev", s.routeDev.deviation, 0.1, 50, 0.1, "NM 提醒")}
            </div>
            <div class="as-field-params" style="${ds(s.routeDev.enabled)};margin-top:8px">
              <span>持續時間：</span>${n("as-rd-dur", s.routeDev.duration, 1, 240, 5, "分鐘")}
            </div>
          </div>
        </div>
      </div>

      <!-- 搭靠接近警示 -->
      <div class="as-section${sec("berthing")}" data-section="berthing">
        <div class="as-section-title">搭靠接近警示</div>
        <div class="as-section-desc">船舶接近其他船舶或進入指定區域時發送提醒。</div>
        <div class="as-field">
          <input type="checkbox" class="as-cb" id="as-bt-en" data-k="berthing" data-p="enabled"${s.berthing.enabled?" checked":""}>
          <div class="as-field-body">
            <label class="as-field-label" for="as-bt-en">搭靠接近警示</label>
            <div id="as-bt-body" style="${ds(s.berthing.enabled)}">
              <div class="as-field-params" style="margin-top:8px">
                <span>搭靠警示距離：</span>${n("as-bt-dist", s.berthing.distance, 10, 200, 10, "米（10–200）")}
              </div>
              <div class="as-field-params" style="margin-top:8px">
                <span>持續時間：</span>${n("as-bt-dur", s.berthing.duration, 5, 120, 5, "分鐘（5–120）")}
              </div>
              <div style="margin-top:12px;font-size:13px;color:var(--k-9aa5b8)">
                選擇搭靠區域：
                <label style="margin-left:12px;cursor:pointer"><input type="radio" name="as-bt-area" value="any"${s.berthing.areaMode==="any"?" checked":""} style="accent-color:var(--k-4a9eff);margin-right:4px"> 不限</label>
                <label style="margin-left:12px;cursor:pointer"><input type="radio" name="as-bt-area" value="zone"${s.berthing.areaMode==="zone"?" checked":""} style="accent-color:var(--k-4a9eff);margin-right:4px"> 指定標記區域</label>
                <a href="#" onclick="return false" style="margin-left:14px;color:var(--k-4a9eff);font-size:12px;text-decoration:none">新建區域</a>
              </div>
              <div id="as-bt-zones" style="${s.berthing.areaMode==="zone"?"":"display:none"};margin-top:8px">
                ${_asZoneTags(s.berthing.zones, "berth")}
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <div class="as-footer">
    <button type="button" class="as-btn as-btn-cancel" id="as-cancel-btn">取消</button>
    <button type="button" class="as-btn as-btn-save"   id="as-save-btn">儲存</button>
  </div>
</div>`;
}

function wireAlertSettings() {
  const main = document.getElementById("main");

  // 左側導覽切換
  main.querySelectorAll(".as-nav-item").forEach(el => {
    el.addEventListener("click", () => {
      _asSection = el.dataset.sec;
      sessionStorage.setItem("slab_va_as_sec", _asSection);
      main.querySelectorAll(".as-nav-item").forEach(n => n.classList.toggle("active", n.dataset.sec === _asSection));
      main.querySelectorAll(".as-section").forEach(s => s.classList.toggle("active", s.dataset.section === _asSection));
    });
  });

  // 通知管道 toggle
  main.querySelectorAll(".as-channel-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const ch = btn.dataset.ch;
      _alertSettings.channels[ch] = !_alertSettings.channels[ch];
      btn.classList.toggle("active", _alertSettings.channels[ch]);
    });
  });

  // Checkbox → enable/disable sub-params (inline style)
  main.querySelectorAll(".as-cb").forEach(cb => {
    cb.addEventListener("change", () => {
      const obj = cb.dataset.k, prop = cb.dataset.p;
      _alertSettings[obj][prop] = cb.checked;
      // 通用：切換同一 .as-field 內的 .as-field-params
      const field = cb.closest(".as-field");
      if (field) {
        field.querySelectorAll(".as-field-params").forEach(p => {
          p.style.opacity = cb.checked ? "" : "0.4";
          p.style.pointerEvents = cb.checked ? "" : "none";
        });
      }
      // 特例：drift / berthing 有獨立 id 的容器
      const specialMap = {
        "drift.autoEnabled":    "as-dr-auto-p",
        "drift.customEnabled":  "as-dr-cus-body",
        "berthing.enabled":     "as-bt-body",
      };
      const key = `${obj}.${prop}`;
      if (specialMap[key]) {
        const el = document.getElementById(specialMap[key]);
        if (el) { el.style.opacity = cb.checked ? "" : "0.4"; el.style.pointerEvents = cb.checked ? "" : "none"; }
      }
    });
  });

  // Stepper 按鈕（上/下）
  main.querySelectorAll(".th-step-up, .th-step-down").forEach(btn => {
    btn.addEventListener("click", () => {
      const inp = document.getElementById(btn.dataset.for);
      if (!inp) return;
      const step = parseFloat(inp.step) || 1;
      const cur  = parseFloat(inp.value) || 0;
      const min  = inp.min !== "" ? parseFloat(inp.min) : -Infinity;
      const max  = inp.max !== "" ? parseFloat(inp.max) :  Infinity;
      inp.value  = btn.classList.contains("th-step-up")
        ? Math.min(max, parseFloat((cur + step).toFixed(6)))
        : Math.max(min, parseFloat((cur - step).toFixed(6)));
      inp.dispatchEvent(new Event("change"));
    });
  });

  // 速度 W/C 閾值輸入：即時寫回 _thresholds.speed，與分航段集體設定共用
  function _commitSpeedThreshold() {
    const wEl = document.getElementById("as-sp-warn");
    const cEl = document.getElementById("as-sp-crit");
    if (!wEl || !cEl) return;
    const w = parseFloat(wEl.value);
    const c = parseFloat(cEl.value);
    if (!isNaN(w)) _thresholds.speed.warning  = parseFloat((w / 100).toFixed(4));
    if (!isNaN(c)) _thresholds.speed.critical = parseFloat((c / 100).toFixed(4));
    saveThresholds();
    syncEventsFromAlerts();
  }
  ["as-sp-warn", "as-sp-crit"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("change", _commitSpeedThreshold);
    el.addEventListener("blur",   _commitSpeedThreshold);
  });

  // 電子圍籬 / 搭靠區域 tag 切換
  main.querySelectorAll(".as-tag-btn[data-zone]").forEach(btn => {
    btn.addEventListener("click", () => {
      const zid = btn.dataset.zone, prefix = btn.dataset.prefix;
      const key = prefix === "gf" ? "geofence" : "berthing";
      const arr = _alertSettings[key].zones;
      const idx = arr.indexOf(zid);
      if (idx === -1) arr.push(zid); else arr.splice(idx, 1);
      btn.classList.toggle("active", idx === -1);
    });
  });

  // 搭靠區域 radio
  main.querySelectorAll('input[name="as-bt-area"]').forEach(r => {
    r.addEventListener("change", () => {
      _alertSettings.berthing.areaMode = r.value;
      const el = document.getElementById("as-bt-zones");
      if (el) el.style.display = r.value === "zone" ? "" : "none";
    });
  });

  // 儲存
  const saveBtn = document.getElementById("as-save-btn");
  if (saveBtn) {
    saveBtn.addEventListener("click", () => {
      const rv = id => { const e = document.getElementById(id); return e ? parseFloat(e.value)||0 : null; };
      const rs = id => { const e = document.getElementById(id); return e ? e.value : null; };
      const w = (v, obj, p) => { if (v !== null) _alertSettings[obj][p] = v; };
      w(rv("as-sp-kn"),      "speed",    "knots");
      w(rv("as-sp-dur"),     "speed",    "duration");
      w(rs("as-sp-dir"),     "speed",    "direction");
      // 速度 W/C 閾值寫回 _thresholds（與分航段集體設定共用）
      const spW = rv("as-sp-warn"); if (spW !== null) _thresholds.speed.warning  = parseFloat((spW / 100).toFixed(4));
      const spC = rv("as-sp-crit"); if (spC !== null) _thresholds.speed.critical = parseFloat((spC / 100).toFixed(4));
      saveThresholds();
      syncEventsFromAlerts();
      w(rv("as-dr-auto-r"),  "drift",    "autoRadius");
      w(rv("as-lat-deg"),    "drift",    "lat_deg");
      w(rv("as-lat-min"),    "drift",    "lat_min");
      w(rs("as-lat-hem"),    "drift",    "lat_hem");
      w(rv("as-lon-deg"),    "drift",    "lon_deg");
      w(rv("as-lon-min"),    "drift",    "lon_min");
      w(rs("as-lon-hem"),    "drift",    "lon_hem");
      w(rv("as-dr-cus-r"),   "drift",    "customRadius");
      w(rv("as-ais-dur"),    "aisLost",  "duration");
      w(rv("as-rd-dev"),     "routeDev", "deviation");
      w(rv("as-rd-dur"),     "routeDev", "duration");
      w(rs("as-rd-sel"),     "routeDev", "routeId");
      w(rv("as-bt-dist"),    "berthing", "distance");
      w(rv("as-bt-dur"),     "berthing", "duration");
      saveAlertSettings();
      saveBtn.textContent = "已儲存 ✓";
      setTimeout(() => { saveBtn.textContent = "儲存"; }, 2200);
    });
  }

  // 取消：重載後重繪
  const cancelBtn = document.getElementById("as-cancel-btn");
  if (cancelBtn) {
    cancelBtn.addEventListener("click", () => { loadAlertSettings(); renderThresholds(); });
  }
}

// 啟動：載入持久化閾值、事件 + 從目前警示同步新立案
loadThresholds();
loadAlertSettings();
loadEvents();
syncEventsFromAlerts();
applySidebarState();
initUserSwitcher();
route();
</script>
</body>
</html>
