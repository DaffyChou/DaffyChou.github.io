/* 各維度的閾值結構：
 *   - warning / critical: 數值閾值
 *   - warningDuration / criticalDuration: 達閾值後需持續分鐘才正式立案（只 route、speed 有意義）
 *   - notify: 觸發時自動通知（mail / line 兩種，可勾任意組合，皆未勾則靜默立案）
 *   port_io / zone_io 為距離型：值越小越接近邊界 → critical 設較小值（已抵 / 跨界），
 *     warning 設較大值（接近邊界提早提醒） */
const DEFAULT_THRESHOLDS = {
  route:        { warning: 1.5,  critical: 3.0,  warningDuration: 60, criticalDuration: 3, notify: { mail: true,  line: false } },  // 航線偏移絕對距離（NM）
  speed:        { warning: 0.20, critical: 0.40, warningDuration: 60, criticalDuration: 3, notify: { mail: true,  line: false } },  // 超過配速比例
  /* 漂航（drift）：分航段批次設定的全船隊預設漂航圈半徑（可對個別船舶覆寫）。
   * 錨泊（anchor）不在此處 —— 走單船手動錨位，閾值存於各船 _anchorGeo，見 ANCHOR_DEFAULT。 */
  driftAnchor:  { warning: 0.30, critical: 0.50, warningDuration: 5,  criticalDuration: 5, notify: { mail: true,  line: false } },  // 漂航圈半徑（NM）+ 持續時間（分，warningDuration 作為單一持續門檻）
  port_io:      { warning: 5.0,  critical: 0.5,  warningDuration: 0,  criticalDuration: 0, notify: { mail: true,  line: true  } },  // 與港口端點距離（NM）
  zone_io:      { warning: 5.0,  critical: 1.0,  warningDuration: 0,  criticalDuration: 0, notify: { mail: true,  line: true  } },  // 與區域邊界距離（NM）
};
const THRESHOLD_META = {
  route:           { label: "航線偏移",       short: "Route Dev",         unit: "海浬 NM",        unitShort: "NM",        range: "0 – 10",    step: 0.5,  min: 0,  max: 10,  isPct: false, hasDuration: true },
  speed:           { label: "速度異常",       short: "Speed Anom",        unit: "× 計畫平均速度", unitShort: "× planAvg", range: "0 – 2",     step: 0.05, min: 0,  max: 2,   isPct: false, hasDuration: true },
  driftAnchor:     { label: "漂航圈半徑",     short: "Drift Watch",       unit: "海浬 NM",        unitShort: "NM",        range: "0 – 3",     step: 0.05, min: 0,  max: 3,   isPct: false },
  port_io:         { label: "到離港監控",     short: "Port I/O",          unit: "與港口端點距離 NM（值越小越接近港界）", unitShort: "NM", range: "0 – 20", step: 0.5, min: 0, max: 20, isPct: false, mode: "lower" },
  zone_io:         { label: "到離區域監控",   short: "Zone I/O",          unit: "與區域邊界距離 NM（值越小越接近邊界）", unitShort: "NM", range: "0 – 20", step: 0.5, min: 0, max: 20, isPct: false, mode: "lower" },
};
let _thresholds = JSON.parse(JSON.stringify(DEFAULT_THRESHOLDS));
function loadThresholds() {
  try {
    const raw = localStorage.getItem(THRESHOLDS_STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    // 與預設深層合併，避免 key 不齊或型別錯誤
    Object.keys(DEFAULT_THRESHOLDS).forEach(k => {
      if (saved[k] && typeof saved[k] === "object") {
        const w  = parseFloat(saved[k].warning);
        const c  = parseFloat(saved[k].critical);
        const wd = parseInt(saved[k].warningDuration, 10);
        const cd = parseInt(saved[k].criticalDuration, 10);
        if (!isNaN(w))  _thresholds[k].warning = w;
        if (!isNaN(c))  _thresholds[k].critical = c;
        if (!isNaN(wd)) _thresholds[k].warningDuration = wd;
        if (!isNaN(cd)) _thresholds[k].criticalDuration = cd;
        if (saved[k].notify && typeof saved[k].notify === "object") {
          _thresholds[k].notify.mail = !!saved[k].notify.mail;
          _thresholds[k].notify.line = !!saved[k].notify.line;
        }
      }
    });
  } catch (e) {}
}
function saveThresholds() {
  try { localStorage.setItem(THRESHOLDS_STORAGE_KEY, JSON.stringify(_thresholds)); } catch (e) {}
}

/* ── 到離區域監控：逐圍籬設定 ───────────────────────────────────
 * 結構：{ [zoneId]: {
 *     enabled: bool,           是否監控
 *     direction: "arrival"|"departure",  監控方向（先選到達 / 離開）
 *     advanceNm: number,       提前距離（到達 = 入界前 N 海浬；離開 = 出界前 N 海浬）
 *     boundaryAlert: bool      跨越邊界瞬間提醒（到達提醒 / 離開提醒）
 * } }
 *
 * 預設：所有 RISK_ZONES 啟用、direction=arrival、advanceNm=5、boundaryAlert=true
 *
 * 注意：舊版資料若用 entryNm/exitNm，於 getZoneIoFenceCfg 自動 fallback 到新欄位。 */
const ZONE_IO_CONFIG_KEY = "slab_va_zone_io_fences_v1";
const ZONE_IO_DEFAULTS = {
  enabled: true,
  direction: "arrival",
  advanceNm: 5.0,
  boundaryAlert: true,
};
let _zoneIoFenceConfig = {};
function loadZoneIoConfig() {
  try {
    const raw = localStorage.getItem(ZONE_IO_CONFIG_KEY);
    _zoneIoFenceConfig = raw ? (JSON.parse(raw) || {}) : {};
  } catch (e) { _zoneIoFenceConfig = {}; }
}
function saveZoneIoConfig() {
  try { localStorage.setItem(ZONE_IO_CONFIG_KEY, JSON.stringify(_zoneIoFenceConfig)); } catch (e) {}
}
/* 查單一圍籬目前設定（與預設深層合併）；對舊版 entryNm/exitNm 欄位做 fallback。 */
function getZoneIoFenceCfg(zoneId) {
  const o = _zoneIoFenceConfig[zoneId] || {};
  const direction = (o.direction === "departure") ? "departure" : "arrival";
  // 舊版 → 新版：到達用 entryNm，離開用 exitNm；若都沒設定用預設
  let advanceNm = (typeof o.advanceNm === "number") ? o.advanceNm
    : (direction === "arrival" && typeof o.entryNm === "number") ? o.entryNm
    : (direction === "departure" && typeof o.exitNm === "number") ? o.exitNm
    : ZONE_IO_DEFAULTS.advanceNm;
  return {
    enabled: o.enabled ?? ZONE_IO_DEFAULTS.enabled,
    direction,
    advanceNm,
    boundaryAlert: o.boundaryAlert ?? ZONE_IO_DEFAULTS.boundaryAlert,
  };
}
function setZoneIoFenceCfg(zoneId, patch) {
  const cur = getZoneIoFenceCfg(zoneId);
  _zoneIoFenceConfig[zoneId] = Object.assign({}, cur, patch);
  saveZoneIoConfig();
}
loadZoneIoConfig();
/* ── 漂航圈 per-vessel 半徑覆寫 ──────────────────────────────────────
 *   監管人員可依不同船舶/錨地/作業情境，為個別 vessel_id 設定專屬半徑。
 *   結構：{ [vessel_id]: { driftAnchor: {warning, critical}, driftAdrift: {...} } }
 *   找不到 override 時 fallback 至 _thresholds（全域系統閾值）。 */
const DRIFT_OVERRIDES_KEY = "slab_va_drift_overrides_v1";
let _driftOverrides = {};
function loadDriftOverrides() {
  try {
    const raw = localStorage.getItem(DRIFT_OVERRIDES_KEY);
    _driftOverrides = raw ? (JSON.parse(raw) || {}) : {};
  } catch (e) { _driftOverrides = {}; }
}
function saveDriftOverrides() {
  try { localStorage.setItem(DRIFT_OVERRIDES_KEY, JSON.stringify(_driftOverrides)); } catch (e) {}
}
function getDriftOverride(vesselId, driftKey) {
  const v = _driftOverrides[vesselId];
  if (!v || !v[driftKey]) return null;
  const o = v[driftKey];
  if (o.warning == null && o.critical == null && !o.center && o.duration == null) return null;
  return o;   // { warning?, critical?, center?:[lat,lng], duration? }（半徑 NM、duration 分鐘）
}
/* setDriftOverride(vid, key, warn, crit[, center][, duration])
 *   - warn/crit：NM；center：[lat,lng]；duration：分鐘（達門檻須持續才立案）；null=清、undefined=不動
 *   - 傳統呼叫 (warn=null, crit=null 且未帶 center/duration) 視為整筆 reset */
function setDriftOverride(vesselId, driftKey, warn, crit, center, duration) {
  const fullReset = (warn == null && crit == null && center === undefined && duration === undefined);
  if (fullReset) {
    if (_driftOverrides[vesselId]) {
      delete _driftOverrides[vesselId][driftKey];
      if (Object.keys(_driftOverrides[vesselId]).length === 0) delete _driftOverrides[vesselId];
    }
    saveDriftOverrides();
    return;
  }
  const cur = (_driftOverrides[vesselId] && _driftOverrides[vesselId][driftKey]) || {};
  const next = Object.assign({}, cur);
  if (warn != null) next.warning = warn;
  if (crit != null) next.critical = crit;
  if (center === null) delete next.center; else if (center !== undefined) next.center = center;
  if (duration === null) delete next.duration; else if (duration !== undefined) next.duration = duration;
  if (!_driftOverrides[vesselId]) _driftOverrides[vesselId] = {};
  _driftOverrides[vesselId][driftKey] = next;
  saveDriftOverrides();
  if (typeof setAnchorAck === "function") setAnchorAck(vesselId, true);   // 完成漂航設定即解除待辦通知
}
loadDriftOverrides();

/* ── 錨泊（anchor）單船手動設定 ──────────────────────────────────────
 *   規格：錨泊與漂航拆為兩獨立維度；錨泊「不進批次」，由監管人員逐船設定。
 *   兩份 per-vessel storage：
 *     1) _anchorStates[vid] = "anchor" | "drift"  — 該船目前手動標記的狀態（AIS 皆為 nav_status 1，
 *        無法自動區分，故由監管人員手動切換；未設定預設 "drift"，走漂航批次監控）。
 *     2) _anchorGeo[vid] = 手動錨位幾何，二擇一：
 *          { type:"circle",  center:[lat,lng], warning:NM, critical:NM }
 *          { type:"polygon", points:[[lat,lng],…] }  // ≥3 點圈定錨區；圈內正常、圈外即嚴重
 *   半徑單位為海浬 NM（與航線偏移一致）；錨位中心/區域一律由監管人員手動輸入或在地圖繪製，不做外部估算。 */
const ANCHOR_DEFAULT = { warning: 0.15, critical: 0.30, duration: 5 }; // 半徑（NM）+ 持續時間（分，達門檻須持續才立案，避免短暫尖峰誤觸）
const ANCHOR_STATE_KEY = "slab_va_anchor_state_v1";
const ANCHOR_GEO_KEY   = "slab_va_anchor_geo_v1";
let _anchorStates = {};
let _anchorGeo = {};
function loadAnchorConfig() {
  try { _anchorStates = JSON.parse(localStorage.getItem(ANCHOR_STATE_KEY)) || {}; } catch (e) { _anchorStates = {}; }
  try { _anchorGeo    = JSON.parse(localStorage.getItem(ANCHOR_GEO_KEY))   || {}; } catch (e) { _anchorGeo = {}; }
}
function saveAnchorStates() { try { localStorage.setItem(ANCHOR_STATE_KEY, JSON.stringify(_anchorStates)); } catch (e) {} }
function saveAnchorGeo()    { try { localStorage.setItem(ANCHOR_GEO_KEY,   JSON.stringify(_anchorGeo));   } catch (e) {} }
function getAnchorState(vid) { return _anchorStates[vid] === "anchor" ? "anchor" : "drift"; }
function setAnchorState(vid, state) {
  if (state === "anchor") _anchorStates[vid] = "anchor";
  else delete _anchorStates[vid];           // "drift" 為預設，不落地保持乾淨
  saveAnchorStates();
  if (typeof setAnchorAck === "function") setAnchorAck(vid, true);   // 手動指定狀態即視為已處理通知
}
function getAnchorGeo(vid) {
  const g = _anchorGeo[vid];
  if (!g) return null;
  if (g.type === "circle" && Array.isArray(g.center)) return g;
  if (g.type === "polygon" && Array.isArray(g.points) && g.points.length >= 3) return g;
  return null;
}
function setAnchorGeo(vid, geo) {
  if (!geo) delete _anchorGeo[vid];
  else _anchorGeo[vid] = geo;
  saveAnchorGeo();
  setAnchorAck(vid, true);   // 完成錨位設定即視為已處理通知
}
loadAnchorConfig();

/* ── 錨泊設定通知流程 ────────────────────────────────────────────
 *   規格：船舶進入 AIS 錨泊狀態(nav_status 1)時，先「通知監管人員」，
 *   由監管人員在單船設定逐船進行漂航與錨泊的設定。
 *   _anchorSetupAck：已處理(設定/確認)過的 vessel_id；未處理者在船隊頁顯示通知橫幅。
 *   _anchorNotifySnooze：本次 session 暫時關閉的 vessel_id（重新整理後再提醒）。 */
const ANCHOR_ACK_KEY = "slab_va_anchor_ack_v1";
let _anchorSetupAck = {};
const _anchorNotifySnooze = new Set();
/* 人工強制設定：非錨泊狀態(nav_status ≠ 1)時預設不可設閾值；監管人員可對個別船「人工強制」開啟設定（session 內有效） */
const _anchorForceSetup = new Set();
function anchorSetupAllowed(v) { return v && (parseInt(v.nav_status, 10) === 1 || _anchorForceSetup.has(v.vessel_id)); }
window.forceAnchorSetup = function(vid) { _anchorForceSetup.add(Number(vid)); if (typeof renderThresholds === "function") renderThresholds(); };
function loadAnchorAck() { try { _anchorSetupAck = JSON.parse(localStorage.getItem(ANCHOR_ACK_KEY)) || {}; } catch (e) { _anchorSetupAck = {}; } }
function isAnchorAck(vid) { return !!_anchorSetupAck[vid]; }
function setAnchorAck(vid, on) {
  if (on) _anchorSetupAck[vid] = 1; else delete _anchorSetupAck[vid];
  try { localStorage.setItem(ANCHOR_ACK_KEY, JSON.stringify(_anchorSetupAck)); } catch (e) {}
}
loadAnchorAck();
/* 是否已完成漂航/錨泊設定：有手動錨位 或 有本船漂航覆寫 即視為已設定（比 ack 旗標更可靠、不受版本影響） */
function isAnchorConfigured(vid) {
  return !!(getAnchorGeo(vid) || getDriftOverride(vid, "driftAnchor"));
}
/* 目前需要監管人員設定漂航/錨泊的在錨船舶（nav_status 1、尚未設定、未暫時關閉、且屬可見範圍） */
function anchorPendingVessels() {
  const vis = (typeof visibleVesselList === "function") ? visibleVesselList() : (window.VESSELS || []);
  return vis.filter(v => parseInt(v.nav_status, 10) === 1 && !isAnchorConfigured(v.vessel_id) && !_anchorNotifySnooze.has(v.vessel_id));
}
/* 通知「前往設定」：帶到單船設定 → 錨泊／漂流航段，並標記已處理 */
window.gotoAnchorSetup = function(vid) {
  vid = Number(vid);
  // 僅導覽到設定頁，不在此標記已處理 —— 待實際完成漂航/錨泊設定(存檔)才解除待辦，避免只點進來卻沒設定就消失。
  _vesselViewVid = vid;
  _vesselViewSegment = "anchor";
  _thresholdView = "vessel";
  try { sessionStorage.setItem("slab_va_th_vv_segment", "anchor"); } catch (e) {}
  if (location.hash !== "#/thresholds") location.hash = "#/thresholds";
  else renderThresholds();
};
window.snoozeAnchorNotify = function(vid) {
  _anchorNotifySnooze.add(Number(vid));
  rerenderCurrentView();
};
/* 錨泊待設定通知：以 map-overlay-banner 樣式（比照警示 banner，severity-critical、預設收合）注入地圖，
 *   每列多一個「設定」按鈕直接進單船設定。疊在警示 banner 下方。 */
function injectAnchorNotifyBanner(mapWrap) {
  if (!mapWrap) return;
  const pend = anchorPendingVessels();
  if (!pend.length) return;
  const key = "slab_va_anchor_banner_collapsed";
  const collapsed = sessionStorage.getItem(key) !== "0";   // 預設收合
  const rows = pend.map(v => `
    <div class="banner-row" data-vid="${v.vessel_id}">
      <span class="dot warning"></span>
      <span class="ship-name">${escapeHtml(v.vessel_name)}</span>
      <span class="top-dim"><span>待設定</span></span>
      <button type="button" class="an-nt-setup" data-vid="${v.vessel_id}" title="前往設定漂航／錨泊"
              style="margin-left:auto;padding:2px 12px;border-radius:4px;border:none;background:var(--k-2c6cdb);color:#fff;font-size:12px;cursor:pointer">設定</button>
    </div>`).join("");
  const banner = document.createElement("div");
  banner.className = "map-overlay-banner anchor-notify severity-critical" + (collapsed ? " collapsed" : "");
  banner.innerHTML = `
    <div class="banner-head" id="anchor-banner-head">
      <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
      <span class="ttl">⚓ <b>${pend.length}</b> 艘待設定漂航／錨泊 <span style="font-weight:400;opacity:.85">/ Anchor setup</span></span>
    </div>
    <div class="banner-list">${rows}</div>`;
  mapWrap.appendChild(banner);
  // 疊在警示 banner 下方（若有）；否則貼齊頂端
  const alertBanner = mapWrap.querySelector(".map-overlay-banner:not(.anchor-notify):not(.hidden)");
  banner.style.top = (alertBanner ? 10 + alertBanner.offsetHeight + 8 : 10) + "px";
  banner.querySelector("#anchor-banner-head").addEventListener("click", () => {
    const c = banner.classList.toggle("collapsed");
    sessionStorage.setItem(key, c ? "1" : "0");
  });
  banner.querySelectorAll(".an-nt-setup").forEach(btn => btn.addEventListener("click", (e) => {
    e.stopPropagation();
    const vid = parseInt(btn.dataset.vid, 10);
    if (!isNaN(vid)) gotoAnchorSetup(vid);
  }));
}
/* 強制提醒：船舶進入錨泊狀態(nav_status 1)且未設定 → 主動彈出設定提示（每船本 session 彈一次，避免持續打擾）。
 *   未設定前，橫幅與「錨泊設定待辦」事件仍持續存在。 */
const _anchorPromptShownIds = new Set();
function maybeShowAnchorForcePrompt() {
  const pend = anchorPendingVessels().filter(v => !_anchorPromptShownIds.has(v.vessel_id));
  if (!pend.length) return;
  pend.forEach(v => _anchorPromptShownIds.add(v.vessel_id));
  const rows = pend.map(v => `
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--k-2a2a2a)">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--k-f5a623);flex:0 0 8px"></span>
      <span style="flex:1;color:var(--k-c4cdda);font-size:13px"><b style="color:var(--k-e4eaf2)">${escapeHtml(v.vessel_name)}</b> · IMO ${escapeHtml(String(v.imo))}</span>
      <button type="button" class="trans-btn afp-set" data-vid="${v.vessel_id}">前往設定 / Set up</button>
    </div>`).join("");
  const mask = document.createElement("div");
  mask.className = "modal-mask open";
  mask.style.zIndex = "1400";
  mask.innerHTML = `
    <div class="modal" style="width:min(480px,92vw);position:relative">
      <h3>⚓ 錨泊狀態 · 需設定漂航／錨泊 <span style="color:var(--k-7c8a9e);font-weight:400;font-size:14px">/ Anchor setup required</span></h3>
      <div style="color:var(--k-9aa5b8);font-size:13px;margin:6px 0 8px;line-height:1.6">下列船舶 AIS 已進入錨泊狀態（nav_status 1），請監管人員設定漂航／錨泊監控。未完成設定前，系統會在事件清單與地圖持續提醒。</div>
      ${rows}
      <div class="modal-actions" style="margin-top:14px">
        <button type="button" class="trans-btn secondary afp-later">稍後 / Later</button>
      </div>
    </div>`;
  document.body.appendChild(mask);
  const close = () => mask.remove();
  mask.querySelectorAll(".afp-set").forEach(b => b.addEventListener("click", () => { const vid = parseInt(b.dataset.vid, 10); close(); if (!isNaN(vid)) gotoAnchorSetup(vid); }));
  mask.querySelector(".afp-later").addEventListener("click", close);
  mask.addEventListener("click", e => { if (e.target === mask) close(); });
}

/* 公尺 → 海浬 NM 顯示（2 位小數）；錨泊/漂航距離/半徑一律以 NM 呈現 */
function fmtNM(m) { return (Number(m) / NM_M).toFixed(2); }
/* Haversine 距離（公尺）— 錨泊/漂航共用 */
function haversineMeters(a, b) {
  if (!a || !b || a[0] == null || b[0] == null) return 0;
  const R = 6371000, toRad = d => d * Math.PI / 180;
  const dLat = toRad(b[0] - a[0]);
  const dLon = toRad(b[1] - a[1]);
  const sa = Math.sin(dLat/2)**2 + Math.cos(toRad(a[0])) * Math.cos(toRad(b[0])) * Math.sin(dLon/2)**2;
  return Math.round(2 * R * Math.asin(Math.sqrt(sa)));
}
/* 點是否在多邊形內（ray casting）；pts = [[lat,lng],…]、p = [lat,lng] */
function pointInPoly(p, pts) {
  let inside = false;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const yi = pts[i][0], xi = pts[i][1], yj = pts[j][0], xj = pts[j][1];
    const intersect = ((yi > p[0]) !== (yj > p[0])) &&
      (p[1] < (xj - xi) * (p[0] - yi) / ((yj - yi) || 1e-12) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}
/* 多邊形形心（顯示用中心點） */
function polyCentroid(pts) {
  let la = 0, lo = 0;
  pts.forEach(p => { la += p[0]; lo += p[1]; });
  return [la / pts.length, lo / pts.length];
}
/* 點到多邊形最近邊的距離（公尺）— 以 p 為原點做等距投影後算點到線段最短距離。錨區量級小，投影誤差可忽略。 */
function distToPolyEdgeMeters(p, pts) {
  const latRad = p[0] * Math.PI / 180;
  const mLat = 111320, mLng = 111320 * Math.cos(latRad);
  const proj = q => [ (q[1] - p[1]) * mLng, (q[0] - p[0]) * mLat ];   // [x 東, y 北]，原點為 p
  let min = Infinity;
  for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
    const a = proj(pts[j]), b = proj(pts[i]);
    const dx = b[0] - a[0], dy = b[1] - a[1];
    let t = (dx === 0 && dy === 0) ? 0 : ((0 - a[0]) * dx + (0 - a[1]) * dy) / (dx * dx + dy * dy);
    t = Math.max(0, Math.min(1, t));
    const cx = a[0] + t * dx, cy = a[1] + t * dy;
    min = Math.min(min, Math.hypot(cx, cy));
  }
  return Math.round(min);
}

/* ── 單船 / 地區 閾值 override（route / speed / sea / comm / engine）─
 *   結構：_vesselOverrides[vid][dim] = { warning?, critical? }
 *         _regionOverrides[zid][dim] = { warning?, critical? }
 *   優先序：vessel override > region override（取船舶當前所在 RISK_ZONE 命中）> 全船隊預設 _thresholds
 *   錨地（anchorage）走獨立 _driftOverrides 不在此處 */
const VESSEL_OVERRIDES_KEY  = "slab_va_vessel_overrides_v1";
const REGION_OVERRIDES_KEY  = "slab_va_region_overrides_v1";
let _vesselOverrides = {};
let _regionOverrides = {};
const OVERRIDABLE_DIMS = ["route", "speed"];

function loadVesselOverrides() {
  try {
    const raw = localStorage.getItem(VESSEL_OVERRIDES_KEY);
    _vesselOverrides = raw ? (JSON.parse(raw) || {}) : {};
  } catch (e) { _vesselOverrides = {}; }
}
function saveVesselOverrides() {
  try { localStorage.setItem(VESSEL_OVERRIDES_KEY, JSON.stringify(_vesselOverrides)); } catch (e) {}
}
function loadRegionOverrides() {
  try {
    const raw = localStorage.getItem(REGION_OVERRIDES_KEY);
    _regionOverrides = raw ? (JSON.parse(raw) || {}) : {};
  } catch (e) { _regionOverrides = {}; }
}
function saveRegionOverrides() {
  try { localStorage.setItem(REGION_OVERRIDES_KEY, JSON.stringify(_regionOverrides)); } catch (e) {}
}
function setVesselOverride(vid, dim, warn, crit, segment) {
  // 漂航圈半徑用獨立的 _driftOverrides storage（computeAlerts.anchorage 直接讀），
  // 從 v6 起閾值頁的「錨泊航段」會走過來，這裡做轉發避免兩個 storage 不同步
  if (dim === "driftAnchor" || dim === "driftAdrift") {
    setDriftOverride(vid, dim, warn, crit);
    return;
  }
  if (warn == null && crit == null) {
    if (_vesselOverrides[vid]) {
      delete _vesselOverrides[vid][dim];
      if (Object.keys(_vesselOverrides[vid]).length === 0) delete _vesselOverrides[vid];
    }
  } else {
    if (!_vesselOverrides[vid]) _vesselOverrides[vid] = {};
    _vesselOverrides[vid][dim] = {};
    if (warn != null) _vesselOverrides[vid][dim].warning = warn;
    if (crit != null) _vesselOverrides[vid][dim].critical = crit;
    // 航段（規格 v1.0 §4）；segment === "all" 或未提供時不寫入欄位，向後相容
    if (segment && segment !== "all") _vesselOverrides[vid][dim].segment = segment;
  }
  saveVesselOverrides();
}
/* 讀取統一介面：自動依 dim 路由到正確 storage */
function getVesselOverrideRaw(vid, dim) {
  if (dim === "driftAnchor" || dim === "driftAdrift") {
    return _driftOverrides[vid]?.[dim] || null;
  }
  return _vesselOverrides[vid]?.[dim] || null;
}
function setRegionOverride(rid, dim, warn, crit) {
  if (warn == null && crit == null) {
    if (_regionOverrides[rid]) {
      delete _regionOverrides[rid][dim];
      if (Object.keys(_regionOverrides[rid]).length === 0) delete _regionOverrides[rid];
    }
  } else {
    if (!_regionOverrides[rid]) _regionOverrides[rid] = {};
    _regionOverrides[rid][dim] = {};
    if (warn != null) _regionOverrides[rid][dim].warning = warn;
    if (crit != null) _regionOverrides[rid][dim].critical = crit;
  }
  saveRegionOverrides();
}
/* 取得某維度套用到該船的實際閾值。
 *   zoneHits = vesselZoneAlert(v).hits（在 computeAlerts 開頭算一次再傳入，避免重算）
 *   回傳 { warning, critical, source: 'vessel'|'region'|'global', region? } */
function getEffectiveThreshold(dim, vessel, zoneHits) {
  const base = _thresholds[dim] || DEFAULT_THRESHOLDS[dim];
  if (!base) return null;
  if (vessel) {
    const vo = _vesselOverrides[vessel.vessel_id]?.[dim];
    if (vo && (vo.warning != null || vo.critical != null)) {
      return {
        warning:  vo.warning  ?? base.warning,
        critical: vo.critical ?? base.critical,
        source: "vessel",
      };
    }
  }
  if (zoneHits && zoneHits.length) {
    // 多個區域命中時取最嚴重者（與 zone 風險排序一致）
    for (const z of zoneHits) {
      const ro = _regionOverrides[z.id]?.[dim];
      if (ro && (ro.warning != null || ro.critical != null)) {
        return {
          warning:  ro.warning  ?? base.warning,
          critical: ro.critical ?? base.critical,
          source: "region", region: z,
        };
      }
    }
  }
  return { warning: base.warning, critical: base.critical, source: "global" };
}
loadVesselOverrides();
loadRegionOverrides();

/* Demo 資料預設：若使用者尚未自定，預先放入一筆船舶 + 一筆地區 override

    if (trophy) {

      saveVesselOverrides();

}

/* Demo 預設：提供「漂航 / 錨泊 / 待設定」各一個合理的船舶範例。
 *   三艘都選「貼近抵港點」的船 → 標記在錨時航線已抵達、不會顯示成航行中（避免『在錨卻在跑航線』的矛盾）。
 *   在錨(nav_status 1) 時 route/speed 自動 N/A（非行進間），只跑漂航/錨泊監控，狀態一致。
 *   - 漂航：YM HAWK（孟加拉 Chittagong，本就在錨）— 圈心=船位北 0.4 NM、半徑 0.30/0.50 NM → Warning。
 *   - 錨泊：YM WILLPOWER（新加坡海峽，近抵港點）— 手動錨位 船南 0.07 NM、半徑 0.15/0.30 NM → Normal。
 *   - 待設定：YM TROPHY（釜山，近抵港點）— 進入錨泊但尚未設定 → 觸發事件流程 + 通知橫幅。
 *   nav_status/sog/manager 來自 mock JS 每次載入重置，故每次載入都要重套；localStorage 設定只放一次。 */
function preloadSampleAnchorDrift() {
  const vessels = window.MOCK_DATA?.vessels || [];
  if (!vessels.length) return;
  const DEMO_MGR = MANAGERS[0];
  const driftV   = vessels.find(v => v.vessel_name === "YM HAWK");       // 漂航（本就在錨）
  const anchorV  = vessels.find(v => v.vessel_name === "YM WILLPOWER");  // 錨泊（近抵港點）
  const pendingV = vessels.find(v => v.vessel_name === "YM TROPHY");     // 待設定（近抵港點）
  // 三艘設為 AIS 在錨且低速，並指派給預設登入監管（否則預設帳號看不到）。
  [driftV, anchorV, pendingV].forEach(v => { if (v) { v.nav_status = 1; v.sog = 0.3; v.manager = DEMO_MGR; } });
  // localStorage 設定只在第一次放入，避免覆蓋使用者後續調整（換範例船 → 版本升 v4）
  if (!localStorage.getItem("slab_va_demo_ad_v6")) {
    // 清掉舊版範例殘留（含前幾版用過的船與公尺半徑）
    ["YM WELLBEING", "YM MILESTONE", "YM WARRANTY", "YM HAWK", "YM WILLPOWER", "YM TROPHY"].forEach(n => {
      const v = vessels.find(x => x.vessel_name === n);
      if (!v) return;
      setAnchorGeo(v.vessel_id, null);
      setDriftOverride(v.vessel_id, "driftAnchor", null, null);
      delete _anchorStates[v.vessel_id];
      setAnchorAck(v.vessel_id, false);
    });
    if (driftV && driftV.latitude != null) {   // 漂航：圈心=船位北 ~0.4 NM、半徑 0.30/0.50 NM → Warning
      setDriftOverride(driftV.vessel_id, "driftAnchor", 0.30, 0.50, [Number(driftV.latitude) + 0.00667, Number(driftV.longitude)]);
      setAnchorAck(driftV.vessel_id, true);
    }
    if (anchorV && anchorV.latitude != null) { // 錨泊：手動錨位（船南 ~0.07 NM）、半徑 0.15/0.30 NM → Normal
      setAnchorState(anchorV.vessel_id, "anchor");
      setAnchorGeo(anchorV.vessel_id, { type: "circle", center: [Number(anchorV.latitude) - 0.0012, Number(anchorV.longitude)], warning: 0.15, critical: 0.30 });
    }
    // pendingV（YM TROPHY）：不設定、不 ack → 保持「待設定」
    saveAnchorStates();
    try { localStorage.setItem("slab_va_demo_ad_v6", "1"); } catch (e) {}
  }
}

/* 漂航圈半徑設定 — 比照錨位設定：跳到該船單船地圖，側邊面板編輯 + 地圖即時預覽。
 *   圈心預帶「目前船位」（下錨/開始漂航當下的位置快照），可點地圖或輸入經緯度調整；半徑單位 NM。
 *   參數：vesselId、driftKey (driftAnchor / driftAdrift)；可由警示 row、地圖圓心、單船設定呼叫。 */
window.openDriftSettings = function(vesselId, driftKey) {
  const v = VESSELS.find(x => x.vessel_id === Number(vesselId));
  if (!v) return;
  const def = DEFAULT_THRESHOLDS[driftKey];
  if (!def) return;
  if (!anchorSetupAllowed(v)) { alert("此船目前非錨泊狀態（AIS nav_status ≠ 1）。如需設定，請先於單船設定按「人工強制設定」。"); return; }
  _gotoVesselDetailMap(vesselId);   // 單船設定：跳到該船的單船 detail 地圖
  const cur = getDriftOverride(vesselId, driftKey) || {};
  const warnVal = cur.warning  ?? (_thresholds[driftKey]?.warning  ?? def.warning);   // NM
  const critVal = cur.critical ?? (_thresholds[driftKey]?.critical ?? def.critical);  // NM
  const durVal  = cur.duration ?? (_thresholds[driftKey]?.warningDuration ?? def.warningDuration ?? 0);  // 分鐘
  const overridden = !!(cur.warning != null || cur.critical != null || cur.center || cur.duration != null);
  // 圈心：已存設定用之，否則預帶目前船位
  const center = (cur.center && cur.center.length === 2) ? cur.center.slice()
               : (v.latitude != null ? [Number(v.latitude), Number(v.longitude)] : null);
  const inp = "padding:6px 8px;background:var(--k-1a1f2a);border:1px solid var(--k-2e3a4d);border-radius:3px;color:var(--k-d8dee9);font-size:14px;width:100%";

  const mask = document.createElement("div");
  mask.className = "modal-mask open zem-mask";
  mask.style.zIndex = "1200";
  mask.innerHTML = `
    <div class="modal zem-modal">
      <button type="button" class="modal-close zem-close">×</button>
      <h3 class="zem-title">⊙ 漂航圈設定 <span class="en">/ Drift Watch</span></h3>
      <div class="modal-sub">${escapeHtml(v.vessel_name)} · IMO ${escapeHtml(String(v.imo))} · 漂航 / Drifting</div>
      <div style="color:var(--k-7c8a9e);font-size:12px;margin:6px 0 12px;line-height:1.5">
        圈心預帶<b style="color:var(--k-f5b753)">目前船位</b>，可點左側地圖或輸入經緯度調整；半徑單位<b>海浬 NM</b>。系統預設 <b>${def.warning}</b> / <b>${def.critical}</b> NM。${overridden ? '<span style="color:var(--k-f5a623)"> · 目前為本船自訂</span>' : ''}
      </div>
      <div style="display:grid;grid-template-columns:70px 1fr 70px 1fr;gap:8px;align-items:center">
        <label style="color:var(--k-9aa5b8)">緯度 Lat</label><input id="drift-lat" type="number" step="0.0001" value="${center ? center[0] : ""}" style="${inp}">
        <label style="color:var(--k-9aa5b8)">經度 Lng</label><input id="drift-lng" type="number" step="0.0001" value="${center ? center[1] : ""}" style="${inp}">
        <label style="color:var(--k-f5b753);font-weight:600">Warn (NM)</label><input id="drift-modal-warn" type="number" min="0.02" max="3" step="0.05" value="${warnVal}" style="${inp}">
        <label style="color:var(--k-ff8a8a);font-weight:600">Crit (NM)</label><input id="drift-modal-crit" type="number" min="0.02" max="3" step="0.05" value="${critVal}" style="${inp}">
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
        <button type="button" class="trans-btn secondary" id="drift-usepos">用目前船位 / Use ship pos</button>
        <span style="color:var(--k-7c8a9e);font-size:12px">或點左側地圖設定圈心</span>
      </div>
      <div style="display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:center;margin-top:8px">
        <label style="color:var(--k-9ec5ff);font-weight:600">持續時間 (分)</label><input id="drift-modal-dur" type="number" min="0" max="180" step="1" value="${durVal}" style="${inp}">
      </div>
      <div style="color:var(--k-7c8a9e);font-size:12px;margin:6px 0">達門檻後須持續此分鐘數才正式立案，避免短暫尖峰誤觸（0＝立即）。Critical 須大於 Warning，覆寫僅套用本船。</div>
      <div class="modal-actions">
        <button type="button" class="trans-btn danger drift-modal-reset">還原預設 / Reset</button>
        <button type="button" class="trans-btn secondary drift-modal-cancel">取消 / Cancel</button>
        <button type="button" class="trans-btn drift-modal-save">儲存 / Save</button>
      </div>
    </div>`;
  document.body.appendChild(mask);
  mask.style.pointerEvents = "none";
  const modalEl = mask.querySelector(".zem-modal");
  if (modalEl) modalEl.style.pointerEvents = "auto";
  const $ = s => mask.querySelector(s);
  function curCenter() {
    const lat = parseFloat($("#drift-lat").value), lng = parseFloat($("#drift-lng").value);
    return (isFinite(lat) && isFinite(lng)) ? [lat, lng] : null;
  }
  function refreshPreview() {
    _clearAnchorPreview();
    const c = curCenter();
    if (!c || typeof _mapInstance === "undefined" || !_mapInstance) return;
    const w  = parseFloat($("#drift-modal-warn").value) || def.warning;
    const cc = parseFloat($("#drift-modal-crit").value) || def.critical;
    const grp = L.layerGroup();
    L.circle(c, { radius: w * NM_M,  color: "#f5a623", weight: 1.6, fillColor: "#f5a623", fillOpacity: 0.06, dashArray: "5 4" }).addTo(grp);

    L.circleMarker(c, { radius: 5, color: "#8aa0bf", weight: 2, fillColor: "#0d0d0d", fillOpacity: 1 }).bindTooltip("漂航圈中心 / Drift center").addTo(grp);
    _anchorPreviewLayer = grp; grp.addTo(_mapInstance);
  }
  function onMapClick(e) { $("#drift-lat").value = e.latlng.lat.toFixed(5); $("#drift-lng").value = e.latlng.lng.toFixed(5); refreshPreview(); }
  let _t = 0;
  const attach = () => { if (typeof _mapInstance !== "undefined" && _mapInstance) { _mapInstance.on("click", onMapClick); refreshPreview(); return; } if (++_t > 40) return; setTimeout(attach, 80); };
  attach();
  const close = () => {
    if (typeof _mapInstance !== "undefined" && _mapInstance) { try { _mapInstance.off("click", onMapClick); } catch (e) {} }
    _clearAnchorPreview(); mask.remove();

  ["#drift-lat", "#drift-lng", "#drift-modal-warn", "#drift-modal-crit"].forEach(s => { const el = $(s); if (el) el.addEventListener("input", refreshPreview); });
  $(".drift-modal-save").addEventListener("click", () => {
    const w = parseFloat($("#drift-modal-warn").value);
    const c = parseFloat($("#drift-modal-crit").value);
    const ctr = curCenter();
    let dur = parseInt($("#drift-modal-dur").value, 10); if (isNaN(dur) || dur < 0) dur = 0;
    if (!ctr) { alert("請輸入有效的漂航圈中心經緯度（或點地圖設定）"); return; }
    if (isNaN(w) || isNaN(c) || w <= 0 || c <= 0 || c <= w) { alert("Critical 半徑需大於 Warning 半徑，且皆為正數"); return; }
    setDriftOverride(Number(vesselId), driftKey, w, c, ctr, dur);
    close(); rerenderCurrentView();
  });
  $(".drift-modal-reset").addEventListener("click", () => {
    setDriftOverride(Number(vesselId), driftKey, null, null);   // 全清（含中心）
    close(); rerenderCurrentView();
  });
};

/* ── 錨泊手動錨位設定 modal（單船）──────────────────────────────────
 *   兩種錨位幾何：單點＋警告/嚴重半徑（circle）或 ≥3 點錨區多邊形（polygon）。
 *   支援直接輸入經緯度，或按「在地圖繪製」到目前地圖上點選（暫時隱藏 modal）。
 *   儲存時一併把該船狀態標記為「錨泊」。 */
/* 錨位即時預覽圖層（畫在船隊地圖上，隨編輯內容更新，比照區域編輯器的地圖預覽） */
let _anchorPreviewLayer = null;
function _clearAnchorPreview() {
  if (_anchorPreviewLayer) {
    [typeof _mapInstance !== "undefined" ? _mapInstance : null,
     typeof _fleetMap   !== "undefined" ? _fleetMap   : null].forEach(m => {
      if (m) { try { m.removeLayer(_anchorPreviewLayer); } catch (e) {} }
    });
  }
  _anchorPreviewLayer = null;
}
/* 單船設定跳轉：切到船隊頁並進入該船的「單船 detail」上方地圖（_mapInstance） */
function _gotoVesselDetailMap(vesselId) {
  _selectedVessel = Number(vesselId);
  if (location.hash === "#/fleet" || location.hash === "") {
    if (typeof renderFleet === "function") renderFleet();
  } else {
    location.hash = "#/fleet";   // route() 會以已設定的 _selectedVessel 進入 detail
  }
}
/* 錨區多邊形頂點輸入列（沿用「到離區域監控 → 繪製新區域」的座標 UX：
 *   度(dd) / 度分(dm) / 度分秒(dms) 三格式即時切換、逐頂點 N/S・E/W 切換）。 */
function _anCoordInputs(idx, lat, lon, fmt) {
  if (fmt === "dd") {
    return `
      <input type="number" step="0.000001" class="zem-coord-input zem-lat-dd" data-idx="${idx}" value="${lat.toFixed(6)}"><span class="zem-deg-unit">°</span>
      <button type="button" class="zem-hemi zem-hemi-lat${lat >= 0 ? " is-pos" : ""}" data-idx="${idx}" data-axis="lat">${lat >= 0 ? "N" : "S"}</button>
      <input type="number" step="0.000001" class="zem-coord-input zem-lon-dd" data-idx="${idx}" value="${lon.toFixed(6)}"><span class="zem-deg-unit">°</span>
      <button type="button" class="zem-hemi zem-hemi-lon${lon >= 0 ? " is-pos" : ""}" data-idx="${idx}" data-axis="lon">${lon >= 0 ? "E" : "W"}</button>`;
  } else if (fmt === "dm") {
    const a = _ddToDM(lat), b = _ddToDM(lon);
    return `
      <input type="number" class="zem-coord-input zem-lat-d" data-idx="${idx}" value="${a.d}" min="0" max="90"><span class="zem-deg-unit">°</span>
      <input type="number" step="0.000001" class="zem-coord-input zem-lat-m" data-idx="${idx}" value="${a.m.toFixed(3)}" min="0" max="59.999999"><span class="zem-deg-unit">'</span>
      <button type="button" class="zem-hemi zem-hemi-lat${!a.neg ? " is-pos" : ""}" data-idx="${idx}" data-axis="lat">${a.neg ? "S" : "N"}</button>
      <input type="number" class="zem-coord-input zem-lon-d" data-idx="${idx}" value="${b.d}" min="0" max="180"><span class="zem-deg-unit">°</span>

  document.body.appendChild(mask);

  const modalEl = mask.querySelector(".zem-modal");
  if (modalEl) modalEl.style.pointerEvents = "auto";

  // 即時預覽：依目前模式與輸入，在單船地圖上畫錨位圈 / 錨區多邊形
  function refreshPreview() {

    const grp = L.layerGroup();

      const lat = parseFloat($("#an-lat").value), lng = parseFloat($("#an-lng").value);
      const w = parseFloat($("#an-warn").value) || ANCHOR_DEFAULT.warning;
      const cc = parseFloat($("#an-crit").value) || ANCHOR_DEFAULT.critical;
      if (isFinite(lat) && isFinite(lng)) {
        L.circle([lat, lng], { radius: w * NM_M,  color: "#f5a623", weight: 1.6, fillColor: "#f5a623", fillOpacity: 0.06, dashArray: "5 4" }).addTo(grp);
        L.circle([lat, lng], { radius: cc * NM_M, color: "#ff4d4f", weight: 1.6, fill: false, dashArray: "8 6" }).addTo(grp);
        L.circleMarker([lat, lng], { radius: 5, color: "#6ee094", weight: 2, fillColor: "#0d0d0d", fillOpacity: 1 }).addTo(grp);
      }
    } else {
      readAllAnRows();
      const pts = state.coords.filter(p => isFinite(p[0]) && isFinite(p[1]));
      if (pts.length >= 3) L.polygon(pts, { color: "#f5b753", weight: 2, fillColor: "#f5b753", fillOpacity: 0.10 }).addTo(grp);
      else if (pts.length >= 2) L.polyline(pts, { color: "#f5b753", weight: 2, dashArray: "4 4" }).addTo(grp);
      pts.forEach((p, i) => L.circleMarker(p, { radius: 4, color: "#f5b753", weight: 2, fillColor: "#0d0d0d", fillOpacity: 1 }).bindTooltip(String(i + 1)).addTo(grp));

  // 點地圖：圓形→設定中心；多邊形→依序新增頂點
  function onMapClick(e) {

  ["an-lat", "an-lng", "an-warn", "an-crit", "an-poly-warn", "an-poly-crit"].forEach(id => {

  });
  $("#an-usepos").addEventListener("click", () => {

  // ── 多邊形（座標列，沿用 zem 座標 UX）──
  function readAnRow(idx) {
    const row = mask.querySelector(`#an-coords-list .zem-coord-row[data-idx="${idx}"]`);
    if (!row) return;
    const latNeg = !row.querySelector(".zem-hemi-lat").classList.contains("is-pos");
    const lonNeg = !row.querySelector(".zem-hemi-lon").classList.contains("is-pos");
    let lat, lon;
    if (state.coordFmt === "dd") {
      lat = parseFloat(row.querySelector(".zem-lat-dd").value);
      lon = parseFloat(row.querySelector(".zem-lon-dd").value);
      if (!isFinite(lat) || !isFinite(lon)) return;
      lat = Math.abs(lat) * (latNeg ? -1 : 1);

    } else {
      const ld = parseFloat(row.querySelector(".zem-lat-d").value), lm = parseFloat(row.querySelector(".zem-lat-m").value), ls = parseFloat(row.querySelector(".zem-lat-s").value);
      const od = parseFloat(row.querySelector(".zem-lon-d").value), om = parseFloat(row.querySelector(".zem-lon-m").value), os = parseFloat(row.querySelector(".zem-lon-s").value);
      if ([ld, lm, ls, od, om, os].some(x => !isFinite(x))) return;

  function readAllAnRows() { mask.querySelectorAll("#an-coords-list .zem-coord-row").forEach(r => readAnRow(parseInt(r.dataset.idx, 10))); }

    ).join("");

    mask.querySelectorAll("#an-coords-list .zem-hemi").forEach(btn => btn.addEventListener("click", () => {

      if (state.coords.length <= 3) { alert("錨區多邊形至少需要 3 個頂點"); return; }

      renderAnCoords();
      refreshPreview();

    readAllAnRows();

  }));
  $("#an-add-pt").addEventListener("click", () => {
    readAllAnRows();
    const last = state.coords[state.coords.length - 1] || [baseLat, baseLng];
    state.coords.push([last[0] + 0.01, last[1] + 0.01]);
    renderAnCoords();
    refreshPreview();
  });
  renderAnCoords();

  // ── 動作 ──
  $(".an-reset").addEventListener("click", () => {
    setAnchorGeo(Number(vesselId), null);
    close(); rerenderCurrentView();
  });
  $(".an-save").addEventListener("click", () => {
    const m = mask.querySelector('input[name="an-mode"]:checked').value;
    let dur = parseInt($("#an-dur").value, 10); if (isNaN(dur) || dur < 0) dur = 0;
    if (m === "circle") {
      const lat = parseFloat($("#an-lat").value), lng = parseFloat($("#an-lng").value);
      const w = parseFloat($("#an-warn").value), cc = parseFloat($("#an-crit").value);
      if (isNaN(lat) || isNaN(lng)) { alert("請輸入有效的錨位經緯度"); return; }
      if (isNaN(w) || isNaN(cc) || w <= 0 || cc <= 0 || cc <= w) { alert("Critical 半徑需大於 Warning 半徑，且皆為正數"); return; }
      setAnchorGeo(Number(vesselId), { type: "circle", center: [lat, lng], warning: w, critical: cc, duration: dur });
    } else {
      readAllAnRows();
      const pts = state.coords.filter(pp => isFinite(pp[0]) && isFinite(pp[1]));
      if (pts.length < 3) { alert("錨區多邊形至少需要 3 個有效頂點"); return; }
      const pw = parseFloat($("#an-poly-warn").value), pc = parseFloat($("#an-poly-crit").value);
      if (isNaN(pw) || isNaN(pc) || pw < 0 || pc <= 0 || pc < pw) { alert("Crit 距離需 ≥ Warn，且 Crit 為正數"); return; }
      setAnchorGeo(Number(vesselId), { type: "polygon", points: pts, warning: pw, critical: pc, duration: dur });
    }
    setAnchorState(Number(vesselId), "anchor");   // 設了錨位即視為錨泊
    close(); rerenderCurrentView();
  });
};

function updateEventBulkBar() {

  if (cnt) cnt.textContent = n;

  if (bar) bar.classList.toggle("has-sel", n > 0);

};
window.clearEventSelection = function() {

/* 手機事件頁篩選展開狀態（跟船隊頁分開管理，預設收合） */
let _eventsFilterOpen = sessionStorage.getItem("slab_va_ev_filter_open") === "1";

function loadEvents() {
  try {
    const raw = localStorage.getItem(EVENT_STORAGE_KEY);
    _events = raw ? JSON.parse(raw) : [];
    // 只保留目前啟用的 4 個維度（航線偏移／速度異常／漂航圈／警示信件）；
    // 早期 localStorage 留下的已移除維度（sea/comm/engine/zone/anchorage/driftAdrift…）一律清除。
    _events = _events.filter(e => DIM_KEYS.includes(e.dimension) || e.dimension === "anchor_setup");
    // 已移除「已認可 / ack」狀態：舊資料殘留的 ack 事件併回「新立案 / new」。
    _events.forEach(e => { if (e.status === "ack") e.status = "new"; });
    // 規格 v1.0 §2：指派對象改為只有監管人員。
    //   - 舊資料殘留的 Operator 名稱（Op-Alice 等）→ migrate 成該船監管
    //   - 未指派（null）→ 也自動補上該船監管，避免事件清單一片「未指派」
    _events.forEach(e => {
      if (!e.assignee || !MANAGERS.includes(e.assignee)) {
        const v = VESSELS.find(x => x.vessel_id === e.vessel_id);
        e.assignee = v?.manager || null;
      }
    });
    saveEvents();
  } catch (e) { _events = []; }
}
function saveEvents() {
  try { localStorage.setItem(EVENT_STORAGE_KEY, JSON.stringify(_events)); } catch (e) {}
}
function eventId(vessel_id, dimension, opened_at) {
  const ym = (opened_at || "").slice(0, 7).replace("-", "");
  return `${vessel_id}-${dimension}-${ym}`;
}
function syncEventsFromAlerts() {
  const seen = new Set();
  // 立案／更新一筆事件的共用流程
  const upsert = (v, k, lvl, openedAt, id, extra) => {
    seen.add(id);
    const existing = _events.find(e => e.id === id);
    if (existing) {
      if (existing.status === "resolved") {
        existing.status = "new";
        existing.history.push({ from: "resolved", to: "new", at: openedAt, by: "system", note: "alert resurfaced" });
      }
      existing.level = lvl;
      delete existing.cleared;
      if (extra && extra.mail) existing.mail = extra.mail;
    } else {
      _events.push(Object.assign({
        id, vessel_id: v.vessel_id, vessel_name: v.vessel_name,
        dimension: k, level: lvl, opened_at: openedAt,
        status: "new", assignee: v.manager || null, notes: [],
        history: [{ from: null, to: "new", at: openedAt, by: "system",
                    note: v.manager ? `auto-assigned to ${v.manager}` : undefined }],
      }, extra || {}));
    }
  };
  VESSELS.forEach(v => {
    const a = computeAlerts(v);
    DIM_KEYS.forEach(k => {
      // 警示信件：一封信一個事件（依信件等級各自立案）
      if (k === "alert") {
        MAILS.filter(m => m.vessel_name === v.vessel_name).forEach((m, idx) => {
          const lvl = m.warning_level === "Warning" ? "critical"
                    : m.warning_level === "Information" ? "warning" : null;
          if (!lvl) return;
          // 一封信一個事件：以信件唯一 id 為鍵（無 id 才退回 code+time+序號），避免同 code/同時間的信件互相覆蓋。
          const mailKey = (m.id != null ? `id${m.id}` :
            `${m.warning_code || "M"}-${(m.warning_event_time || m.received_time || "")}-${idx}`).replace(/[^a-zA-Z0-9]/g, "");
          const id = `${v.vessel_id}-alert-${mailKey}`;
          const openedAt = (m.warning_event_time || m.received_time || "").slice(0, 16) ||
            new Date().toISOString().slice(0,16).replace("T"," ");
          upsert(v, "alert", lvl, openedAt, id, { mail: {
            id: m.id, code: m.warning_code, level: m.warning_level, time: m.warning_event_time,
            received: m.received_time, description: m.warning_description,
            latitude: m.latitude, longitude: m.longitude,
          }});
        });
        return;
      }
      // 其餘維度：一船一維度當月一案
      const lvl = a[k];
      if (lvl !== "critical" && lvl !== "warning") return;
      const openedAt = v.calculated_at || new Date().toISOString().slice(0,16).replace("T"," ");
      upsert(v, k, lvl, openedAt, eventId(v.vessel_id, k, openedAt));
    });
    // 錨泊設定待辦：AIS 進入錨泊狀態(nav_status 1) 且監管人員尚未完成漂航/錨泊設定 → 立案通知監管；
    //   完成設定(已 ack) → 不在 seen 內 → 下方標記 cleared（警報已解除）。
    if (parseInt(v.nav_status, 10) === 1 && !isAnchorConfigured(v.vessel_id)) {
      const openedAt = v.calculated_at || new Date().toISOString().slice(0,16).replace("T"," ");
      upsert(v, "anchor_setup", "warning", openedAt, `${v.vessel_id}-anchor_setup`);
    }
  });
  // 警示信件事件以信件為準：找不到對應信件的（舊聚合格式）直接移除；其餘維度條件消失標記 cleared。
  _events = _events.filter(e => !(e.dimension === "alert" && !seen.has(e.id)));
  _events.forEach(e => {
    if (!seen.has(e.id) && e.status !== "resolved") e.cleared = true;
  });
  saveEvents();
}
function transitionEvent(id, toStatus, byUser, noteText) {
  const e = _events.find(x => x.id === id);
  if (!e) return false;
  const now = new Date().toISOString().slice(0,16).replace("T"," ");
  e.history.push({ from: e.status, to: toStatus, at: now, by: byUser || "operator" });
  e.status = toStatus;
  if (noteText && noteText.trim()) {
    e.notes.push({ at: now, by: byUser || "operator", text: noteText.trim() });
  }
  saveEvents();
  return true;
}
function addEventNote(id, text, byUser) {
  const e = _events.find(x => x.id === id);
  if (!e || !text || !text.trim()) return false;
  const now = new Date().toISOString().slice(0,16).replace("T"," ");
  e.notes.push({ at: now, by: byUser || "operator", text: text.trim() });
  saveEvents();
  return true;
}
function assignEvent(id, assignee) {
  const e = _events.find(x => x.id === id);
  if (!e) return false;
  e.assignee = assignee || null;
  saveEvents();
  return true;
}
function eventsForVessel(vessel_id, includeResolved) {
  return _events
    .filter(e => e.vessel_id === vessel_id && (includeResolved || e.status !== "resolved"))
    .sort((a, b) => (b.opened_at || "").localeCompare(a.opened_at || ""));
}
function statusBadge(status) {
  const s = EVENT_STATUSES[status];
  if (!s) return "-";
  return `<span class="ev-status" style="background:${s.bg};color:${s.color}">${s.cn} / ${s.en}</span>`;
}
/* 事件狀態徽章：條件已消失（cleared）時顯示【警報已解除】，否則顯示處理流程狀態。 */
function eventStatusBadge(e) {
  if (e && e.cleared) {
    return `<span class="ev-status" style="background:rgba(110,224,148,0.15);color:var(--k-6ee094)">警報已解除 / Alarm Cleared</span>`;
  }
  return statusBadge(e ? e.status : null);
}

/* 船隊監控單船介面的「事件處理」區塊 —

/* 依維度產生量化警示說明（中英對照），給上方面板的「各維度警示」用 */
function dimDescription(v, k, a) {
  const lvl   = a[k];
  const sf    = v.safety_frame_nm || 1.0;
  const xtd   = parseFloat(v.cross_track_distance_nm) || 0;
  const track = v.ais_track || [];
  const maxDev = track.reduce((m, p) => Math.max(m, p.deviation_nm || 0), 0);
  const devCnt = track.filter(p => p.is_deviated).length;

  switch (k) {
    case "route":
      if (lvl === "na") return v.current_mode === "port"
        ? "已進入港區，暫停航線偏移監控 / In port — route monitoring paused"
        : "無 AIS 軌跡可判讀 / No AIS data";
      return `目前 XTD ${xtd.toFixed(2)} NM / Safety ${sf.toFixed(2)} NM · 歷史最大 ${maxDev.toFixed(2)} NM · 偏移 ${devCnt} 點`
           + `<br><span style="color:var(--k-5e6b80)">Current ${xtd.toFixed(2)} / Max ${maxDev.toFixed(2)} NM · ${devCnt} deviated points</span>`;
    case "speed": {
      if (v.sog === null || v.sog === undefined) return "無 SOG 資料 / SOG unavailable";
      const planSogs = (v.planned_track || []).filter(p => p.sog > 0).map(p => p.sog);
      const planAvg = planSogs.length ? planSogs.reduce((x,y)=>x+y,0)/planSogs.length : 0;
      const over = planAvg > 0 ? (v.sog - planAvg) / planAvg : 0;   // 正值＝超速
      const overTxt = `${over >= 0 ? "+" : ""}${Math.round(over*100)}%`;
      return `目前 ${v.sog.toFixed(1)} kn vs 配速 ${planAvg.toFixed(1)} kn · ${over > 0 ? "超速" : "未超速"} ${overTxt}`
           + `<br><span style="color:var(--k-5e6b80)">Current ${v.sog.toFixed(1)} kn vs plan ${planAvg.toFixed(1)} kn · over ${overTxt}</span>`;
    }
    case "sea": {
      const seaHash = (v.vessel_id * 9301 + 49297) % 233280;
      const seaLevel = seaHash / 233280;
      const wave = (1 + seaLevel * 5).toFixed(1);
      const wind = Math.round(2 + seaLevel * 6);
      const sst  = (15 + seaLevel * 12).toFixed(1);
      return `估計浪高 ${wave} m · 風力 ${wind} 級 · 海面溫度 ${sst}°C`
           + `<br><span style="color:var(--k-5e6b80)">Wave ${wave} m · Wind F${wind} · SST ${sst}°C</span>`;
    }
    case "alert": {
      const vmails = MAILS.filter(m => m.vessel_name === v.vessel_name);
      if (!vmails.length) return "尚無 StormGeo 通知 / No StormGeo alerts received";
      const warns = vmails.filter(m => m.warning_level === "Warning").length;
      const infos = vmails.filter(m => m.warning_level === "Information").length;
      const latest = vmails.slice().sort((x,y) => (y.warning_event_time||"").localeCompare(x.warning_event_time||""))[0];
      return `共 ${vmails.length} 封通知 · Warning ${warns} · Information ${infos}`
           + (latest ? `<br><span style="color:var(--k-5e6b80)">Latest: ${latest.warning_code} @ ${latest.warning_event_time}</span>` : "");
    }
    case "anchor_setup":
      return `船舶已進入 AIS 錨泊狀態(nav_status 1)，請設定漂航／錨泊監控`
           + `<br><span style="color:var(--k-5e6b80)">Entered anchor state — configure drift / anchor watch</span>`;
    case "driftAnchor": {
      if (lvl === "na") return `非錨泊狀態，不適用漂航圈<br><span style="color:var(--k-5e6b80)">Not at anchor — drift watch N/A</span>`;
      const info = a._drift;
      if (!info) return `非錨泊狀態<br><span style="color:var(--k-5e6b80)">Not at anchor</span>`;
      const msg = lvl === "critical"
        ? `<span style="color:var(--k-ff8a8a)">⛔ 偏移 ${fmtNM(info.distMeters)} NM</span>（超過 Critical ${info.critR} NM）`
        : lvl === "warning"
          ? `<span style="color:var(--k-f5b753)">⚠ 偏移 ${fmtNM(info.distMeters)} NM</span>（超過 Warning ${info.warnR} NM）`
          : `<span style="color:var(--k-6ee094)">✓ 在 ${info.warnR} NM 漂航圈內</span>`;
      return `漂航圈：${msg}${info.overridden ? "（自訂半徑）" : ""}`
           + `<br><span style="color:var(--k-5e6b80)">drift ${fmtNM(info.distMeters)} NM · W ${info.warnR} / C ${info.critR} NM</span>`;
    }
    case "anchor": {
      if (lvl === "na") {
        const info = a._anchor;
        if (info && info.missing) return `已標記錨泊，但尚未設定手動錨位<br><span style="color:var(--k-5e6b80)">Anchored — manual anchorage not set (單船設定)</span>`;
        return `未標記錨泊或非錨泊狀態<br><span style="color:var(--k-5e6b80)">Not flagged Anchored / not at anchor</span>`;
      }
      const info = a._anchor;
      if (!info) return `錨泊監控 / Anchor watch`;
      if (info.type === "polygon") {
        if (info.inside) return lvl === "warning"
          ? `<span style="color:var(--k-f5b753)">⚠ 貼近錨區邊界 / near zone edge</span>（距邊 ${fmtNM(info.edgeM)} NM，Warn ${info.warnR} NM）`
          : `<span style="color:var(--k-6ee094)">✓ 船位在錨區內 / inside anchorage zone</span>`;
        return lvl === "critical"
          ? `<span style="color:var(--k-ff8a8a)">⛔ 走出錨區 ${fmtNM(info.edgeM)} NM / out of zone</span>（超過 Crit ${info.critR} NM）`
          : `<span style="color:var(--k-f5b753)">⚠ 走出錨區 ${fmtNM(info.edgeM)} NM / out of zone</span>`;
      }
      const msg = lvl === "critical"
        ? `<span style="color:var(--k-ff8a8a)">⛔ 走錨 ${fmtNM(info.distMeters)} NM</span>（超過 Critical ${info.critR} NM）`
        : lvl === "warning"
          ? `<span style="color:var(--k-f5b753)">⚠ 走錨 ${fmtNM(info.distMeters)} NM</span>（超過 Warning ${info.warnR} NM）`
          : `<span style="color:var(--k-6ee094)">✓ 在錨位 ${info.warnR} NM 內</span>`;
      return `手動錨位：${msg}`
           + `<br><span style="color:var(--k-5e6b80)">anchor ${fmtNM(info.distMeters)} NM · W ${info.warnR} / C ${info.critR} NM</span>`;
    }
    case "port_io": {
      if (lvl === "na") return `無航線端點可比對 / No planned port endpoints`;
      const info = a._portIo;
      if (!info) return `已遠離港界 / Far from port boundary`;
      const portCn = escapeHtml(info.portName || "—");
      const portEn = escapeHtml(info.portCode || "");
      const dist   = info.distanceNm.toFixed(2);
      const stateCn = info.stateCn || "—";
      const stateEn = info.stateEn || "—";
      const sogTxt  = !isNaN(info.sog) ? `SOG ${info.sog.toFixed(1)} kn` : "SOG —";
      const stateColor = info.state === "berthed"  ? "#9ec5ff"
                       : info.state === "arriving" ? "#6ee094"
                       : info.state === "departing"? "#f5b753"
                       : "#c4cdda";
      return `<b style="color:${stateColor}">${stateCn}</b>：<b>${portCn}</b>（距 ${dist} NM · ${sogTxt}）`
           + `<br><span style="color:var(--k-5e6b80)">${stateEn} at ${portCn}${portEn ? ` (${portEn})` : ""} · ${dist} NM</span>`;
    }
    case "zone_io": {
      if (lvl === "na" || !a._zoneIo) return `無啟用中的圍籬 / No active geofence`;
      const zios = a._zoneIo;
      const top = zios.top;
      if (!top) return `均在安全距離外 / All fences clear`;
      const cfg = top.cfg;
      const modeCn = top.mode === "bidir" ? "雙向邊界"
                   : top.mode === "arrival" ? "到達" : "離開";
      const statusCn = top.status === "critical"
        ? (top.inside ? "已在區域內" : "至邊界")
        : (top.mode === "arrival" ? "接近邊界" : "即將離開");
      const moreTxt = zios.hits.length > 1 ? `（另有 ${zios.hits.length - 1} 個圍籬觸發）` : "";
      return `<b>${escapeHtml(top.zone.name || top.zone.id)}</b>（${modeCn}）：${statusCn} · 距 ${top.distanceNm.toFixed(2)} NM${moreTxt}`
           + `<br><span style="color:var(--k-5e6b80)">${escapeHtml(top.zone.name_en || top.zone.id)} · ${top.mode} · ${top.distanceNm.toFixed(2)} NM</span>`;
    }
    default: return "";
  }
}

function setFleetLayer(key, enabled) {
  const g = _fleetLayers[key];
  if (!g || !_fleetMap) return;
  if (enabled) { if (!_fleetMap.hasLayer(g)) g.addTo(_fleetMap); }
  else { if (_fleetMap.hasLayer(g)) _fleetMap.removeLayer(g); }
}

window.clearSelectedVessel = function() {
