/* ═══════════════════════════════════════════════════════════════
 * 閾值頁 v6：兩個 view（分航段集體設定 / 單船設定）
 *   - 共用 dimRowHTML：產生一行「W input + C input + 預設 + 影響預覽」
 *   - Batch：選 segment + 套用對象，多維度同時編輯，按鈕一次套用
 *   - Per-Vessel：選船 + 選 segment，inline 編輯每維度，blur 即存
 *   - 兩 view 都透過 SEGMENT_META[seg].dims 決定要列出哪些維度 */

/* 取統一的 dim meta：route/speed/driftAnchor/driftAdrift/alert 皆在 DIM_META 中；
 *   THRESHOLD_META 為閾值頁額外用的數字格式，這裡合併查找以供 dimRowHTML 與 getDimCurrentMetric 共用 */
function getDimDisplayMeta(dim) {
  if (DIM_META[dim]) return DIM_META[dim];
  const t = THRESHOLD_META[dim];
  if (t) return { label: t.label, short: t.short, icon: () => "" };
  return { label: dim, short: dim, icon: () => "" };
}

/* 到離區域監控專用列：替每個 RISK_ZONE 提供 enabled checkbox + entryNm + exitNm，
 * 並在右側顯示該船目前對該圍籬的狀態（critical=已在區域內、warning=接近/剛離開、normal）。
 *   args.hideMetric=true（batch 視角）→ 不顯示「船舶現況」欄
 *   args.targetVesselId（per-vessel 視角）→ 帶入該船狀態到狀態欄
 */
function zoneIoRowHTML(args) {
  const m = getDimDisplayMeta("zone_io");
  const t = _thresholds.zone_io || DEFAULT_THRESHOLDS.zone_io || {};
  const zones = (window.RISK_ZONES || []).slice();
  const cats  = (window.RISK_ZONE_CATEGORIES || []);

  // 對齊船舶現況用：若 args 帶 v，計算其圍籬狀態
  const v = args.vessel || (args.targetVesselId
    ? VESSELS.find(x => x.vessel_id === args.targetVesselId) : null);
  const vStatus = (v && !args.hideMetric) ? vesselZoneIoStatus(v) : null;
  const hitByZone = new Map();
  if (vStatus) vStatus.hits.forEach(h => hitByZone.set(h.zone.id, h));

  // 過濾狀態（session 持久化）
  const dirFilter = sessionStorage.getItem("slab_va_zoneio_dir_filter") || "all"; // all | arrival | departure
  // 群組收合狀態（每個 cat.key → 是否收合）
  let collapsed = {};
  try { collapsed = JSON.parse(sessionStorage.getItem("slab_va_zoneio_collapsed") || "{}") || {}; } catch (e) {}

  // 統計：監控中 / 總圍籬數；命中數
  const monitoredCount = zones.filter(z => getZoneIoFenceCfg(z.id).enabled).length;
  const hitCritical = vStatus ? vStatus.hits.filter(h => h.status === "critical").length : 0;
  const hitWarning  = vStatus ? vStatus.hits.filter(h => h.status === "warning").length  : 0;

  // 依類別分組（過濾掉不符方向篩選的）
  const groups = {};
  zones.forEach(z => {
    const cfg = getZoneIoFenceCfg(z.id);
    if (dirFilter !== "all" && cfg.direction !== dirFilter) return;
    (groups[z.cat] ||= []).push(z);
  });

  const rowsHtml = [];
  cats.forEach(cat => {
    const list = groups[cat.key];
    if (!list || !list.length) return;
    const isCollapsed = !!collapsed[cat.key];
    rowsHtml.push(`
      <tr class="th-fence-cat-group${isCollapsed ? " is-collapsed" : ""}" data-cat="${escapeHtml(cat.key)}">
        <td colspan="7">
          <span class="th-fence-cat-toggle" data-cat="${escapeHtml(cat.key)}">
            <span class="cat-chev" aria-hidden="true">▾</span>
            <span class="th-fence-cat-swatch" style="background:${cat.color}"></span>
            ${escapeHtml(cat.label)}<span style="color:var(--k-7c8a9e);font-weight:400;margin-left:6px">${escapeHtml(cat.label_en)} · ${list.length}</span>
          </span>
        </td>
      </tr>`);
    list.forEach(z => {
      const cfg = getZoneIoFenceCfg(z.id);
      const hit = hitByZone.get(z.id);
      const statusLabel = hit
        ? (hit.status === "critical"
            ? "已在區域內"
            : `${hit.distanceNm.toFixed(1)} NM`)
        : "—";
      const statusLvl = hit ? hit.status : "normal";
      const statusBadge = vStatus
        ? `<span class="th-fence-status" data-level="${statusLvl}"><span class="lbl">現況</span>${statusLabel}</span>`
        : `<span class="th-fence-status" data-level="normal" style="opacity:0.5">—</span>`;
      const actionsCell = z.editable
        ? `<td>
             <button type="button" class="fence-act-btn" data-act="edit" data-zid="${escapeHtml(z.id)}" title="編輯名稱與等級">編輯</button>
             <button type="button" class="fence-act-btn fence-act-danger" data-act="delete" data-zid="${escapeHtml(z.id)}" title="刪除此圍籬">×</button>
           </td>`
        : `<td><span style="color:var(--k-5e6b80);font-size:11px">內建</span></td>`;
      const isBidir = cfg.advanceNm === 0;
      const advanceLabel = isBidir ? "邊界" : (cfg.direction === "arrival" ? "到達前" : "快離開");
      const advTitle = isBidir
        ? "設為 0 = 到達與離開雙向邊界提醒"
        : (cfg.direction === "arrival" ? "進入區域前 N 海浬即提醒" : "區域內距邊界 N 海浬時提醒");
      rowsHtml.push(`
        <tr class="zone-io-row${cfg.enabled ? "" : " fence-disabled"}${isCollapsed ? " is-hidden-by-collapse" : ""}" data-zid="${escapeHtml(z.id)}" data-cat="${escapeHtml(cat.key)}" data-direction="${cfg.direction}">
          <td><input type="checkbox" class="fence-select" data-zid="${escapeHtml(z.id)}" title="勾選以批次設定" aria-label="select zone"></td>
          <td><input type="checkbox" class="fence-toggle" data-zid="${escapeHtml(z.id)}"${cfg.enabled ? " checked" : ""} title="啟用監控 / Enable"></td>
          <td>
            <div class="th-fence-name">
              <span class="cn">${escapeHtml(z.name || z.id)}</span>
              ${z.name_en && z.name_en !== z.name ? `<span class="en">${escapeHtml(z.name_en)}</span>` : ""}
            </div>
          </td>
          <td>
            <select class="fence-dir" data-zid="${escapeHtml(z.id)}" title="監控方向">
              <option value="arrival"${cfg.direction === "arrival" ? " selected" : ""}>到達</option>
              <option value="departure"${cfg.direction === "departure" ? " selected" : ""}>離開</option>
            </select>
          </td>
          <td>
            <span class="fence-advance">
              <span class="fence-advance-label">${advanceLabel}</span>
              <input type="number" class="fence-nm" data-zid="${escapeHtml(z.id)}" data-field="advanceNm" value="${cfg.advanceNm}" step="0.5" min="0" max="50" title="${advTitle}">
              <span class="fence-nm-unit">NM</span>
            </span>
          </td>
          <td>${statusBadge}</td>
          ${actionsCell}
        </tr>`);
    });
  });

  // 通知方式
  const notifyHtml = `
    <div class="th-dim-notify">
      <span class="label">通知 / Notify：</span>
      <label><input type="checkbox" data-dim="zone_io" data-notify="mail"${t.notify?.mail ? " checked" : ""}><span class="nf-mail">Mail</span></label>
      <label><input type="checkbox" data-dim="zone_io" data-notify="line"${t.notify?.line ? " checked" : ""}><span class="nf-line">LINE</span></label>
    </div>`;

  const statusSummary = vStatus
    ? `<span style="color:var(--k-9aa5b8)">監控 ${monitoredCount} / ${zones.length} 個圍籬</span>` +
      (hitCritical > 0 ? `<span style="color:var(--k-ff8a8a);margin-left:10px">● 已在 ${hitCritical} 區內</span>` : "") +
      (hitWarning  > 0 ? `<span style="color:var(--k-f5b753);margin-left:10px">▲ 接近 / 剛離開 ${hitWarning} 區</span>` : "") +
      (hitCritical === 0 && hitWarning === 0 ? `<span style="color:var(--k-6ee094);margin-left:10px">✓ 均在安全距離外</span>` : "")
    : `<span style="color:var(--k-9aa5b8)">監控 ${monitoredCount} / ${zones.length} 個圍籬</span>`;

  // 方向篩選 tabs
  const dirTabsHtml = `
    <div class="th-fence-dir-tabs" role="tablist">
      <button type="button" class="th-fence-dir-tab${dirFilter === "all"       ? " is-active" : ""}" data-dir-filter="all">全部</button>
      <button type="button" class="th-fence-dir-tab${dirFilter === "arrival"   ? " is-active" : ""}" data-dir-filter="arrival">到達</button>
      <button type="button" class="th-fence-dir-tab${dirFilter === "departure" ? " is-active" : ""}" data-dir-filter="departure">離開</button>
    </div>`;

  // 批次設定面板
  const bulkPanelHtml = `
    <div class="th-fence-bulk" data-bulk-panel hidden>
      <span class="th-fence-bulk-count">已選 <b data-bulk-count>0</b> 個區域</span>
      <label>方向
        <select data-bulk-dir>
          <option value="">不變</option>
          <option value="arrival">到達</option>
          <option value="departure">離開</option>
        </select>
      </label>
      <label>距離
        <input type="number" data-bulk-nm min="0" max="50" step="0.5" placeholder="不變">
        <span class="th-fence-bulk-unit">NM</span>
      </label>
      <button type="button" class="th-fence-bulk-apply" data-bulk-apply>套用至已勾選</button>
      <button type="button" class="th-fence-bulk-clear" data-bulk-clear>清除選取</button>
    </div>`;

  return `
    <div class="th-dim-row${args.isCore ? " is-core" : ""}" data-dim="zone_io">
      <div class="th-dim-head">
        <span class="th-dim-icon">${m.icon()}</span>
        <span class="th-dim-name">${m.label}</span>
        <span class="th-dim-short">${m.short}</span>
        ${args.isCore ? `<span class="th-tag th-tag-core">該段核心</span>` : ""}
        <span class="th-tag" style="background:rgba(74,158,255,0.15);color:var(--k-9ec5ff);margin-left:auto">逐圍籬設定</span>
      </div>
      <div class="th-fence-block" data-zone-io-block>
        <div class="th-fence-toolbar">
          <input type="search" placeholder="搜尋圍籬名稱 / Search by name…" id="th-fence-search">
          <button type="button" class="th-fence-btn" data-act="enable-all">全部啟用</button>
          <button type="button" class="th-fence-btn" data-act="disable-all">全部停用</button>
          <button type="button" class="th-fence-btn fence-act-primary" data-act="draw-new" title="切到船隊地圖開始繪製新區域">＋ 繪製新區域</button>
          ${dirTabsHtml}
          <span class="th-fence-count">${statusSummary}</span>
        </div>
        ${bulkPanelHtml}
        <div class="th-fence-container">
          <table class="th-fence-table">
            <thead>
              <tr>
                <th style="width:28px"><input type="checkbox" class="fence-select-all" title="全選 / 取消全選"></th>
                <th style="width:28px"></th>
                <th>圍籬名稱 / Fence</th>
                <th style="width:84px">方向</th>
                <th style="width:160px">提前距離</th>
                <th style="width:120px">${vStatus ? "船舶現況" : ""}</th>
                <th style="width:90px">操作</th>
              </tr>
            </thead>
            <tbody>${rowsHtml.join("")}</tbody>
          </table>
        </div>
        ${notifyHtml}
      </div>
    </div>`;
}

function dimRowHTML(args) {
  // 到離區域監控採「逐圍籬清單」UI，dispatch 給 zoneIoRowHTML
  if (args.dim === "zone_io") return zoneIoRowHTML(args);
  const { dim, valW, valC, defW, defC, metric, level, overridden, isCore, segNote, withReset, hideMetric, defSource, extraContent, activeEvent } = args;
  const m = getDimDisplayMeta(dim);
  const tm = THRESHOLD_META[dim];
  const t  = _thresholds[dim] || DEFAULT_THRESHOLDS[dim] || {};
  const isTBC = TBC_DIMS.has(dim);
  let metricBlock = "";
  if (!hideMetric) {
    const evBadge = activeEvent
      ? (() => {
          const es = EVENT_STATUSES[activeEvent.status];
          const evColor = es?.color || "#9aa5b8";
          const evLabel = es?.cn || activeEvent.status;
          return `<a class="th-ev-badge" href="#/events" title="點擊前往事件處理 / Go to event">● ${evLabel}</a>`;
        })()
      : "";
    metricBlock = metric != null
      ? `<span class="th-row-current">船舶現況 / Current<span class="th-row-current-val">${formatThresholdValue(dim, metric)}</span><span class="th-row-lvl" data-level="${level}">${level === "critical" ? "Critical" : level === "warning" ? "Warning" : "Normal"}</span>${evBadge}</span>`
      : `<span class="th-row-current muted">船舶現況 / Current —</span>`;
  }
  // 預設值來源標記：來自航線計畫（plan_thresholds）→ 顯示「計畫」tag，提示該預設值是直接從船舶上報的航線計畫帶入
  const defSrcTag = defSource === "plan" ? `<span class="th-default-src" title="預設值來自船舶上報的航線計畫">計畫</span>` : "";
  // 持續時間：只有 hasDuration 的維度（route / speed）顯示
  const durHtml = (lvl, durVal) => tm?.hasDuration ? `
    <span class="th-dur" title="達到閾值後須持續 N 分才正式立案，避免短暫尖峰誤觸發">
      持續
      <input type="number" class="th-input th-dur-input" data-dim="${dim}" data-dur-lvl="${lvl}"
             value="${durVal ?? ""}" placeholder="${(lvl === "warning" ? DEFAULT_THRESHOLDS[dim]?.warningDuration : DEFAULT_THRESHOLDS[dim]?.criticalDuration) ?? 0}"
             min="0" max="1440" step="1"${isTBC ? " disabled" : ""}>
      分
    </span>` : "";
  // 通知方式：所有維度都有
  const notifyHtml = `
    <div class="th-dim-notify">
      <span class="label">通知 / Notify：</span>
      <label><input type="checkbox" data-dim="${dim}" data-notify="mail"${t.notify?.mail ? " checked" : ""}><span class="nf-mail">Mail</span></label>
      <label><input type="checkbox" data-dim="${dim}" data-notify="line"${t.notify?.line ? " checked" : ""}><span class="nf-line">LINE</span></label>
    </div>`;
  return `
    <div class="th-dim-row${overridden ? " is-overridden" : ""}${isCore ? " is-core" : ""}${isTBC ? " is-tbc" : ""}" data-dim="${dim}">
      <div class="th-dim-head">
        <span class="th-dim-icon">${m.icon()}</span>
        <span class="th-dim-name">${m.label}</span>
        <span class="th-dim-short">${m.short}</span>
        ${isCore ? `<span class="th-tag th-tag-core">該段核心</span>` : ""}
        ${isTBC ? `<span class="th-tag th-tag-tbc" title="監測項目待客戶確認">待確認 / TBC</span>` : ""}
        ${overridden ? `<span class="th-tag th-tag-overridden">★ 已調整 / Modified${segNote ? ` · ${segNote}` : ""}</span>` : ""}
        ${withReset && overridden ? `<button type="button" class="th-row-reset" data-dim="${dim}">復原</button>` : ""}
      </div>
      <div class="th-dim-inputs">
        <span class="th-num">
          <label>W ≥</label>
          <input type="number" class="th-input th-warn" data-dim="${dim}" data-lvl="warning"
                 value="${valW ?? ""}" placeholder="${defW}" step="0.1" min="0" max="200"${isTBC ? " disabled" : ""}>
          <span class="th-default">預設 ${formatThresholdValue(dim, defW)}${defSrcTag}</span>
          ${durHtml("warning", t.warningDuration)}
        </span>
        <span class="th-num">
          <label>C ≥</label>
          <input type="number" class="th-input th-crit" data-dim="${dim}" data-lvl="critical"
                 value="${valC ?? ""}" placeholder="${defC}" step="0.1" min="0" max="200"${isTBC ? " disabled" : ""}>
          <span class="th-default">預設 ${formatThresholdValue(dim, defC)}${defSrcTag}</span>
          ${durHtml("critical", t.criticalDuration)}
        </span>
        ${metricBlock}
      </div>
      ${notifyHtml}
      ${extraContent || ""}
    </div>`;
}

/* 分航段集體設定 view — 選航段 + 套用對象 + 多維度同時編輯 + 一次套用 */
function renderBatchBySegmentSetup(visibleVessels) {
  // 錨泊／漂流不進批次（batchExclude）；若殘留選到，退回海上航段
  const segments = Object.keys(SEGMENT_META).filter(s => !SEGMENT_META[s].batchExclude);
  if (SEGMENT_META[_batchSegment]?.batchExclude) _batchSegment = "sea";
  const seg = SEGMENT_META[_batchSegment] || SEGMENT_META.sea;
  const myCount = visibleVessels.length;

  // segment 切換 tabs
  const segTabs = segments.map(s => {
    const meta = SEGMENT_META[s];
    return `<button type="button" class="th-seg-tab${s === _batchSegment ? " is-active" : ""}" data-seg="${s}"
              style="--seg-color:${meta.color}">
              <span class="th-seg-icon">${meta.icon}</span>
              <span>${meta.cn}<span class="en"> / ${meta.en}</span></span>
            </button>`;
  }).join("");

  // 套用對象 — 依登入身份：
  //   - 監管 / Manager：只能選「我的全部船」（自動鎖定，無 radio）
  //   - 主管 / Supervisor：可選「全船隊預設」或「依監管人員的船隊」（後者用 dropdown 選哪位監管）
  // 個別船舶移除（已有單船設定頁簽）
  const adminMode = isAdmin(_currentUser);
  if (!adminMode) { _batchScope = "my"; }   // 監管強制 my
  else if (_batchScope === "single" || _batchScope === "my") { _batchScope = "byMgr"; }
  if (adminMode && !_batchScopeManager) { _batchScopeManager = MANAGERS[0]; }
  const mgrOpts = MANAGERS.map(m => {
    const cnt = VESSELS.filter(v => v.manager === m).length;
    return `<option value="${escapeHtml(m)}"${m === _batchScopeManager ? " selected" : ""}>${escapeHtml(m)}（${cnt} 艘）</option>`;
  }).join("");
  const scopeRow = adminMode
    ? `
    <div class="th-batch-scope">
      <span class="th-batch-label">套用對象 / Scope</span>
      <label class="th-radio"><input type="radio" name="th-batch-scope" value="global"${_batchScope === "global" ? " checked" : ""}> 全船隊預設 <span class="en">/ Fleet default</span></label>
      <label class="th-radio"><input type="radio" name="th-batch-scope" value="byMgr"${_batchScope === "byMgr" ? " checked" : ""}> 依監管人員的船隊 <span class="en">/ By manager's fleet</span></label>
      <select id="th-batch-mgr"${_batchScope === "byMgr" ? "" : " disabled"}>${mgrOpts}</select>
    </div>`
    : `
    <div class="th-batch-scope">
      <span class="th-batch-label">套用對象 / Scope</span>
      <span class="th-radio" style="opacity:0.9">● 我的全部船 <span class="en">/ My vessels (${myCount})</span></span>
      <span class="th-batch-hint" style="color:var(--k-7c8a9e);font-size:11px;margin-left:8px">如需針對個別船舶，請切到「單船設定」</span>
    </div>`;

  // 維度列：以「目前該 scope 下的有效值」當顯示參考（值預先帶入）
  // - global：_thresholds[dim]
  // - my：取「我管的第一艘」當參考
  // - byMgr：取「該監管管的第一艘」當參考
  let targetVessel = null;
  if (_batchScope === "my") {
    targetVessel = visibleVessels.find(v => v.manager === _currentUser) || visibleVessels[0];
  } else if (_batchScope === "byMgr") {
    targetVessel = VESSELS.find(v => v.manager === _batchScopeManager);
  }
  // 本航段各維度進行中事件數（供 header 摘要）
  const _visVids = new Set(visibleVessels.map(v => v.vessel_id));
  const _segOpenEvents = seg.dims.reduce((acc, d) => {
    acc[d] = _events.filter(e => _visVids.has(e.vessel_id) && e.dimension === d && e.status !== "resolved" && !e.cleared).length;
    return acc;
  }, {});
  const _segTotalOpen = Object.values(_segOpenEvents).reduce((s, n) => s + n, 0);

  const dimRows = seg.dims.map(d => {
    const def = DEFAULT_THRESHOLDS[d]; if (!def) return "";
    const curGW = _thresholds[d]?.warning  ?? def.warning;
    const curGC = _thresholds[d]?.critical ?? def.critical;
    let valW = null, valC = null, overridden = false, segNote = "";
    if (_batchScope === "global") {
      // 顯示目前全船隊預設（_thresholds 經調整後可能與 factory default 不同）
      valW = curGW !== def.warning  ? curGW : null;
      valC = curGC !== def.critical ? curGC : null;
      overridden = valW !== null || valC !== null;
    } else if (targetVessel) {
      const ovr = getVesselOverrideRaw(targetVessel.vessel_id, d);
      if (ovr) {
        valW = ovr.warning ?? null;
        valC = ovr.critical ?? null;
        overridden = !!(ovr.warning != null || ovr.critical != null);
        if (ovr.segment && ovr.segment !== "all") segNote = SEGMENT_META[ovr.segment]?.cn || ovr.segment;
      }
    }
    // batch view 是「批次套用到多艘船」的場景，顯示單艘船舶現況反而誤導，
    // 一律不傳 metric → dimRowHTML 顯示「船舶現況 —」灰色 placeholder
    return dimRowHTML({
      dim: d, valW, valC,
      defW: curGW, defC: curGC,
      metric: null, level: "normal", overridden,
      isCore: seg.coreDims.includes(d),
      segNote,
      hideMetric: true,   // batch 模式徹底隱藏，避免使用者誤以為這是「某艘船的狀況」
    });
  }).filter(Boolean).join("");

  // 影響預覽：列出 visibleVessels 在目前 form 設定下各維度的等級
  const impactList = (_batchScope === "global" || _batchScope === "my")
    ? visibleVessels.map(v => {
        // 用全船隊預設 + 目標 scope 的 override 預測（簡化版：只看 global 預設變動的影響）
        return `<li class="th-impact-row" data-vid="${v.vessel_id}">${escapeHtml(v.vessel_name)}</li>`;
      }).join("")
    : "";

  return `
    <div class="th-batch">
      <div class="th-seg-tabs" role="tablist">${segTabs}</div>
      ${scopeRow}

      <div class="th-batch-dims">
        <div class="th-batch-dims-head">
          <b style="color:${seg.color}">${seg.icon} ${seg.cn}</b>
          <span style="color:var(--k-7c8a9e);font-size:12px"> · 監測維度（${seg.dims.length}）· 核心維度標 ★</span>
        </div>
        ${dimRows || `<div class="th-empty">此航段尚無可設定的維度（CPA／TCPA 待補）</div>`}
      </div>

      <div class="th-batch-footer">
        <span class="th-impact" id="th-batch-impact">
          ${_segTotalOpen > 0
            ? `<a href="#/events" style="color:var(--k-7ec5ff);text-decoration:none" title="點擊前往事件處理">● 本航段共 ${_segTotalOpen} 件進行中事件</a>`
            : "影響預覽：—"}
        </span>
        <button type="button" class="trans-btn secondary" id="th-batch-reset">清除此航段所有設定</button>
      </div>

      <div class="th-batch-note">
        輸入完成後按 Enter 或點到其它欄位即自動儲存（依「套用對象」自動寫入對應層級）。留空＝沿用「上一層」（單船→全船隊預設；全船隊→系統預設）。Critical 必須大於 Warning。
      </div>
    </div>`;
}

function wireBatchBySegmentSetup() {
  const root = document.querySelector(".th-batch");
  if (!root) return;
  // segment tabs
  root.querySelectorAll(".th-seg-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      _batchSegment = btn.dataset.seg;
      sessionStorage.setItem("slab_va_th_batch_segment", _batchSegment);
      renderThresholds();
    });
  });
  // scope radio
  root.querySelectorAll('input[name="th-batch-scope"]').forEach(r => {
    r.addEventListener("change", () => {
      _batchScope = r.value;
      sessionStorage.setItem("slab_va_th_batch_scope", _batchScope);
      renderThresholds();
    });
  });
  // 主管「依監管人員」下拉
  const mgrSel = root.querySelector("#th-batch-mgr");
  if (mgrSel) {
    mgrSel.addEventListener("change", () => {
      _batchScopeManager = mgrSel.value;
      sessionStorage.setItem("slab_va_th_batch_mgr", _batchScopeManager);
      renderThresholds();
    });
  }
  // input 即時預覽 + blur/Enter 寫回（與單船 view 模式一致）
  //   排除持續時間 input（.th-dur-input），那條由 wireDurationAndNotify() 處理
  root.querySelectorAll(".th-input:not(.th-dur-input)").forEach(inp => {
    inp.addEventListener("input", () => refreshDimRowLevel(inp.closest(".th-dim-row")));
    const commit = () => commitBatchRow(inp.closest(".th-dim-row"));
    inp.addEventListener("blur", commit);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); inp.blur(); } });
  });

  // 持續時間 + 通知方式：全域層級，與 scope 無關
  wireDurationAndNotify(root);
  // 到離區域監控逐圍籬設定
  wireZoneIoFences(root);

  // 整個航段一鍵清除（套用對象決定影響範圍）
  root.querySelector("#th-batch-reset").addEventListener("click", () => resetBatchSegment());

  // 初始計算 footer 影響預覽
  refreshBatchImpact();
}

/* 共用：把到離區域監控（zone_io）逐圍籬 UI 的事件接好。
 *   - checkbox（fence-toggle）：toggle 後立即 setZoneIoFenceCfg + 行的 fence-disabled class 跟著切換
 *   - 進入前 / 離開後 NM（fence-nm）：blur / Enter 後寫入 entryNm / exitNm
 *   - 搜尋（th-fence-search）：即時隱藏不符的行（保留類別標頭）
 *   - 全部啟用 / 全部停用按鈕（data-act=enable-all/disable-all）：批次切換所有可見列的 enabled
 *   寫入後 syncEventsFromAlerts 立即重算 zone_io 等級，但「不重繪整頁」以避免輸入框失焦。 */
function wireZoneIoFences(root) {
  const block = root.querySelector("[data-zone-io-block]");
  if (!block) return;
  // checkbox 啟用/停用
  block.querySelectorAll(".fence-toggle").forEach(cb => {
    cb.addEventListener("change", () => {
      const zid = cb.dataset.zid;
      setZoneIoFenceCfg(zid, { enabled: cb.checked });
      const tr = cb.closest("tr");
      if (tr) tr.classList.toggle("fence-disabled", !cb.checked);
      syncEventsFromAlerts();
    });
  });
  // 共用：依目前 cfg 重新計算該列的「提前距離標籤」與 input 的 title
  function _refreshRowLabels(tr, zid) {
    if (!tr) return;
    const cfg = getZoneIoFenceCfg(zid);
    const isBidir = cfg.advanceNm === 0;
    const advLbl = tr.querySelector(".fence-advance-label");
    if (advLbl) advLbl.textContent = isBidir ? "邊界"
      : (cfg.direction === "arrival" ? "到達前" : "快離開");
    const nm = tr.querySelector(".fence-nm");
    if (nm) nm.title = isBidir
      ? "設為 0 = 到達與離開雙向邊界提醒"
      : (cfg.direction === "arrival" ? "進入區域前 N 海浬即提醒" : "區域內距邊界 N 海浬時提醒");
    // 同步 data-direction（給篩選與群組摺疊用）
    tr.dataset.direction = cfg.direction;
  }

  // 提前距離 NM（advanceNm）
  block.querySelectorAll(".fence-nm").forEach(inp => {
    const save = () => {
      const zid = inp.dataset.zid;
      const field = inp.dataset.field;
      const v = parseFloat(inp.value);
      if (!isNaN(v) && v >= 0 && field === "advanceNm") {
        setZoneIoFenceCfg(zid, { advanceNm: v });
        _refreshRowLabels(inp.closest("tr"), zid);   // 0 / >0 之間切換時聯動文案
        syncEventsFromAlerts();
      }
    };
    inp.addEventListener("blur", save);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); inp.blur(); } });
  });
  // 方向 select：切換時即時改 cfg + 重算該列文案
  block.querySelectorAll(".fence-dir").forEach(sel => {
    sel.addEventListener("change", () => {
      const zid = sel.dataset.zid;
      const direction = sel.value === "departure" ? "departure" : "arrival";
      setZoneIoFenceCfg(zid, { direction });
      _refreshRowLabels(sel.closest("tr"), zid);
      syncEventsFromAlerts();
    });
  });
  // 方向篩選 tabs：切換後重新 render（state 存 sessionStorage 由 zoneIoRowHTML 讀取）
  block.querySelectorAll(".th-fence-dir-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      const v = tab.dataset.dirFilter || "all";
      sessionStorage.setItem("slab_va_zoneio_dir_filter", v);
      try { renderThresholds(); } catch (e) {}
    });
  });

  // 群組摺疊：點 cat header 的可點區域 toggle
  block.querySelectorAll(".th-fence-cat-toggle").forEach(toggle => {
    toggle.addEventListener("click", () => {
      const cat = toggle.dataset.cat;
      let st = {};
      try { st = JSON.parse(sessionStorage.getItem("slab_va_zoneio_collapsed") || "{}") || {}; } catch (e) {}
      st[cat] = !st[cat];
      sessionStorage.setItem("slab_va_zoneio_collapsed", JSON.stringify(st));
      // 即時切換（不重 render）
      const groupTr = block.querySelector(`tr.th-fence-cat-group[data-cat="${CSS.escape(cat)}"]`);
      if (groupTr) groupTr.classList.toggle("is-collapsed", !!st[cat]);
      block.querySelectorAll(`tr.zone-io-row[data-cat="${CSS.escape(cat)}"]`).forEach(tr => {
        tr.classList.toggle("is-hidden-by-collapse", !!st[cat]);
      });
    });
  });

  // 批次選取 + 批次面板顯隱
  const bulkPanel = block.querySelector("[data-bulk-panel]");
  const bulkCountEl = block.querySelector("[data-bulk-count]");
  function refreshBulkUI() {
    const selected = Array.from(block.querySelectorAll(".fence-select:checked"));
    if (selected.length > 0) {
      bulkPanel.hidden = false;
      if (bulkCountEl) bulkCountEl.textContent = selected.length;
    } else {
      bulkPanel.hidden = true;
    }
    // select-all 三態
    const allBoxes = Array.from(block.querySelectorAll(".fence-select"));
    const selAll = block.querySelector(".fence-select-all");
    if (selAll) {
      if (selected.length === 0) {
        selAll.checked = false; selAll.indeterminate = false;
      } else if (selected.length === allBoxes.length) {
        selAll.checked = true; selAll.indeterminate = false;
      } else {
        selAll.checked = false; selAll.indeterminate = true;
      }
    }
  }
  block.querySelectorAll(".fence-select").forEach(cb => {
    cb.addEventListener("change", refreshBulkUI);
  });
  const selAllBox = block.querySelector(".fence-select-all");
  if (selAllBox) {
    selAllBox.addEventListener("change", () => {
      const checked = selAllBox.checked;
      // 只勾選可見列（避開被群組摺疊或搜尋過濾的）
      block.querySelectorAll(".fence-select").forEach(cb => {
        const tr = cb.closest("tr");
        if (!tr || tr.style.display === "none" || tr.classList.contains("is-hidden-by-collapse")) return;
        cb.checked = checked;
      });
      refreshBulkUI();
    });
  }

  const bulkApply = block.querySelector("[data-bulk-apply]");
  if (bulkApply) {
    bulkApply.addEventListener("click", () => {
      const dirSel = block.querySelector("[data-bulk-dir]");
      const nmInp  = block.querySelector("[data-bulk-nm]");
      const newDir = dirSel?.value || "";
      const newNm  = parseFloat(nmInp?.value);
      const hasNm  = !isNaN(newNm) && newNm >= 0;
      if (!newDir && !hasNm) {
        alert("請至少設定方向或距離");
        return;
      }
      const selected = Array.from(block.querySelectorAll(".fence-select:checked"));
      if (!selected.length) return;
      selected.forEach(cb => {
        const zid = cb.dataset.zid;
        const patch = {};
        if (newDir) patch.direction = newDir;
        if (hasNm)  patch.advanceNm = newNm;
        setZoneIoFenceCfg(zid, patch);
      });
      syncEventsFromAlerts();
      try { renderThresholds(); } catch (e) {}
    });
  }

  const bulkClear = block.querySelector("[data-bulk-clear]");
  if (bulkClear) {
    bulkClear.addEventListener("click", () => {
      block.querySelectorAll(".fence-select:checked").forEach(cb => cb.checked = false);
      refreshBulkUI();
    });
  }
  // 搜尋（即時過濾資料列；類別標頭僅在該類別還有可見列時顯示）
  const search = block.querySelector("#th-fence-search");
  if (search) {
    search.addEventListener("input", () => {
      const q = search.value.trim().toLowerCase();
      const rows = block.querySelectorAll(".th-fence-table tbody tr:not(.th-fence-cat-group)");
      rows.forEach(tr => {
        if (!q) { tr.style.display = ""; return; }
        const name = tr.querySelector(".th-fence-name")?.textContent?.toLowerCase() || "";
        const zid  = tr.dataset.zid?.toLowerCase() || "";
        tr.style.display = (name.includes(q) || zid.includes(q)) ? "" : "none";
      });
      // 隱藏空類別標頭
      block.querySelectorAll(".th-fence-cat-group").forEach(gr => {
        let next = gr.nextElementSibling, anyVisible = false;
        while (next && !next.classList.contains("th-fence-cat-group")) {
          if (next.style.display !== "none") { anyVisible = true; break; }
          next = next.nextElementSibling;
        }
        gr.style.display = anyVisible ? "" : "none";
      });
    });
  }
  // 全部啟用 / 全部停用 / 繪製新區域
  block.querySelectorAll(".th-fence-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const act = btn.dataset.act;
      if (act === "draw-new") {
        // 直接開編輯彈窗（與「編輯」相同 UI），不再走地圖點頂點流程
        openZoneEditorModal({ mode: "new" });
        return;
      }
      const enable = act === "enable-all";
      block.querySelectorAll(".th-fence-table tbody tr:not(.th-fence-cat-group)").forEach(tr => {
        if (tr.style.display === "none") return;
        const cb = tr.querySelector(".fence-toggle");
        if (!cb || cb.checked === enable) return;
        cb.checked = enable;
        const zid = cb.dataset.zid;
        setZoneIoFenceCfg(zid, { enabled: enable });
        tr.classList.toggle("fence-disabled", !enable);
      });
      syncEventsFromAlerts();
    });
  });
  // 每列「編輯 / 刪除」
  block.querySelectorAll(".fence-act-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const zid = btn.dataset.zid, act = btn.dataset.act;
      if (act === "edit") {
        openZoneEditModal(zid);
      } else if (act === "delete") {
        const z = (window.RISK_ZONES || []).find(x => x.id === zid);
        if (!z) return;
        if (confirm(`確定刪除「${z.name}」？\n刪除後無法復原。`)) {
          window.deleteUserZone(zid);
          // userZonesChanged 監聽會重畫；以防萬一，這裡也手動 reroute
          try { renderThresholds(); } catch (e) {}
        }
      }
    });
  });
}

/* ─────────────────────────────────────────────────────────────────
 * 區域繪製 / 編輯：使用者於船隊地圖上點頂點建立多邊形，或從列表開啟編輯彈窗
 * ───────────────────────────────────────────────────────────────── */
let _drawMode = null;  // { vertices, vertexMarkers, polyline, onClick }

function enterDrawMode() {
  // 若不在船隊頁，先切過去（route 之後 fleet map 才存在）
  if (location.hash !== "#/fleet" && location.hash !== "") {
    location.hash = "#/fleet";
  }
  // 等 fleet map 建好（renderFleet 是 sync，但 fitBounds setTimeout 80ms）
  let tries = 0;
  const tryStart = () => {
    if (_fleetMap) { _setupDrawMode(_fleetMap); return; }
    if (++tries > 30) return;
    setTimeout(tryStart, 80);
  };
  tryStart();
}

function _setupDrawMode(map) {
  if (_drawMode) return;   // 已在繪製
  _drawMode = { vertices: [], vertexMarkers: [], polyline: null };

  const ui = document.createElement("div");
  ui.id = "zone-draw-ui";
  ui.innerHTML = `
    <div class="zd-title">繪製新區域 <span class="en">/ Draw New Zone</span></div>
    <div class="zd-hint">在地圖上點擊加入頂點（至少 3 個） · 目前 <b id="zd-count">0</b> 個</div>
    <div class="zd-actions">
      <button type="button" id="zd-undo" disabled>↶ 撤回上一點</button>
      <button type="button" id="zd-cancel">取消</button>
      <button type="button" id="zd-finish" disabled>完成並儲存</button>
    </div>`;
  document.body.appendChild(ui);
  map.getContainer().style.cursor = "crosshair";

  const refresh = () => {
    document.getElementById("zd-count").textContent = _drawMode.vertices.length;
    document.getElementById("zd-undo").disabled = _drawMode.vertices.length === 0;
    document.getElementById("zd-finish").disabled = _drawMode.vertices.length < 3;
    _updateDrawPolyline(map);
  };

  const onClick = (e) => {
    if (!_drawMode) return;
    _drawMode.vertices.push([e.latlng.lat, e.latlng.lng]);
    const m = L.circleMarker(e.latlng, {
      radius: 5, color: "#b069ff", weight: 2, fillColor: "#b069ff", fillOpacity: 0.9
    }).addTo(map);
    _drawMode.vertexMarkers.push(m);
    refresh();
  };
  map.on("click", onClick);
  _drawMode.onClick = onClick;

  document.getElementById("zd-undo").addEventListener("click", () => {
    if (!_drawMode?.vertices.length) return;
    _drawMode.vertices.pop();
    const last = _drawMode.vertexMarkers.pop();
    if (last) map.removeLayer(last);
    refresh();
  });
  document.getElementById("zd-cancel").addEventListener("click", () => exitDrawMode());
  document.getElementById("zd-finish").addEventListener("click", () => {
    if (!_drawMode || _drawMode.vertices.length < 3) return;
    const coords = _drawMode.vertices.slice();
    exitDrawMode();
    // 開啟編輯彈窗讓使用者命名、選組、設樣式、微調頂點
    openZoneEditorModal({ mode: "new", prefillCoords: coords });
  });
}

function _updateDrawPolyline(map) {
  if (!_drawMode) return;
  if (_drawMode.polyline) { map.removeLayer(_drawMode.polyline); _drawMode.polyline = null; }
  if (_drawMode.vertices.length < 2) return;
  const pts = _drawMode.vertices.length >= 3
    ? _drawMode.vertices.concat([_drawMode.vertices[0]])
    : _drawMode.vertices;
  _drawMode.polyline = L.polyline(pts, {
    color: "#b069ff", weight: 2, opacity: 0.85, dashArray: "5 4",
  }).addTo(map);
}

function exitDrawMode() {
  if (!_drawMode) return;
  if (_fleetMap) {
    if (_drawMode.onClick) _fleetMap.off("click", _drawMode.onClick);
    _fleetMap.getContainer().style.cursor = "";
    _drawMode.vertexMarkers.forEach(m => _fleetMap.removeLayer(m));
    if (_drawMode.polyline) _fleetMap.removeLayer(_drawMode.polyline);
  }
  const ui = document.getElementById("zone-draw-ui");
  if (ui) ui.remove();
  _drawMode = null;
}

/* ─────────────────────────────────────────────────────────────────
 * 區域編輯彈窗（取代舊的 openZoneEditModal）
 *   opts = { mode: "new"|"edit", zoneId?, prefillCoords? }
 *   - 形狀：多邊形（active）/ 矩形 / 圓形（後兩者顯示但 disabled）
 *   - 名稱：組名 dropdown + 名稱 input
 *   - 樣式：線型 / 線寬 / 顏色 / 透明度
 *   - 坐標：度 / 度分 / 度分秒 三種格式即時切換；逐頂點 N/S、E/W 切換
 *   - 新增點 / 刪除點（最少 3 個）
 *   - 保存：mode=new → addUserZone；mode=edit → updateUserZone
 *   - 設定後觸發 userZonesChanged → 地圖與設定列表自動重畫
 * ───────────────────────────────────────────────────────────────── */

/* 坐標換算工具 */
function _ddToDM(dd) {
  const abs = Math.abs(dd);
  const d = Math.floor(abs);
  const m = (abs - d) * 60;
  return { d, m, neg: dd < 0 };
}
function _ddToDMS(dd) {
  const abs = Math.abs(dd);
  const d = Math.floor(abs);
  const mFull = (abs - d) * 60;
  const m = Math.floor(mFull);
  const s = (mFull - m) * 60;
  return { d, m, s, neg: dd < 0 };
}
function _dmToDd(d, m, neg) {
  const v = Math.abs(d) + Math.abs(m) / 60;
  return neg ? -v : v;
}
function _dmsToDd(d, m, s, neg) {
  const v = Math.abs(d) + Math.abs(m) / 60 + Math.abs(s) / 3600;
  return neg ? -v : v;
}

/* 編輯彈窗開啟時掛在 _fleetMap 的即時預覽 polygon */
let _zemPreviewLayer = null;
const _zemLineTypeMap = { solid: null, dashed: "6 4", dotted: "2 4", "dash-dot": "6 3 2 3" };
function _zemRefreshPreview(coords, style) {
  if (!_fleetMap) return;
  if (_zemPreviewLayer) { try { _fleetMap.removeLayer(_zemPreviewLayer); } catch (e) {} _zemPreviewLayer = null; }
  if (!coords || coords.length < 2) return;
  const color = (style && style.color) || "#ff0000";
  const opts = {
    color, weight: (style && style.lineWidth) || 1, opacity: 0.95,
    fillColor: color,
    fillOpacity: (style && style.opacity != null) ? style.opacity : 0.2,
    dashArray: style && style.lineType ? _zemLineTypeMap[style.lineType] : null,
  };
  if (coords.length >= 3) {
    _zemPreviewLayer = L.polygon(coords, opts).addTo(_fleetMap);
  } else {
    _zemPreviewLayer = L.polyline(coords, opts).addTo(_fleetMap);
  }
}
function _zemClearPreview() {
  if (_zemPreviewLayer && _fleetMap) {
    try { _fleetMap.removeLayer(_zemPreviewLayer); } catch (e) {}
  }
  _zemPreviewLayer = null;
}

function openZoneEditorModal(opts) {
  opts = opts || {};
  const mode = opts.mode === "edit" ? "edit" : "new";
  const z = mode === "edit" ? (window.RISK_ZONES || []).find(x => x.id === opts.zoneId) : null;
  if (mode === "edit" && (!z || !z.editable)) return;

  // 新區域預設：在台灣中部畫一個小三角當起點，使用者再調整
  const _newDefaultCoords = [[24.0, 121.0], [24.0, 122.0], [23.0, 121.5]];

  // 內部 state（會雙向綁定 UI）
  const state = {
    coordFmt: "dm",   // "dd" | "dm" | "dms"
    group: z?.group || (window.USER_ZONE_GROUPS[0] || "演習區域"),
    name: z?.name || (mode === "new" ? "Custom Zone" : ""),
    level: z?.level || "high",
    style: Object.assign({}, DEFAULT_ZONE_STYLE, z?.style || {}),
    coords: (z?.coords || opts.prefillCoords || _newDefaultCoords).map(p => [Number(p[0]), Number(p[1])]),
  };

  // 若使用者不在船隊地圖頁，切過去讓地圖可見、預覽生效
  if (location.hash !== "#/fleet" && location.hash !== "") {
    location.hash = "#/fleet";
  }

  const mask = document.createElement("div");
  mask.className = "modal-mask open zem-mask";
  mask.style.zIndex = "1200";
  mask.innerHTML = `
    <div class="modal zem-modal">
      <button type="button" class="modal-close zem-close" aria-label="close">×</button>
      <h3 class="zem-title">${mode === "new" ? "繪製新區域" : "編輯區域"} <span class="en">/ ${mode === "new" ? "Draw New Zone" : "Edit Zone"}</span></h3>

      <div class="zem-tab-body" data-tab="draw">
        <!-- 名稱 -->
        <div class="zem-section">
          <div class="zem-section-title">名稱</div>
          <div class="zem-row">
            <label>組名</label>
            <select class="zem-group" id="zem-group"></select>
            <button type="button" class="zem-group-add" id="zem-group-add" title="新增組名">+</button>
            <label>名稱</label>
            <input type="text" class="zem-name" id="zem-name" maxlength="120" value="${escapeHtml(state.name)}">
          </div>
        </div>

        <!-- 樣式 -->
        <div class="zem-section">
          <div class="zem-section-title">樣式</div>
          <div class="zem-row zem-style-row">
            <label>線型</label>
            <select id="zem-linetype">
              <option value="solid">———</option>
              <option value="dashed">- - - -</option>
              <option value="dotted">· · · ·</option>
              <option value="dash-dot">— · — ·</option>
            </select>
            <label>線寬</label>
            <input type="number" id="zem-linewidth" min="1" max="10" step="0.5" value="${state.style.lineWidth}">
            <label>顏色</label>
            <input type="color" id="zem-color" value="${state.style.color}">
            <label>透明度</label>
            <input type="number" id="zem-opacity" min="0" max="1" step="0.05" value="${state.style.opacity}">
          </div>
        </div>

        <!-- 座標格式 tabs + 新增點 -->
        <div class="zem-coord-tabs">
          <button type="button" class="zem-coord-tab" data-fmt="dd">度</button>
          <button type="button" class="zem-coord-tab is-active" data-fmt="dm">度分</button>
          <button type="button" class="zem-coord-tab" data-fmt="dms">度分秒</button>
          <button type="button" class="zem-coord-add" id="zem-add-pt">＋ 新增點</button>
        </div>

        <!-- 頂點清單 -->
        <div class="zem-coords-list" id="zem-coords-list"></div>

        <!-- 動作 -->
        <div class="zem-actions">
          <button type="button" class="zem-btn-primary" id="zem-save">保存</button>
          <button type="button" class="zem-btn-secondary" id="zem-cancel">取消</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(mask);

  const $ = sel => mask.querySelector(sel);
  const close = () => mask.remove();

  // 初始化：組名 select
  function refreshGroupSelect() {
    const sel = $("#zem-group");
    sel.innerHTML = window.USER_ZONE_GROUPS.map(g =>
      `<option value="${escapeHtml(g)}"${g === state.group ? " selected" : ""}>${escapeHtml(g)}</option>`).join("");
  }
  refreshGroupSelect();

  // 線型 select 選中狀態
  const lt = $("#zem-linetype");
  Array.from(lt.options).forEach(o => { if (o.value === state.style.lineType) o.selected = true; });

  // 頂點清單渲染
  function renderCoordsList() {
    const list = $("#zem-coords-list");
    const rows = state.coords.map((pt, idx) => {
      const lat = pt[0], lon = pt[1];
      let inputs;
      if (state.coordFmt === "dd") {
        inputs = `
          <input type="number" step="0.000001" class="zem-coord-input zem-lat-dd" data-idx="${idx}" value="${lat.toFixed(6)}">
          <span class="zem-deg-unit">°</span>
          <button type="button" class="zem-hemi zem-hemi-lat${lat >= 0 ? " is-pos" : ""}" data-idx="${idx}" data-axis="lat">${lat >= 0 ? "N" : "S"}</button>
          <input type="number" step="0.000001" class="zem-coord-input zem-lon-dd" data-idx="${idx}" value="${lon.toFixed(6)}">
          <span class="zem-deg-unit">°</span>
          <button type="button" class="zem-hemi zem-hemi-lon${lon >= 0 ? " is-pos" : ""}" data-idx="${idx}" data-axis="lon">${lon >= 0 ? "E" : "W"}</button>
        `;
      } else if (state.coordFmt === "dm") {
        const a = _ddToDM(lat), b = _ddToDM(lon);
        inputs = `
          <input type="number" class="zem-coord-input zem-lat-d" data-idx="${idx}" value="${a.d}" min="0" max="90">
          <span class="zem-deg-unit">°</span>
          <input type="number" step="0.000001" class="zem-coord-input zem-lat-m" data-idx="${idx}" value="${a.m.toFixed(0)}" min="0" max="59.999999">
          <span class="zem-deg-unit">'</span>
          <button type="button" class="zem-hemi zem-hemi-lat${!a.neg ? " is-pos" : ""}" data-idx="${idx}" data-axis="lat">${a.neg ? "S" : "N"}</button>
          <input type="number" class="zem-coord-input zem-lon-d" data-idx="${idx}" value="${b.d}" min="0" max="180">
          <span class="zem-deg-unit">°</span>
          <input type="number" step="0.000001" class="zem-coord-input zem-lon-m" data-idx="${idx}" value="${b.m.toFixed(0)}" min="0" max="59.999999">
          <span class="zem-deg-unit">'</span>
          <button type="button" class="zem-hemi zem-hemi-lon${!b.neg ? " is-pos" : ""}" data-idx="${idx}" data-axis="lon">${b.neg ? "W" : "E"}</button>
        `;
      } else {
        const a = _ddToDMS(lat), b = _ddToDMS(lon);
        inputs = `
          <input type="number" class="zem-coord-input zem-lat-d" data-idx="${idx}" value="${a.d}" min="0" max="90">
          <span class="zem-deg-unit">°</span>
          <input type="number" class="zem-coord-input zem-lat-m" data-idx="${idx}" value="${a.m}" min="0" max="59">
          <span class="zem-deg-unit">'</span>
          <input type="number" step="0.01" class="zem-coord-input zem-lat-s" data-idx="${idx}" value="${a.s.toFixed(2)}" min="0" max="59.99">
          <span class="zem-deg-unit">&quot;</span>
          <button type="button" class="zem-hemi zem-hemi-lat${!a.neg ? " is-pos" : ""}" data-idx="${idx}" data-axis="lat">${a.neg ? "S" : "N"}</button>
          <input type="number" class="zem-coord-input zem-lon-d" data-idx="${idx}" value="${b.d}" min="0" max="180">
          <span class="zem-deg-unit">°</span>
          <input type="number" class="zem-coord-input zem-lon-m" data-idx="${idx}" value="${b.m}" min="0" max="59">
          <span class="zem-deg-unit">'</span>
          <input type="number" step="0.01" class="zem-coord-input zem-lon-s" data-idx="${idx}" value="${b.s.toFixed(2)}" min="0" max="59.99">
          <span class="zem-deg-unit">&quot;</span>
          <button type="button" class="zem-hemi zem-hemi-lon${!b.neg ? " is-pos" : ""}" data-idx="${idx}" data-axis="lon">${b.neg ? "W" : "E"}</button>
        `;
      }
      return `
        <div class="zem-coord-row" data-idx="${idx}">
          <span class="zem-coord-no">${idx + 1}.</span>
          ${inputs}
          <button type="button" class="zem-coord-del" data-idx="${idx}" title="刪除此點">×</button>
        </div>`;
    }).join("");
    list.innerHTML = rows;
    wireCoordRows();
  }

  // 把使用者更新的 input 寫回 state.coords[idx]
  function readRowToCoord(idx) {
    const row = mask.querySelector(`.zem-coord-row[data-idx="${idx}"]`);
    if (!row) return;
    let lat, lon;
    const latHemi = row.querySelector(".zem-hemi-lat");
    const lonHemi = row.querySelector(".zem-hemi-lon");
    const latNeg = !latHemi.classList.contains("is-pos");
    const lonNeg = !lonHemi.classList.contains("is-pos");
    if (state.coordFmt === "dd") {
      lat = parseFloat(row.querySelector(".zem-lat-dd").value);
      lon = parseFloat(row.querySelector(".zem-lon-dd").value);
      if (!isFinite(lat) || !isFinite(lon)) return;
      lat = Math.abs(lat) * (latNeg ? -1 : 1);
      lon = Math.abs(lon) * (lonNeg ? -1 : 1);
    } else if (state.coordFmt === "dm") {
      const ld = parseFloat(row.querySelector(".zem-lat-d").value);
      const lm = parseFloat(row.querySelector(".zem-lat-m").value);
      const od = parseFloat(row.querySelector(".zem-lon-d").value);
      const om = parseFloat(row.querySelector(".zem-lon-m").value);
      if ([ld, lm, od, om].some(v => !isFinite(v))) return;
      lat = _dmToDd(ld, lm, latNeg);
      lon = _dmToDd(od, om, lonNeg);
    } else {
      const ld = parseFloat(row.querySelector(".zem-lat-d").value);
      const lm = parseFloat(row.querySelector(".zem-lat-m").value);
      const ls = parseFloat(row.querySelector(".zem-lat-s").value);
      const od = parseFloat(row.querySelector(".zem-lon-d").value);
      const om = parseFloat(row.querySelector(".zem-lon-m").value);
      const os = parseFloat(row.querySelector(".zem-lon-s").value);
      if ([ld, lm, ls, od, om, os].some(v => !isFinite(v))) return;
      lat = _dmsToDd(ld, lm, ls, latNeg);
      lon = _dmsToDd(od, om, os, lonNeg);
    }
    if (Math.abs(lat) > 90 || Math.abs(lon) > 180) return;
    state.coords[idx] = [lat, lon];
  }

  // 即時預覽：拉目前 UI 樣式 + state.coords 重畫地圖上的 polygon
  function refreshPreview() {
    const style = {
      lineType:  $("#zem-linetype")?.value || state.style.lineType,
      lineWidth: parseFloat($("#zem-linewidth")?.value) || state.style.lineWidth,
      color:     $("#zem-color")?.value || state.style.color,
      opacity:   parseFloat($("#zem-opacity")?.value),
    };
    if (!isFinite(style.opacity)) style.opacity = state.style.opacity;
    _zemRefreshPreview(state.coords, style);
  }

  function wireCoordRows() {
    mask.querySelectorAll(".zem-coord-input").forEach(inp => {
      inp.addEventListener("input", () => {
        const idx = parseInt(inp.dataset.idx, 10);
        readRowToCoord(idx);
        refreshPreview();
      });
    });
    mask.querySelectorAll(".zem-hemi").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = parseInt(btn.dataset.idx, 10);
        const axis = btn.dataset.axis;
        btn.classList.toggle("is-pos");
        btn.textContent = btn.classList.contains("is-pos")
          ? (axis === "lat" ? "N" : "E")
          : (axis === "lat" ? "S" : "W");
        readRowToCoord(idx);
        refreshPreview();
      });
    });
    mask.querySelectorAll(".zem-coord-del").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = parseInt(btn.dataset.idx, 10);
        if (state.coords.length <= 3) { alert("多邊形至少需要 3 個頂點"); return; }
        state.coords.splice(idx, 1);
        renderCoordsList();
        refreshPreview();
      });
    });
  }
  renderCoordsList();

  // 座標格式切換（僅顯示格式變，coords 不變，不必更新預覽）
  mask.querySelectorAll(".zem-coord-tab").forEach(t => {
    t.addEventListener("click", () => {
      mask.querySelectorAll(".zem-coord-row").forEach(row => readRowToCoord(parseInt(row.dataset.idx, 10)));
      mask.querySelectorAll(".zem-coord-tab").forEach(x => x.classList.remove("is-active"));
      t.classList.add("is-active");
      state.coordFmt = t.dataset.fmt;
      renderCoordsList();
    });
  });

  // 新增點
  $("#zem-add-pt").addEventListener("click", () => {
    mask.querySelectorAll(".zem-coord-row").forEach(row => readRowToCoord(parseInt(row.dataset.idx, 10)));
    const last = state.coords[state.coords.length - 1] || [23.5, 120.5];
    state.coords.push([last[0] + 0.01, last[1] + 0.01]);
    renderCoordsList();
    refreshPreview();
  });

  // 樣式變動立即更新預覽
  ["#zem-linetype", "#zem-linewidth", "#zem-color", "#zem-opacity"].forEach(sel => {
    const el = $(sel); if (!el) return;
    el.addEventListener("input",  refreshPreview);
    el.addEventListener("change", refreshPreview);
  });

  // 新增組名
  $("#zem-group-add").addEventListener("click", () => {
    const name = prompt("新增組名 / New group name:");
    if (name == null) return;
    if (!window.addUserZoneGroup(name.trim())) return;
    state.group = name.trim();
    refreshGroupSelect();
  });

  // 關閉時清理預覽圖層
  function closeAndCleanup() { _zemClearPreview(); close(); }
  $(".zem-close").addEventListener("click", closeAndCleanup);
  mask.addEventListener("click", e => { if (e.target === mask) closeAndCleanup(); });
  $("#zem-cancel").addEventListener("click", closeAndCleanup);

  // 等地圖建好（route 變 #/fleet 後 renderFleet 是 sync 但 fitBounds 有 80ms setTimeout）
  let waitTries = 0;
  const initialPreview = () => {
    if (_fleetMap) { refreshPreview(); return; }
    if (++waitTries > 30) return;
    setTimeout(initialPreview, 80);
  };
  initialPreview();

  // 保存
  $("#zem-save").addEventListener("click", () => {
    // 把 UI 最新值 commit 進 state（包括輸入中尚未 blur 的）
    mask.querySelectorAll(".zem-coord-row").forEach(row => readRowToCoord(parseInt(row.dataset.idx, 10)));
    const name = $("#zem-name").value.trim();
    if (!name) { alert("名稱不可為空"); return; }
    if (state.coords.length < 3) { alert("多邊形至少需要 3 個頂點"); return; }
    const group = $("#zem-group").value;
    const style = {
      lineType:  $("#zem-linetype").value,
      lineWidth: parseFloat($("#zem-linewidth").value) || 1,
      color:     $("#zem-color").value,
      opacity:   parseFloat($("#zem-opacity").value),
    };
    if (mode === "new") {
      try {
        window.addUserZone({ name, level: state.level, coords: state.coords.slice(), group, style });
      } catch (e) { alert("儲存失敗：" + e.message); return; }
    } else {
      window.updateUserZone(opts.zoneId, { name, level: state.level, coords: state.coords.slice(), group, style });
    }
    closeAndCleanup();
  });
}

// 對外保留舊名稱以兼容
function openZoneEditModal(zid) { return openZoneEditorModal({ mode: "edit", zoneId: zid }); }

/* 使用者圍籬變動時：重畫所有 map 的風險區圖層 + 重畫閾值設定列表（若可見） */
window.addEventListener("userZonesChanged", () => {
  // 對每個活躍的 map 重畫風險區圖層
  [_fleetMap, _mapInstance].forEach(map => {
    if (!map) return;
    const old = _riskLayersByMap.get(map);
    if (old) Object.values(old).forEach(g => { if (map.hasLayer(g)) map.removeLayer(g); });
    try { drawRiskZones(map); } catch (e) {}
  });
  // 閾值設定頁可見的話重畫
  if (location.hash === "#/thresholds") {
    try { renderThresholds(); } catch (e) {}
  }
});

/* 共用：把持續時間 input 與通知 checkbox 的事件接好（全域層級，不寫入 vessel override）
 *   - 持續時間：blur / Enter 後寫入 _thresholds[dim].warningDuration / criticalDuration
 *   - 通知：change 後立即寫入 _thresholds[dim].notify.mail / line
 *   兩者都會 saveThresholds() 持久化，但 NOT 觸發 syncEventsFromAlerts / renderThresholds，
 *   避免使用者調整時頁面跳動；下次 Save / re-render 時自然反映。 */
function wireDurationAndNotify(root) {
  if (!root) return;
  root.querySelectorAll(".th-dur-input").forEach(inp => {
    const save = () => {
      const dim = inp.dataset.dim;
      const lvl = inp.dataset.durLvl;
      if (!_thresholds[dim] || (lvl !== "warning" && lvl !== "critical")) return;
      const v = parseInt(inp.value, 10);
      if (!isNaN(v) && v >= 0) {
        _thresholds[dim][lvl + "Duration"] = v;
        saveThresholds();
      }
    };
    inp.addEventListener("blur", save);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); inp.blur(); } });
  });
  root.querySelectorAll('input[type="checkbox"][data-notify]').forEach(cb => {
    cb.addEventListener("change", () => {
      const dim = cb.dataset.dim;
      const kind = cb.dataset.notify;
      if (_thresholds[dim] && _thresholds[dim].notify && (kind === "mail" || kind === "line")) {
        _thresholds[dim].notify[kind] = cb.checked;
        saveThresholds();
      }
    });
  });
}

/* batch view：單列 commit。依目前 scope 寫入對應層級。
 *   - global：寫 _thresholds[dim]
 *   - my：寫入「我管的所有船」的 _vesselOverrides
 *   - single：寫入單艘船 _vesselOverrides */
function commitBatchRow(row) {
  if (!row) return;
  const dim = row.dataset.dim;
  const def = DEFAULT_THRESHOLDS[dim]; if (!def) return;
  const wInp = row.querySelector(".th-warn");
  const cInp = row.querySelector(".th-crit");
  const wRaw = wInp.value, cRaw = cInp.value;
  const w = wRaw === "" ? null : parseFloat(wRaw);
  const c = cRaw === "" ? null : parseFloat(cRaw);
  // 兩格都空：清除該層級該維度（依 scope）
  const seg = _batchSegment;
  const isClear = (w == null && c == null);
  if (!isClear) {
    const finalW = w != null ? w : def.warning;
    const finalC = c != null ? c : def.critical;
    if (finalC <= finalW) {
      alert("Critical 必須大於 Warning。");
      // 還原 input 為儲存中值
      if (_batchScope === "global") {
        wInp.value = (_thresholds[dim]?.warning ?? def.warning) !== def.warning ? _thresholds[dim].warning : "";
        cInp.value = (_thresholds[dim]?.critical ?? def.critical) !== def.critical ? _thresholds[dim].critical : "";
      } else {
        const targetVid = _batchScope === "single" ? _batchScopeVid
          : (isAdmin(_currentUser) ? VESSELS[0]?.vessel_id : VESSELS.find(v => v.manager === _currentUser)?.vessel_id);
        const ovr = getVesselOverrideRaw(targetVid, dim);
        wInp.value = ovr?.warning ?? "";
        cInp.value = ovr?.critical ?? "";
      }
      refreshDimRowLevel(row);
      return;
    }
  }
  if (_batchScope === "global") {
    if (isClear) {
      _thresholds[dim].warning  = def.warning;
      _thresholds[dim].critical = def.critical;
    } else {
      if (w != null) _thresholds[dim].warning  = w;
      if (c != null) _thresholds[dim].critical = c;
    }
    saveThresholds();
  } else if (_batchScope === "my") {
    const targets = VESSELS.filter(v => v.manager === _currentUser);
    targets.forEach(v => setVesselOverride(v.vessel_id, dim, w, c, seg));
  } else if (_batchScope === "byMgr") {
    // 主管選某監管的船隊
    const targets = VESSELS.filter(v => v.manager === _batchScopeManager);
    targets.forEach(v => setVesselOverride(v.vessel_id, dim, w, c, seg));
  }
  syncEventsFromAlerts();
  renderThresholds();
}

function refreshDimRowLevel(row) {
  if (!row) return;
  const dim = row.dataset.dim;
  const def = DEFAULT_THRESHOLDS[dim]; if (!def) return;
  const wInp = row.querySelector(".th-warn");
  const cInp = row.querySelector(".th-crit");
  const w = wInp.value === "" ? (_thresholds[dim]?.warning  ?? def.warning)  : parseFloat(wInp.value);
  const c = cInp.value === "" ? (_thresholds[dim]?.critical ?? def.critical) : parseFloat(cInp.value);
  // 取 row 對應的「目標船舶」：批次 view 看 _batchScope 決定，單船 view 看 _vesselViewVid
  const isVesselView = !!row.closest(".th-vessel-view");
  const v = isVesselView
    ? VESSELS.find(x => x.vessel_id === _vesselViewVid)
    : (_batchScope === "single"
        ? VESSELS.find(x => x.vessel_id === _batchScopeVid)
        : (_batchScope === "my"
            ? VESSELS.filter(x => isAdmin(_currentUser) || x.manager === _currentUser)[0]
            : null));
  const metricEl = row.querySelector(".th-row-current");
  if (!metricEl) return;
  if (!v) {
    metricEl.classList.add("muted");
    metricEl.innerHTML = "船舶現況 / Current —";
    return;
  }
  const metric = getDimCurrentMetric(v, dim);
  const lvl = dimLevelFor(metric, w, c, dim);
  if (metric == null) {
    metricEl.classList.add("muted");
    metricEl.innerHTML = "船舶現況 / Current —";
    return;
  }
  metricEl.classList.remove("muted");
  metricEl.innerHTML = `船舶現況 / Current<span class="th-row-current-val">${formatThresholdValue(dim, metric)}</span><span class="th-row-lvl" data-level="${lvl}">${lvl === "critical" ? "Critical" : lvl === "warning" ? "Warning" : "Normal"}</span>`;
}

function refreshBatchImpact() {
  const el = document.getElementById("th-batch-impact");
  if (!el) return;
  const seg = SEGMENT_META[_batchSegment];
  let label = "—";
  if (_batchScope === "global") label = `將寫入全船隊預設，影響 ${VESSELS.length} 艘船`;
  else if (_batchScope === "my") {
    const targets = VESSELS.filter(v => v.manager === _currentUser);
    label = `將寫入「我的全部船」個別設定（${targets.length} 艘）`;
  } else if (_batchScope === "byMgr") {
    const targets = VESSELS.filter(v => v.manager === _batchScopeManager);
    label = `將寫入「${_batchScopeManager}」船隊（${targets.length} 艘）`;
  }
  if (seg && _batchSegment !== "all") label += ` · 限 ${seg.cn}`;
  el.textContent = `影響預覽：${label}`;
}

function applyBatchSegment() {
  const root = document.querySelector(".th-batch");
  if (!root) return;
  const seg = _batchSegment;
  const rows = Array.from(root.querySelectorAll(".th-dim-row"));
  const changes = []; // { dim, w, c }
  let invalid = null;
  rows.forEach(row => {
    const dim = row.dataset.dim;
    const def = DEFAULT_THRESHOLDS[dim]; if (!def) return;
    const wRaw = row.querySelector(".th-warn").value;
    const cRaw = row.querySelector(".th-crit").value;
    const w = wRaw === "" ? null : parseFloat(wRaw);
    const c = cRaw === "" ? null : parseFloat(cRaw);
    // 跳過全部空白的列（沿用上層）
    if (w == null && c == null) return;
    const finalW = w != null ? w : def.warning;
    const finalC = c != null ? c : def.critical;
    if (finalC <= finalW) { invalid = `「${DIM_META[dim]?.label}」: Critical 必須大於 Warning`; return; }
    changes.push({ dim, w, c });
  });
  if (invalid) { alert(invalid); return; }
  if (!changes.length) { alert("沒有輸入任何閾值。請在至少一個維度輸入 W 或 C。"); return; }

  const segLabel = SEGMENT_META[seg]?.cn || seg;
  if (_batchScope === "global") {
    if (!confirm(`即將寫入全船隊預設：${changes.length} 個維度，${segLabel}。\n\n確認套用？`)) return;
    changes.forEach(({ dim, w, c }) => {
      if (w != null) _thresholds[dim].warning  = w;
      if (c != null) _thresholds[dim].critical = c;
    });
    saveThresholds();
  } else if (_batchScope === "my") {
    const visibleVessels = isAdmin(_currentUser)
      ? VESSELS
      : VESSELS.filter(v => v.manager === _currentUser);
    if (!visibleVessels.length) { alert("沒有可套用的船舶。"); return; }
    if (!confirm(`即將對 ${visibleVessels.length} 艘船舶寫入「${segLabel}」的 ${changes.length} 個維度覆寫。\n\n確認套用？`)) return;
    visibleVessels.forEach(v => {
      changes.forEach(({ dim, w, c }) => setVesselOverride(v.vessel_id, dim, w, c, seg));
    });
  } else if (_batchScope === "single") {
    if (!_batchScopeVid) { alert("請選擇船舶。"); return; }
    const v = VESSELS.find(x => x.vessel_id === _batchScopeVid);
    if (!confirm(`即將對 ${v?.vessel_name} 寫入「${segLabel}」的 ${changes.length} 個維度覆寫。\n\n確認套用？`)) return;
    changes.forEach(({ dim, w, c }) => setVesselOverride(_batchScopeVid, dim, w, c, seg));
  }
  syncEventsFromAlerts();
  renderThresholds();
}

function resetBatchSegment() {
  const seg = _batchSegment;
  const segLabel = SEGMENT_META[seg]?.cn || seg;
  const dims = SEGMENT_META[seg]?.dims || [];
  if (_batchScope === "global") {
    if (!confirm(`即將把「${segLabel}」相關 ${dims.length} 個維度的全船隊預設重置為系統原廠值。\n\n確認？`)) return;
    dims.forEach(d => {
      const def = DEFAULT_THRESHOLDS[d];
      if (def) { _thresholds[d].warning = def.warning; _thresholds[d].critical = def.critical; }
    });
    saveThresholds();
  } else if (_batchScope === "my") {
    const targets = VESSELS.filter(v => v.manager === _currentUser);
    if (!confirm(`即將清除「我的全部船（${targets.length} 艘）」在「${segLabel}」的 ${dims.length} 個維度設定。\n\n確認？`)) return;
    targets.forEach(v => dims.forEach(d => setVesselOverride(v.vessel_id, d, null, null)));
  } else if (_batchScope === "byMgr") {
    const targets = VESSELS.filter(v => v.manager === _batchScopeManager);
    if (!confirm(`即將清除「${_batchScopeManager}」船隊（${targets.length} 艘）在「${segLabel}」的 ${dims.length} 個維度設定。\n\n確認？`)) return;
    targets.forEach(v => dims.forEach(d => setVesselOverride(v.vessel_id, d, null, null)));
  }
  syncEventsFromAlerts();
  renderThresholds();
}

/* 錨泊面板（單船設定 · 錨泊／漂流航段）：狀態手動切換 + 手動錨位設定入口。
 *   錨泊維度不進批次，故不走 dimRowHTML；此面板獨立呈現。 */
function anchorPanelHTML(v) {
  // 錨泊／漂航僅在 AIS 進入錨泊狀態(nav_status 1)時可設定；否則顯示不適用說明 + 人工強制入口。
  const atAnchor = parseInt(v.nav_status, 10) === 1;
  const forced = _anchorForceSetup.has(v.vessel_id);
  if (!atAnchor && !forced) {
    return `
    <div class="th-anchor-panel" style="border:1px solid var(--k-2a2a2a);border-radius:6px;padding:14px;margin-bottom:12px;background:var(--sf-50)">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <span style="color:var(--k-7c8a9e);font-size:16px;line-height:1.4">ℹ</span>
        <div style="color:var(--k-9aa5b8);font-size:13px;line-height:1.7;flex:1">
          <b style="color:var(--k-c4cdda)">此船目前非錨泊狀態</b>（AIS 航行狀態 nav_status = ${escapeHtml(String(v.nav_status ?? "—"))}，非在錨）。<br>
          錨泊／漂航監控僅在船舶 AIS 進入<b style="color:var(--k-f5b753)">錨泊狀態（nav_status 1）</b>時適用。待船舶進入錨泊狀態，系統會<b>通知監管人員</b>，屆時於此逐船設定漂航與錨泊。
          <div style="margin-top:10px"><button type="button" class="trans-btn secondary" id="th-anchor-force">人工強制設定 / Force setup</button></div>
        </div>
      </div>
    </div>`;
  }
  const state = getAnchorState(v.vessel_id);
  const geo = getAnchorGeo(v.vessel_id);
  const anDur = (geo && geo.duration != null) ? geo.duration : ANCHOR_DEFAULT.duration;
  let geoSummary;
  if (!geo) geoSummary = `<span style="color:var(--k-f5b753)">尚未設定手動錨位 / not set</span>`;
  else if (geo.type === "circle") geoSummary = `單點錨位 ${geo.center[0].toFixed(3)}, ${geo.center[1].toFixed(3)} · Warn ${geo.warning} NM / Crit ${geo.critical} NM · 持續 ${anDur} 分`;
  else geoSummary = `錨區多邊形 / polygon · ${geo.points.length} 頂點 · Warn ${geo.warning ?? ANCHOR_DEFAULT.warning} / Crit ${geo.critical ?? ANCHOR_DEFAULT.critical} NM · 持續 ${anDur} 分`;
  // 漂航半徑：本船覆寫 > 全船隊預設 > 系統預設
  const dovr = getDriftOverride(v.vessel_id, "driftAnchor");
  const dW = dovr?.warning  ?? _thresholds.driftAnchor?.warning  ?? DEFAULT_THRESHOLDS.driftAnchor.warning;
  const dC = dovr?.critical ?? _thresholds.driftAnchor?.critical ?? DEFAULT_THRESHOLDS.driftAnchor.critical;
  const dDur = dovr?.duration ?? _thresholds.driftAnchor?.warningDuration ?? DEFAULT_THRESHOLDS.driftAnchor.warningDuration ?? 0;
  const tgl = (s, label) => {
    const on = state === s;
    return `<button type="button" class="th-atg" data-state="${s}" style="padding:5px 12px;border-radius:4px;font-size:13px;cursor:pointer;border:1px solid ${on ? "#f5b753" : "var(--k-2e3a4d)"};background:${on ? "rgba(245,166,35,0.18)" : "transparent"};color:${on ? "#f5b753" : "var(--k-9aa5b8)"}">${label}</button>`;
  };
  return `
    <div class="th-anchor-panel" style="border:1px solid var(--k-2a2a2a);border-radius:6px;padding:12px;margin-bottom:12px;background:var(--sf-50)">
      ${!atAnchor && forced ? `<div style="margin-bottom:10px;padding:6px 10px;border-radius:4px;background:rgba(245,166,35,0.12);color:var(--k-f5b753);font-size:12px">⚠ 人工強制設定中：此船 AIS 非錨泊狀態(nav_status = ${escapeHtml(String(v.nav_status ?? "—"))})，仍手動開啟設定。</div>` : ""}
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
        <div class="th-anchor-toggle" style="display:inline-flex;gap:6px">${tgl("drift", "漂航 / Drift")}${tgl("anchor", "錨泊 / Anchor")}</div>
        <span style="color:var(--k-7c8a9e);font-size:12px;flex:1;min-width:180px">AIS 皆為錨泊狀態(nav_status 1)無法自動區分，由監管人員手動指定。</span>
      </div>
      <div class="th-drift-branch" style="${state === "drift" ? "" : "display:none"}">
        <div style="font-size:13px;color:var(--k-c4cdda);margin-bottom:8px">漂航圈半徑 / Drift radius：W ≥ ${dW} NM / C ≥ ${dC} NM · 持續 ${dDur} 分${dovr ? "（本船自訂 / custom）" : "（全船隊預設 / fleet default）"}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button type="button" class="trans-btn" id="th-drift-edit">設定漂航圈半徑 / Set drift radius…</button>
          ${dovr ? `<button type="button" class="trans-btn danger" id="th-drift-reset">還原預設 / Reset</button>` : ""}
        </div>
        <div style="color:var(--k-7c8a9e);font-size:12px;margin-top:8px">漂航半徑預設沿用全船隊值；於地圖上即時預覽並覆寫本船。</div>
      </div>
      <div class="th-anchor-manual" style="${state === "anchor" ? "" : "display:none"}">
        <div style="font-size:13px;color:var(--k-c4cdda);margin-bottom:8px">手動錨位 / Manual anchorage：${geoSummary}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button type="button" class="trans-btn" id="th-anchor-edit">設定手動錨位 / Set anchorage…</button>
          ${geo ? `<button type="button" class="trans-btn danger" id="th-anchor-clear">移除錨位 / Remove</button>` : ""}
        </div>
        <div style="color:var(--k-7c8a9e);font-size:12px;margin-top:8px">錨泊監控不進批次，僅套用本船；單點＋半徑或多點錨區皆可，不使用需外部數據的估算。</div>
      </div>
    </div>`;
}

/* 單船設定 view — 選船 + 切航段 + 每維度 inline 編輯，blur 即存 */
function renderPerVesselSetup(visibleVessels) {
  if (!visibleVessels.length) {
    return `<div class="th-vessel-view th-empty">目前帳號沒有可管理的船舶。</div>`;
  }
  const segments = Object.keys(SEGMENT_META);
  const seg = SEGMENT_META[_vesselViewSegment] || SEGMENT_META.sea;
  const v = visibleVessels.find(x => x.vessel_id === _vesselViewVid) || visibleVessels[0];
  const a = computeAlerts(v);
  const riskColor = a.risk === "critical" ? "#ff8a8a"
                 : a.risk === "warning"  ? "#f5b753"
                 : a.risk === "normal"   ? "#6ee094" : "#7c8a9e";
  const riskLabel = a.risk === "critical" ? "Critical"
                 : a.risk === "warning"  ? "Warning"
                 : a.risk === "normal"   ? "Normal" : "N/A";

  const vesselOpts = visibleVessels.map(x =>
    `<option value="${x.vessel_id}"${x.vessel_id === v.vessel_id ? " selected" : ""}>${escapeHtml(x.vessel_name)} · IMO ${escapeHtml(x.imo)}</option>`).join("");

  const segTabs = segments.map(s => {
    const meta = SEGMENT_META[s];
    return `<button type="button" class="th-seg-tab${s === _vesselViewSegment ? " is-active" : ""}" data-seg="${s}"
              style="--seg-color:${meta.color}">
              <span class="th-seg-icon">${meta.icon}</span>
              <span>${meta.cn}<span class="en"> / ${meta.en}</span></span>
            </button>`;
  }).join("");

  const dimRows = seg.dims.map(d => {
    const def = DEFAULT_THRESHOLDS[d]; if (!def) return "";
    const ovr = getVesselOverrideRaw(v.vessel_id, d);
    const valW = ovr?.warning  ?? null;
    const valC = ovr?.critical ?? null;
    // 單船 view 的「預設」優先序：船舶航線計畫上限（plan_thresholds）> 全船隊預設 > 系統預設
    const planTh = v.plan_thresholds?.[d];
    const defW = planTh?.warning  ?? _thresholds[d]?.warning  ?? def.warning;
    const defC = planTh?.critical ?? _thresholds[d]?.critical ?? def.critical;
    const overridden = !!(ovr && (ovr.warning != null || ovr.critical != null));
    const segNote = ovr?.segment && ovr.segment !== "all" ? SEGMENT_META[ovr.segment]?.cn || ovr.segment : "";
    const metric = getDimCurrentMetric(v, d);
    const effW = valW != null ? valW : defW;
    const effC = valC != null ? valC : defC;
    const level = dimLevelFor(metric, effW, effC, d);
    const activeEvent = _events.find(e =>
      e.vessel_id === v.vessel_id && e.dimension === d &&
      e.status !== "resolved" && !e.cleared
    ) || null;
    return dimRowHTML({
      dim: d, valW, valC, defW, defC, metric, level, overridden,
      isCore: seg.coreDims.includes(d), segNote,
      defSource: planTh ? "plan" : null,
      withReset: true,
      activeEvent,
      vessel: v,  // zone_io 圍籬列要顯示該船目前對各圍籬的距離/狀態
    });
  }).filter(Boolean).join("");

  return `
    <div class="th-vessel-view">
      <div class="th-vv-head">
        <span class="th-vv-label">船舶 / Vessel</span>
        <select id="th-vv-vid">${vesselOpts}</select>
        <span class="th-vv-risk" style="color:${riskColor};border-color:${riskColor}44;background:${riskColor}1a">${riskLabel}</span>
        ${(isAdmin(_currentUser) || _viewAll) ? `<span class="th-vv-mgr">${escapeHtml(v.manager || "")}</span>` : ""}
      </div>
      <div class="th-seg-tabs" role="tablist">${segTabs}</div>
      <div class="th-batch-dims">
        <div class="th-batch-dims-head">
          <b style="color:${seg.color}">${seg.icon} ${seg.cn}</b>
          <span style="color:var(--k-7c8a9e);font-size:12px">${_vesselViewSegment === "anchor" ? " · 依船舶狀態設定漂航或錨泊監控" : ` · 監測維度（${seg.dims.length}）· 核心維度標 ★`}</span>
        </div>
        ${_vesselViewSegment === "anchor" ? anchorPanelHTML(v)
          : (dimRows || `<div class="th-empty">此航段尚無可設定的維度（CPA／TCPA 待補）</div>`)}
      </div>
      <div class="th-batch-footer">
        <span class="th-impact">輸入完成後按 Enter 或點到其它欄位即自動儲存</span>
        <button type="button" class="trans-btn secondary" id="th-vv-reset">清除此航段所有設定</button>
      </div>
      <div class="th-batch-note">
        留空＝沿用全船隊預設。Critical 必須大於 Warning。每維度也可單獨按 [復原] 還原為預設。
      </div>
    </div>`;
}

function wirePerVesselSetup() {
  const root = document.querySelector(".th-vessel-view");
  if (!root) return;
  // 船舶切換
  const vsel = root.querySelector("#th-vv-vid");
  if (vsel) vsel.addEventListener("change", () => {
    _vesselViewVid = parseInt(vsel.value, 10);
    renderThresholds();
  });
  // segment 切換
  root.querySelectorAll(".th-seg-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      _vesselViewSegment = btn.dataset.seg;
      sessionStorage.setItem("slab_va_th_vv_segment", _vesselViewSegment);
      renderThresholds();
    });
  });
  // 錨泊面板：狀態切換 + 手動錨位入口
  root.querySelectorAll(".th-atg").forEach(btn => {
    btn.addEventListener("click", () => {
      setAnchorState(_vesselViewVid, btn.dataset.state);
      renderThresholds();
    });
  });
  const anForce = root.querySelector("#th-anchor-force");
  if (anForce) anForce.addEventListener("click", () => window.forceAnchorSetup(_vesselViewVid));
  const anEdit = root.querySelector("#th-anchor-edit");
  if (anEdit) anEdit.addEventListener("click", () => window.openAnchorSettings(_vesselViewVid));
  const anClear = root.querySelector("#th-anchor-clear");
  if (anClear) anClear.addEventListener("click", () => { setAnchorGeo(_vesselViewVid, null); renderThresholds(); });
  // 漂航圈半徑（本船覆寫）：跳到地圖側邊面板設定 / 還原預設
  const drEdit = root.querySelector("#th-drift-edit");
  if (drEdit) drEdit.addEventListener("click", () => window.openDriftSettings(_vesselViewVid, "driftAnchor"));
  const drReset = root.querySelector("#th-drift-reset");
  if (drReset) drReset.addEventListener("click", () => {
    setDriftOverride(_vesselViewVid, "driftAnchor", null, null);
    syncEventsFromAlerts();
    renderThresholds();
  });
  // input 即時預覽 + blur/Enter 寫回
  //   排除持續時間 input（.th-dur-input），那條由 wireDurationAndNotify() 處理
  root.querySelectorAll(".th-input:not(.th-dur-input)").forEach(inp => {
    inp.addEventListener("input", () => refreshDimRowLevel(inp.closest(".th-dim-row")));
    const commit = () => {
      const row = inp.closest(".th-dim-row");
      const dim = row.dataset.dim;
      const def = DEFAULT_THRESHOLDS[dim]; if (!def) return;
      const wRaw = row.querySelector(".th-warn").value;
      const cRaw = row.querySelector(".th-crit").value;
      const w = wRaw === "" ? null : parseFloat(wRaw);
      const c = cRaw === "" ? null : parseFloat(cRaw);
      if (w == null && c == null) {
        setVesselOverride(_vesselViewVid, dim, null, null);
      } else {
        const finalW = w != null ? w : def.warning;
        const finalC = c != null ? c : def.critical;
        if (finalC <= finalW) {
          alert("Critical 必須大於 Warning。");
          const ovr = getVesselOverrideRaw(_vesselViewVid, dim);
          row.querySelector(".th-warn").value = ovr?.warning  ?? "";
          row.querySelector(".th-crit").value = ovr?.critical ?? "";
          refreshDimRowLevel(row);
          return;
        }
        setVesselOverride(_vesselViewVid, dim, w, c, _vesselViewSegment);
      }
      syncEventsFromAlerts();
      renderThresholds();
    };
    inp.addEventListener("blur", commit);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); inp.blur(); } });
  });
  // 持續時間 + 通知方式：全域層級，與 scope / vessel override 無關
  wireDurationAndNotify(root);
  // 到離區域監控逐圍籬設定
  wireZoneIoFences(root);
  // 整個航段一鍵清除
  const segResetBtn = root.querySelector("#th-vv-reset");
  if (segResetBtn) {
    segResetBtn.addEventListener("click", () => {
      const seg = SEGMENT_META[_vesselViewSegment];
      if (!seg) return;
      const v = VESSELS.find(x => x.vessel_id === _vesselViewVid);
      if (!v) return;
      if (!confirm(`即將清除「${v.vessel_name}」在「${seg.cn}」的 ${seg.dims.length} 個維度 override。\n\n確認？`)) return;
      seg.dims.forEach(d => setVesselOverride(_vesselViewVid, d, null, null));
      syncEventsFromAlerts();
      renderThresholds();
    });
  }
  // 維度復原
  root.querySelectorAll(".th-row-reset").forEach(btn => {
    btn.addEventListener("click", () => {
      const dim = btn.dataset.dim;
      setVesselOverride(_vesselViewVid, dim, null, null);
      syncEventsFromAlerts();
      renderThresholds();
    });
  });
}

      可設定的維度為<b style="color:var(--k-c8d4e0)">航線偏移</b>（NM）、<b style="color:var(--k-c8d4e0)">速度異常</b>（超速 %）、<b style="color:var(--k-c8d4e0)">漂航圈半徑</b>（m）；

  // ── view tab 切換 ───────────────────────────────────────────────
  document.querySelectorAll(".th-view-tabs .th-tab").forEach(btn => {

function saveThresholdsFromPage() {
  // 從頁面內所有 .th-input 讀回：W/C 數值（data-lvl）與持續時間（data-dur-lvl）
  // 注意：dimRowHTML 用的是 data-dim（不是 data-k），此處也支援兩種命名
  document.querySelectorAll("#main .th-input").forEach(el => {
    const k = el.dataset.k || el.dataset.dim;
    if (!_thresholds[k]) return;
    const durLvl = el.dataset.durLvl;
    if (durLvl) {
      const v = parseInt(el.value, 10);
      if (!isNaN(v) && v >= 0) _thresholds[k][durLvl + "Duration"] = v;
    } else {
      const lvl = el.dataset.lvl;
      const v = parseFloat(el.value);
      if (!isNaN(v) && (lvl === "warning" || lvl === "critical")) _thresholds[k][lvl] = v;
    }
  });
  // 通知 checkbox：讀回 mail / line 兩個布林
  document.querySelectorAll('#main input[type="checkbox"][data-notify]').forEach(cb => {
    const k = cb.dataset.k || cb.dataset.dim;
    const kind = cb.dataset.notify;
    if (_thresholds[k] && _thresholds[k].notify && (kind === "mail" || kind === "line")) {
      _thresholds[k].notify[kind] = cb.checked;
    }
  });
  saveThresholds();
  syncEventsFromAlerts();   // 用新閾值重評估、補立案
  renderThresholds();        // 重畫本頁，更新「已修改」標記與計數
  const tip = document.getElementById("th-saved-tip");
  if (tip) {
    tip.textContent = `已儲存 / Saved at ${new Date().toLocaleTimeString()}`;
    clearTimeout(window.__thSavedTimer);
    window.__thSavedTimer = setTimeout(() => { tip.textContent = ""; }, 2500);
  }
}
window.resetThresholdsAndRefresh = function() {
  resetThresholds();
  syncEventsFromAlerts();
  renderThresholds();
};

/* ─────────────────────────────────────────────────────────────────
 * Icon header tooltip (portal) — 把 tooltip element append 到 body，
 *   位置用 getBoundingClientRect 計算。避開 .alert-table-wrap 的
 *   overflow:auto 將絕對定位 tooltip clip 掉的問題。預設彈在 header
 *   上方；上方空間不夠時 fallback 到下方。
 * ───────────────────────────────────────────────────────────────── */
let _iconTipEl = null;
function _hideIconTip() {
  if (_iconTipEl) { _iconTipEl.remove(); _iconTipEl = null; }
}
function _showIconTip(el) {
  _hideIconTip();
  const tip = el.dataset.tip;
  if (!tip) return;
  // 第一行為標題，第二行起為說明內容（保留換行）
  const idx = tip.indexOf("\n");
  const title = idx === -1 ? tip : tip.slice(0, idx);
  const body  = idx === -1 ? "" : tip.slice(idx + 1).replace(/^\s+/, "");
  _iconTipEl = document.createElement("div");
  _iconTipEl.className = "icon-tip-portal" + (body ? "" : " no-body");
  const titleEl = document.createElement("div");
  titleEl.className = "tip-title";
  titleEl.textContent = title;
  _iconTipEl.appendChild(titleEl);
  if (body) {
    // 拆 CN / EN：找出第一個「整行都沒中文字」的行當作 EN 起點，
    // 之前的行歸為 CN 段（即使 EN 段內含中文名詞，例如 "・繫泊 MOOR"，也仍歸 EN）
    const lines = body.split("\n");
    const hasCJK = (s) => /[一-鿿]/.test(s);
    let enStart = -1;
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].trim() && !hasCJK(lines[i])) { enStart = i; break; }
    }
    const cnText = (enStart === -1 ? lines : lines.slice(0, enStart)).join("\n").trim();
    const enText = (enStart === -1 ? [] : lines.slice(enStart)).join("\n").trim();
    if (cnText) {
      const cnEl = document.createElement("div");
      cnEl.className = "tip-body tip-body-cn";
      cnEl.textContent = cnText;
      _iconTipEl.appendChild(cnEl);
    }
    if (enText) {
      const enEl = document.createElement("div");
      enEl.className = "tip-body tip-body-en";
      enEl.textContent = enText;
      _iconTipEl.appendChild(enEl);
    }
  }
  document.body.appendChild(_iconTipEl);
  const r = el.getBoundingClientRect();
  const tr = _iconTipEl.getBoundingClientRect();
  // 一律顯示在表頭「上方」，避免遮住下方的資料列；上方空間不足時夾到視窗頂端（仍不蓋住下面資訊）。
  let top = Math.max(8, r.top - tr.height - 10);
  let left = r.left + r.width/2 - tr.width/2;
  if (left < 8) left = 8;
  if (left + tr.width > innerWidth - 8) left = innerWidth - tr.width - 8;
  _iconTipEl.style.top = top + "px";
  _iconTipEl.style.left = left + "px";
}
// 事件代理：每次 render 出新表頭都自動套用
document.body.addEventListener("mouseover", e => {
  const el = e.target.closest(".icon-header, .bi-th-tip");
  if (el) _showIconTip(el);
});
document.body.addEventListener("mouseout", e => {
  const el = e.target.closest(".icon-header, .bi-th-tip");
  if (el && !el.contains(e.relatedTarget)) _hideIconTip();
});
document.addEventListener("scroll", _hideIconTip, true);
window.addEventListener("resize", _hideIconTip);
