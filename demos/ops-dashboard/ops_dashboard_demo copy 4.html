<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLAB 航線監測 - TWKHH to BRSPB</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            background: #000;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #040d14;
        }

        /* 左下角狀態顯示 */
        .status-box {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            pointer-events: none;
        }

        .status-tag {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            display: inline-block;
            border: 1px solid #999;
            text-transform: uppercase;
        }

        .coords-display {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 8px 14px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            border-left: 3px solid #fff;
            backdrop-filter: blur(5px);
        }

        /* 航線資訊浮窗 */
        .info-panel {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 25px;
            text-align: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            border-radius: 4px;
        }

        .info-panel h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 2px;
        }

        /* 自訂 Leaflet 縮放按鈕樣式 */
        .leaflet-bar a {
            background-color: rgba(0, 0, 0, 0.7) !important;
            color: #fff !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2) !important;
        }

        .leaflet-bar a:hover {
            background-color: #fff !important;
            color: #000 !important;
        }

        .leaflet-control-zoom {
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            margin-top: 20px !important;
            margin-left: 20px !important;
        }

        /* 港口標籤樣式 */
        .port-tooltip {
            background: transparent;
            border: none;
            box-shadow: none;
            color: #fff;
            font-weight: bold;
            font-size: 13px;
            text-shadow: 0px 0px 6px #000, 0px 0px 4px #000;
        }
    </style>
</head>
