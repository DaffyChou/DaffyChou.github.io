<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全船隊風險與營運分析儀表板 (Fleet Level)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/highcharts-more.js"></script> <script src="https://code.highcharts.com/modules/heatmap.js"></script> <style>
        .chart-container { height: 420px; width: 100%; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 p-8">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-white border-l-4 border-blue-500 pl-4">全船隊宏觀營運與風險看板 (Fleet-Wide Dashboard)</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

            <div class="bg-gray-800 p-4 rounded-lg shadow-lg">
                <h2 class="text-xl font-semibold mb-2 text-blue-400">1. 船隊 CII 評級預警 (法規風險)</h2>
                <p class="text-sm text-gray-400 mb-4">監控 D/E 級高風險船舶比例，及早擬定降速或硬體升級計畫。</p>
                <div id="cii-chart" class="chart-container"></div>
            </div>

            <div class="bg-gray-800 p-4 rounded-lg shadow-lg">
                <h2 class="text-xl font-semibold mb-2 text-blue-400">2. 船隊資產能效矩陣 (汰換風險)</h2>
                <p class="text-sm text-gray-400 mb-4">氣泡大小為總油耗。右下角大氣泡代表「老舊且極度耗油」的拖累資產。</p>
                <div id="bubble-chart" class="chart-container"></div>
            </div>

            <div class="bg-gray-800 p-4 rounded-lg shadow-lg">
                <h2 class="text-xl font-semibold mb-2 text-blue-400">3. 船舶與航線適配度 (調度風險)</h2>
                <p class="text-sm text-gray-400 mb-4">輔助派船決策，避免將特定船隻派往其油耗表現極差(紅色)的航線。</p>
                <div id="fleet-heatmap-chart" class="chart-container"></div>
            </div>

            <div class="bg-gray-800 p-4 rounded-lg shadow-lg">
                <h2 class="text-xl font-semibold mb-2 text-blue-400">4. 總運力與能耗趨勢 (宏觀經濟)</h2>
                <p class="text-sm text-gray-400 mb-4">驗證船隊規模擴張時，單位油耗是否有效控制，實現營收與碳排脫鉤。</p>
                <div id="dual-axis-chart" class="chart-container"></div>
            </div>

        </div>
    </div>

    <script>
        // 共用深色主題設定
        Highcharts.theme = {
            colors: ['#2b908f', '#90ee7e', '#f45b5b', '#7798BF', '#aaeeee', '#ff0066', '#eeaaee', '#55BF3B', '#DF5353'],
            chart: { backgroundColor: 'transparent', style: { fontFamily: 'sans-serif' } },
            title: { style: { color: '#E0E0E3', fontSize: '16px' } },
            legend: { itemStyle: { color: '#E0E0E3' }, itemHoverStyle: { color: '#FFF' } },
            xAxis: { gridLineColor: '#707073', labels: { style: { color: '#E0E0E3' } }, lineColor: '#707073', title: { style: { color: '#A0A0A3' } } },
            yAxis: { gridLineColor: '#707073', labels: { style: { color: '#E0E0E3' } }, lineColor: '#707073', title: { style: { color: '#A0A0A3' } } },
            tooltip: { backgroundColor: 'rgba(0, 0, 0, 0.85)', style: { color: '#F0F0F0' } }
        };
        Highcharts.setOptions(Highcharts.theme);

        // --- 1. 船隊 CII 評級分佈 (堆疊柱狀圖) ---
        Highcharts.chart('cii-chart', {
            chart: { type: 'column' },
            title: { text: '全船隊 CII 評級季度變化' },
            xAxis: { categories: ['2025 Q1', '2025 Q2', '2025 Q3', '2025 Q4'] },
            yAxis: { min: 0, title: { text: '船舶數量 (艘)' } },
            plotOptions: { column: { stacking: 'normal' } },
            series: [
                { name: 'E 級 (極高風險)', data: [1, 2, 2, 3], color: '#ef4444' }, // 紅色
                { name: 'D 級 (高風險)', data: [2, 2, 3, 4], color: '#f97316' },   // 橘色
                { name: 'C 級 (合格)', data: [6, 6, 5, 4], color: '#eab308' },    // 黃色
                { name: 'A/B 級 (優良)', data: [4, 3, 3, 2], color: '#22c55e' }    // 綠色
            ]
        });

        // --- 2. 船隊資產能效矩陣 (氣泡圖) ---
        Highcharts.chart('bubble-chart', {
            chart: { type: 'bubble', plotBorderWidth: 1, zoomType: 'xy' },
            title: { text: '船齡 vs. 燃油效率矩陣' },
            xAxis: { title: { text: '船齡 (年)' }, plotLines: [{ value: 15, color: '#ef4444', width: 2, dashStyle: 'dot', label: { text: '15年警戒線', style: { color: '#ef4444' } } }] },
            yAxis: { title: { text: '平均燃油效率 (nm/mt)' } },
            tooltip: { useHTML: true, headerFormat: '<table>', pointFormat: '<tr><th colspan="2"><h3>{point.name}</h3></th></tr>' + '<tr><th>船齡:</th><td>{point.x} 年</td></tr>' + '<tr><th>效率:</th><td>{point.y} nm/mt</td></tr>' + '<tr><th>年耗油量:</th><td>{point.z} 噸</td></tr>', footerFormat: '</table>', followPointer: true },
            series: [{
                name: '散裝貨輪',
                data: [
                    { x: 3, y: 92, z: 8000, name: '光輝輪', color: '#22c55e' },
                    { x: 5, y: 88, z: 8500, name: '成功輪', color: '#22c55e' },
                    { x: 12, y: 82, z: 12000, name: '奮進輪', color: '#eab308' },
                    { x: 18, y: 72, z: 16000, name: '永續輪', color: '#ef4444' }, // 右下角的大氣泡 (汰換目標)
                    { x: 20, y: 68, z: 15500, name: '探索輪', color: '#ef4444' }
                ]
            }]
        });

        // --- 3. 船舶與航線適配度熱點圖 ---
        Highcharts.chart('fleet-heatmap-chart', {
            chart: { type: 'heatmap', marginTop: 40, marginBottom: 80 },
            title: { text: '全船隊航線油耗成本分析' },
            xAxis: { categories: ['台灣-澳洲', '台灣-印尼', '東南亞近洋', '中東航線'], title: { text: '營運航線' } },
            yAxis: { categories: ['光輝輪', '成功輪', '奮進輪', '挑戰輪', '永續輪'], title: { text: '船舶名稱' } },
            colorAxis: {
                min: 0,
                stops: [
                    [0, '#22c55e'], // 綠色 (非常適合該航線)
                    [0.5, '#eab308'],
                    [1, '#ef4444']  // 紅色 (在該航線極度耗油)
                ]
            },
            series: [{
                name: '油耗成本指數',
                borderWidth: 1,
                data: [
                    // [航線X, 船舶Y, 耗油指數]
                    [0, 0, 10], [1, 0, 15], [2, 0, 12], [3, 0, 18], // 光輝輪普遍表現好
                    [0, 4, 95], [1, 4, 80], [2, 4, 40], [3, 4, 90]  // 永續輪(Y=4)跑長程(X=0,3)極差，只適合短程(X=2)
                ],
                dataLabels: { enabled: false }
            }]
        });

        // --- 4. 總運力 vs 總耗油 (雙軸趨勢圖) ---
        Highcharts.chart('dual-axis-chart', {
            title: { text: '船隊總承載量與總油耗趨勢對比' },
            xAxis: [{ categories: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'], crosshair: true }],
            yAxis: [
                { title: { text: '總燃油消耗量 (MT)', style: { color: '#f59e0b' } }, labels: { format: '{value} MT', style: { color: '#f59e0b' } }, opposite: true }, // 右軸
                { title: { text: '貨運周轉量 (百萬 Ton-miles)', style: { color: '#3b82f6' } }, labels: { format: '{value} M', style: { color: '#3b82f6' } } } // 左軸
            ],
            tooltip: { shared: true },
            series: [
                { name: '貨運周轉量', type: 'column', yAxis: 1, data: [150, 160, 165, 170, 180, 185, 190, 195, 200, 210, 215, 220], color: 'rgba(59, 130, 246, 0.7)' },
                { name: '總燃油消耗量', type: 'spline', data: [7000, 7200, 7100, 7300, 7250, 7400, 7350, 7500, 7400, 7600, 7500, 7450], color: '#f59e0b', marker: { lineWidth: 2, lineColor: '#f59e0b', fillColor: 'white' } }
            ]
        });
    </script>
</body>
</html>
